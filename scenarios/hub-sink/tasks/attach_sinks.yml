##################################################################################################
# scenarios/hub-sink/tasks/attach_sinks.yml
#
# Sink-side setup for filtered bidirectional pull-replication.  Run AFTER define_hub.yml has
# minted the per-sink replication certificates under scenarios/hub-sink/replication-certs/.
#
# What it does (per sink cluster):
#   1. Creates a Raven connection string 'hub-connection' on the sink's leader, pointing at
#      every hub node as TopologyDiscoveryUrls.
#   2. Creates a sink-pull-replication task on the sink that pulls from the hub with the
#      per-sink PFX + same prefix filter that define_hub.yml registered as the Hub Access.
#
# INPUTS (defaults come from scenarios/hub-sink/vars.yml + inventory/group_vars/all.yml):
#   hub_cluster_id        which cluster id is the hub                       (vars.yml)
#   replication_db_name   database name to wire replication on              (vars.yml)
#   hub_task_name         must match the hub task name from define_hub      (vars.yml)
#   replication_mode      must match the mode from define_hub               (vars.yml)
#   sink_prefix_template  e.g. "tenants/cluster<id>/*"                      (vars.yml)
#   replication_certs_dir folder containing the per-sink PFX files          (vars.yml)
#
# RUN EXAMPLE:
#   ansible-playbook scenarios/hub-sink/tasks/attach_sinks.yml -K -e clusters_count=2
#
# NOTES:
#   * Uses the ravendb.ravendb.connection_string module, so the python prereqs play
#     runs first.
#   * Idempotent: skips creating the sink-pull task if one with the expected name exists.
##################################################################################################

- name: Ensure ravendb python client is available on the controller
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - role: ravendb.ravendb.ravendb_python_client_prerequisites


- name: Attach every sink to the hub
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars.yml

  tasks:
    - name: Compute sink_cluster_ids (every cluster id except the hub)
      ansible.builtin.set_fact:
        sink_cluster_ids: "{{ range(1, (clusters_count | int) + 1) | reject('equalto', hub_cluster_id | int) | list }}"

    - name: Compute hub_topology_urls (one URL per hub node, derived from nodes_per_cluster)
      ansible.builtin.set_fact:
        hub_topology_urls: "{{ 'abcdefghijklmnopqrstuvwxyz'[: nodes_per_cluster | int] | list | map('regex_replace', '^(.*)$', 'https://' ~ hub_cluster_id ~ '\\1.' ~ ravendb_domain ~ ':443') | list }}"

    - name: Create the Raven connection string 'hub-connection' on each sink's leader
      ravendb.ravendb.connection_string:
        url: "https://{{ item }}a.{{ ravendb_domain }}:443"
        database_name: "{{ replication_db_name }}"
        certificate_path: "{{ cert_dir }}/client.pem"
        ca_cert_path: "{{ cert_ca_crt }}"
        name: "hub-connection"
        cs_type: RAVEN
        properties:
          database: "{{ replication_db_name }}"
          urls: "{{ hub_topology_urls }}"
        state: present
      loop: "{{ sink_cluster_ids }}"
      loop_control:
        label: "cluster {{ item }}"

    - name: Check whether each sink already has its pull-replication task
      ansible.builtin.uri:
        url: "https://{{ item }}a.{{ ravendb_domain }}:443/databases/{{ replication_db_name }}/tasks"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        return_content: true
      register: sink_tasks_before
      loop: "{{ sink_cluster_ids }}"
      loop_control:
        label: "cluster {{ item }}"

    - name: Read each sink's PFX (base64) generated by define_hub.yml
      ansible.builtin.set_fact:
        sink_pfx_b64_map: "{{ sink_pfx_b64_map | default({}) | combine({ item: lookup('file', replication_certs_dir ~ '/cluster' ~ item ~ '.replication.pfx.b64') }) }}"
      loop: "{{ sink_cluster_ids }}"
      loop_control:
        label: "cluster {{ item }}"

    - name: Create the sink-pull-replication task on each sink (skipped if it already exists)
      ansible.builtin.uri:
        url: "https://{{ item.item }}a.{{ ravendb_domain }}:443/databases/{{ replication_db_name }}/admin/tasks/sink-pull-replication"
        method: POST
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        body_format: json
        body:
          PullReplicationAsSink:
            TaskId: null
            Name: "cluster{{ item.item }}-to-hub"
            ConnectionStringName: "hub-connection"
            HubName: "{{ hub_task_name }}"
            Mode: "{{ replication_mode }}"
            Disabled: false
            AccessName: "access-cluster{{ item.item }}"
            CertificateWithPrivateKey: "{{ sink_pfx_b64_map[item.item] }}"
            AllowedHubToSinkPaths:
              - "{{ sink_prefix_template | replace('<id>', item.item | string) }}"
            AllowedSinkToHubPaths:
              - "*"
        status_code: [200, 201]
      when: item.json.OngoingTasks | default([]) | selectattr('TaskType', 'eq', 'PullReplicationAsSink') | selectattr('TaskName', 'eq', 'cluster' ~ item.item ~ '-to-hub') | list | length == 0
      loop: "{{ sink_tasks_before.results }}"
      loop_control:
        label: "cluster {{ item.item }}"

    - name: Done
      ansible.builtin.debug:
        msg: "ATTACHED  {{ sink_cluster_ids | length }} sink(s) to hub cluster {{ hub_cluster_id }} on database '{{ replication_db_name }}'"
