##################################################################################################
# scenarios/hub-sink/chaos_failover.yml
#
# Hub-sink chaos failover scenario.  Composed from toolbox primitives where they fit cleanly;
# bespoke logic (alternating-prefix writes, relay identification, final assertion) stays inline.
#
# ALGORITHM:
#   1.  Write 10 'other/seed/N' docs to 1a -- hub-only (no sink filter matches 'other/').
#   2.  Cut all hub-internal links (1a<->1b, 1a<->1c, 1b<->1c).
#   3.  Write 20 docs per hub node, alternating prefixes:
#         tenants/cluster2/...  (matches sink filter)
#         other/...             (hub-only control)
#   3.5 Write 20 'sink-origin/N' docs directly to 2a.
#   4.  Probe the sink to identify the HubToSink relay (whichever hub node's docs landed).
#   5.  Cut the relay from 2a/2b/2c, then RESTART RavenDB on the relay (cold-start guarantees
#       it enters database rehab when it reconnects -- a network-cut alone may not be enough
#       to force rehab, and rehab is the precondition for the filter-bleed bug to manifest).
#       Wait 120s for RavenDB to fail over the sink-pull task.
#   6.  Restore link between the two non-relay hub nodes.
#   6.5 Fire 3 freeform TRIGGER docs (1 per sink node, random GUID id, null collection)
#       at the half-healed hub.  Predictable burst-PUT writes don't trigger the bug; freeform
#       writes do.  Wait 60s for SinkToHub to push partial state.
#   7.  Restore relay's hub-internal links.  Wait 30s.
#   8.  Restore relay <-> sink links.
#   9.  Wait until the relay actually ENTERS database rehab (Promotables/Rehabs) -- this
#       fails fast if the chaos action didn't destabilise the node, so we don't silently
#       skip the bug path.  Then wait until it REJOINS as a Member.  Then read counts.
#   10. ASSERT all hub nodes agree on doc count.  Mismatch == bug reproduced.
##################################################################################################


# ============================ STEP 1 -- seed ============================

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs.yml
  vars:
    target: 1a
    db_name: Tenants
    count: 10
    id_prefix: other/seed

- name: PAUSE after STEP 1
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Wait ~10s for seeds to spread, then Enter"
      ansible.builtin.pause:
        prompt: "Wait ~10 seconds for seed docs to replicate to 1b and 1c, then press Enter."

    - name: "Press Enter to cut the hub mesh"
      ansible.builtin.pause:
        prompt: "STEP 1 done.  Press Enter to cut the hub mesh."


# ============================ Pre-STEP 2 -- read counts ============================

- ansible.builtin.import_playbook: ../../toolbox/diagnostic/diagnostic_doc_count.yml
  vars: { target: 1a, db_name: Tenants }
- ansible.builtin.import_playbook: ../../toolbox/diagnostic/diagnostic_doc_count.yml
  vars: { target: 1b, db_name: Tenants }
- ansible.builtin.import_playbook: ../../toolbox/diagnostic/diagnostic_doc_count.yml
  vars: { target: 1c, db_name: Tenants }


# ============================ STEP 2 -- cut hub mesh ============================

- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: 1a, node_b: 1b }
- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: 1a, node_b: 1c }
- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: 1b, node_b: 1c }

- name: PAUSE after STEP 2
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.pause:
        prompt: "STEP 2 done.  Hub mesh cut, sinks unaffected.  Press Enter to write 20 docs per hub node."


# ============================ STEP 3 -- alternating-prefix writes ============================
# 20 docs per hub node, round-robin between tenants/cluster2/<node>/r1 (matches sink filter)
# and other/<node>/r1 (hub-only).  Uses toolbox/writes/write_docs_interleaved.yml.

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_interleaved.yml
  vars:
    target: 1a
    db_name: Tenants
    count: 20
    prefixes:
      - "tenants/cluster2/written-on-1a/r1"
      - "other/written-on-1a/r1"

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_interleaved.yml
  vars:
    target: 1b
    db_name: Tenants
    count: 20
    prefixes:
      - "tenants/cluster2/written-on-1b/r1"
      - "other/written-on-1b/r1"

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_interleaved.yml
  vars:
    target: 1c
    db_name: Tenants
    count: 20
    prefixes:
      - "tenants/cluster2/written-on-1c/r1"
      - "other/written-on-1c/r1"

- name: PAUSE after STEP 3
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.pause:
        prompt: "STEP 3 done.  Expect 30/30/30 on hub (10 seed + 20 own).  Press Enter to write sink-originated docs."


# ============================ STEP 3.5 -- sink-origin writes ============================

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs.yml
  vars:
    target: 2a
    db_name: Tenants
    count: 20
    id_prefix: sink-origin

- name: PAUSE after STEP 3.5
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Wait ~5s for sink internal replication + SinkToHub push"
      ansible.builtin.pause:
        prompt: "Wait ~5 seconds for sink-internal replication and SinkToHub push to start, then press Enter."

    - name: "Press Enter to identify the HubToSink relay"
      ansible.builtin.pause:
        prompt: "STEP 3.5 done.  Press Enter to identify the HubToSink relay."


# ============================ STEP 4 -- identify relay ============================

- name: STEP 4 -- probe sink for the HubToSink relay
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Probe sink for each potential relay
      ansible.builtin.uri:
        url: "https://2a.hubsink.test:443/databases/Tenants/docs?startsWith=tenants/cluster2/written-on-{{ item }}/r1-&pageSize=1"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
      register: relay_probes
      loop: [1a, 1b, 1c]

    - name: Pick the relay (whichever hub node's docs reached the sink)
      ansible.builtin.set_fact:
        relay: "{{ (relay_probes.results | selectattr('json.Results','ne',[]) | first).item }}"

    - name: Show identified relay
      ansible.builtin.debug:
        msg: "active hub->sink relay is {{ relay }}"

    - name: "Press Enter to isolate the relay from the sink"
      ansible.builtin.pause:
        prompt: "STEP 4 done.  Relay is {{ relay }}.  Press Enter to isolate it from the sink."


# ============================ STEP 5 -- cut relay from sinks + restart relay ============================
# After isolating the relay, restart its RavenDB service.  A cold-start node ALWAYS enters
# database rehab when it reconnects (a network-cut alone may not -- if the failure-detection
# timer hasn't fired, RavenDB may resume the relay as Member without a rehab catch-up batch,
# which means the bug's filter-bleed code path doesn't run).  Restarting forces rehab.

- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2a }
- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2b }
- ansible.builtin.import_playbook: ../../toolbox/network/cut_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2c }

# - ansible.builtin.import_playbook: ../../toolbox/service/restart_ravendb.yml
#   vars:
#     target: "{{ relay }}"

- name: STEP 5 -- failover wait + derive non-relay names
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Wait 120s for RavenDB to fail over the cluster-2 pull task"
      ansible.builtin.pause:
        prompt: "Wait AT LEAST 120 seconds for RavenDB to detect the dead relay and fail over.  Press Enter when ready."

    - name: "Press Enter to restore the non-relay hub pair"
      ansible.builtin.pause:
        prompt: "STEP 5 done.  Press Enter to restore the non-relay hub pair."

    - name: Name the two non-relay hub nodes
      ansible.builtin.set_fact:
        nonrelay_a: "{{ (['1a','1b','1c'] | reject('eq', relay) | list)[0] }}"
        nonrelay_b: "{{ (['1a','1b','1c'] | reject('eq', relay) | list)[1] }}"


# ============================ STEP 6 -- restore non-relay pair ============================

- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars:
    node_a: "{{ nonrelay_a }}"
    node_b: "{{ nonrelay_b }}"

- name: PAUSE before STEP 6.5 (TRIGGER writes)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.pause:
        prompt: "STEP 6 done.  Press Enter to fire 15 TRIGGER docs at the half-healed hub."


# ============================ STEP 6.5 -- freeform TRIGGER writes ============================
# 1 doc per sink node (3 total), with random GUID ids and null collection -- matches what an
# unstructured ad-hoc write looks like (no prefix, no @collection).  This was the trigger
# pattern that successfully reproduced the bug; predictable burst-PUT writes
# (other/TRIGGER-2X/N) did not.  After the writes, sleep 60s to let SinkToHub push partial
# state through the half-healed hub before we restore the relay.

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_freeform.yml
  vars:
    target: 2a
    db_name: Tenants
    count: 1

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_freeform.yml
  vars:
    target: 2b
    db_name: Tenants
    count: 1

- ansible.builtin.import_playbook: ../../toolbox/writes/write_docs_freeform.yml
  vars:
    target: 2c
    db_name: Tenants
    count: 1

- name: Settle after STEP 6.5
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Wait 60s so freeform writes propagate through the half-healed hub
      ansible.builtin.pause:
        seconds: 60


# ============================ STEP 7 -- restore relay's hub-internal links ============================

- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars:
    node_a: "{{ relay }}"
    node_b: "{{ nonrelay_a }}"

- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars:
    node_a: "{{ relay }}"
    node_b: "{{ nonrelay_b }}"

- name: Settle after STEP 7
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Wait 30s for hub mesh to begin reconverging before reattaching relay to sink
      ansible.builtin.pause:
        seconds: 30


# ============================ STEP 8 -- restore relay <-> sink ============================

- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2a }
- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2b }
- ansible.builtin.import_playbook: ../../toolbox/network/restore_link.yml
  vars: { node_a: "{{ relay }}", node_b: 2c }


# ============================ STEP 9 -- final counts + STEP 10 verdict ============================

# ============================ STEP 9 -- wait for rehab to start then finish ============================
# The deterministic gate: require the relay to enter rehab AFTER our chaos action (proves
# the scenario exercised the bug path), then wait for it to come back as a full Member
# (proves we're measuring post-rehab state, where the divergence persists).

- ansible.builtin.import_playbook: ../../toolbox/wait/wait_for_rehab.yml
  vars:
    cluster_leader: 1a
    db_name: Tenants
    target: "{{ relay }}"
    timeout_secs: 180

- ansible.builtin.import_playbook: ../../toolbox/wait/wait_for_member.yml
  vars:
    cluster_leader: 1a
    db_name: Tenants
    target: "{{ relay }}"
    timeout_secs: 300


- name: STEP 9 final counts + STEP 10 verdict
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Small settle after rehab-complete signal (let the final replication batch land)
      ansible.builtin.pause:
        seconds: 15

    - name: Read final doc count on each hub node (post-rehab)
      ansible.builtin.uri:
        url: "https://{{ c }}.hubsink.test:443/databases/Tenants/stats"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
      register: post_heal_counts
      loop: [1a, 1b, 1c]
      loop_control:
        loop_var: c

    - name: Print per-node final counts
      ansible.builtin.debug:
        msg: "{{ item.c }}  ->  {{ item.json.CountOfDocuments }} docs"
      loop: "{{ post_heal_counts.results }}"
      loop_control:
        label: "{{ item.c }}"

    - name: "STEP 10 -- ASSERT all hub nodes agree on doc count"
      ansible.builtin.assert:
        that:
          - (post_heal_counts.results | map(attribute='json.CountOfDocuments') | unique | list | length) == 1
        fail_msg: >-
          BUG REPRODUCED -- hub nodes disagree after rehab:
          {% for r in post_heal_counts.results %}{{ r.c }}={{ r.json.CountOfDocuments }} {% endfor %}
        success_msg: "OK -- all hub nodes agree on doc count post-rehab.  No bug reproduced this run."
