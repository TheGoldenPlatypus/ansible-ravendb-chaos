##################################################################################################
# scenarios/EMR/workloads/w1/workload_w1.yml
#
# Thin ansible wrapper around workload_w1.sh -- validates inputs, exports group_vars-derived
# values as env vars, exec's the script.  See workload_w1.sh for the workload logic.
#
# W-1 is the EMR-plan's continuous doc CRUD mix (70/20/10 update/put-new/delete).  Used by
# RV-1, RV-2, RP-2, SK-1, SK-2.  Lives under scenarios/EMR/workloads/w1/ (not toolbox/)
# because it bakes in the EMR plan's MicroDocs collection convention.
#
# INPUTS:
#   target          REQUIRED.  Node to direct writes at (e.g. 1a).
#   db_name         REQUIRED.  Database name.
#   id_prefix       REQUIRED.  Prefix of the seeded pool ids.
#   pool_size       REQUIRED.  Number of ids in the seeded pool.
#   duration_secs   REQUIRED.  Wall-clock seconds.
#
# RUN EXAMPLES:
#   ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml \
#       -e target=1a -e db_name=db1 -e id_prefix=seed -e pool_size=10000 -e duration_secs=300
#
#   # Background use from a scenario:
#   nohup ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml -e ... </dev/null >/tmp/w1.log 2>&1 &
##################################################################################################

- name: W-1 doc CRUD mix
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - db_name is defined
          - id_prefix is defined
          - pool_size is defined and (pool_size | int) > 0
          - duration_secs is defined and (duration_secs | int) > 0
        fail_msg: "Required: -e target=<node> -e db_name=<db> -e id_prefix=<p> -e pool_size=<N> -e duration_secs=<secs>"

    - name: Run workload_w1.sh
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/workload_w1.sh"
      environment:
        TARGET: "{{ target }}"
        DB_NAME: "{{ db_name }}"
        ID_PREFIX: "{{ id_prefix }}"
        POOL_SIZE: "{{ pool_size }}"
        DURATION_SECS: "{{ duration_secs }}"
        RAVEN_DOMAIN: "{{ ravendb_domain }}"
        CERT_PEM: "{{ cert_dir }}/client.pem"
        CA_CRT: "{{ cert_ca_crt }}"
      register: out

    - name: Done
      ansible.builtin.debug:
        msg: "{{ out.stdout }}"
