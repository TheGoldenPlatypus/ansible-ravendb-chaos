##################################################################################################
# scenarios/EMR/workloads/w1/workload_w1.yml
#
# Thin ansible wrapper around workload_w1.sh -- validates inputs, exports group_vars-derived
# values as env vars, exec's the script.  See workload_w1.sh for the workload logic.
#
# W-1 is the EMR-plan's continuous doc CRUD mix (70/20/10 update/put-new/delete).
#
# TWO MODES (passed through to the script):
#   * Single-bucket: pass id_prefix + pool_size.
#   * Multi-bucket (RPV-1): pass buckets_spec (pipe-separated "prefix:pool:weight" triples).
#
# INPUTS:
#   target          REQUIRED.  Node to direct writes at (e.g. 1a).
#   db_name         REQUIRED.  Database name.
#   duration_secs   REQUIRED.  Wall-clock seconds.
#   buckets_spec    OPTIONAL.  Multi-bucket spec.  If set, id_prefix/pool_size are ignored.
#   id_prefix       OPTIONAL.  Single-bucket prefix.  Required with pool_size if buckets_spec not set.
#   pool_size       OPTIONAL.  Single-bucket pool size.
#   writer_id       OPTIONAL.  Distinct id (e.g. 1..4) when launching multiple W-1 instances in
#                              parallel against the same (target, db) -- becomes a pidfile suffix
#                              so each instance gets its own /tmp/w1-...-wN.pid.  Unset = legacy
#                              single-writer pidfile (RPV-1's contract).
#
# RUN EXAMPLES:
#   # Single-bucket (legacy):
#   ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml \
#       -e target=1a -e db_name=db1 -e id_prefix=seed -e pool_size=10000 -e duration_secs=300
#
#   # Multi-bucket (RPV-1 default 40/40/20 group split):
#   ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml \
#       -e target=1a -e db_name=db1 -e duration_secs=600 \
#       -e 'buckets_spec=users/sink1:2000:20|orders/sink1:2000:20|users/sink2:2000:20|orders/sink2:2000:20|users/hub:2000:7|orders/hub:2000:7|Internal:3000:6'
##################################################################################################

- name: W-1 doc CRUD mix
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - db_name is defined
          - (buckets_spec is defined) or (id_prefix is defined and pool_size is defined and (pool_size | int) > 0)
        fail_msg: >-
          Required: -e target=<node> -e db_name=<db> AND
          either -e buckets_spec='...' OR -e id_prefix=<p> -e pool_size=<N>.
          OPTIONAL: -e duration_secs=<secs>  (default = 0 = run until killed via stop_workload).

    - name: Run workload_w1.sh
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/workload_w1.sh"
      environment:
        TARGET: "{{ target }}"
        DB_NAME: "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        RAVEN_DOMAIN: "{{ ravendb_domain }}"
        CERT_PEM: "{{ cert_dir }}/client.pem"
        CA_CRT: "{{ cert_ca_crt }}"
        BUCKETS_SPEC: "{{ buckets_spec | default('') }}"
        ID_PREFIX: "{{ id_prefix | default('') }}"
        POOL_SIZE: "{{ pool_size | default('') }}"
        WRITER_ID: "{{ writer_id | default('') }}"
      register: out

    - name: Done
      ansible.builtin.debug:
        msg: "{{ out.stdout }}"
