##################################################################################################
# scenarios/EMR/workloads/w3/workload_w3.yml
#
# Thin ansible wrapper around workload_w3.sh -- validates inputs, exports group_vars-derived
# values as env vars, exec's the script.  See workload_w3.sh for the workload logic.
#
# W-3 is the RV-1 Phase 2 churn workload: N concurrent writers (default 8) each picking a
# random doc from a 1000-doc hot pool and racing through
# delete -> revert-from-revision -> put -> add-attachment -> remove-attachment.
#
# INPUTS:
#   target          REQUIRED.  Node to direct writes at.
#   db_name         REQUIRED.  Database name.
#   duration_secs   REQUIRED.  Wall-clock seconds (RV-1 spec: 300 = 5 min).
#   id_prefix       REQUIRED.  Hot-doc pool prefix (e.g. "hot").
#   pool_size       REQUIRED.  Hot-doc pool size (RV-1 spec: 1000).
#   writers         OPTIONAL.  Concurrent writer count.  Default 8 (RV-1 spec).
#   collection      OPTIONAL.  RavenDB collection name.  Default "HotDocs".
#
# RUN EXAMPLE:
#   ansible-playbook scenarios/EMR/workloads/w3/workload_w3.yml \
#       -e target=1a -e db_name=db1 -e duration_secs=300 \
#       -e id_prefix=hot -e pool_size=1000
##################################################################################################

- name: W-3 concurrent churn races (RV-1 Phase 2)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - db_name is defined
          - duration_secs is defined and (duration_secs | int) > 0
          - id_prefix is defined
          - pool_size is defined and (pool_size | int) > 0
        fail_msg: >-
          Required: -e target=<node> -e db_name=<db> -e duration_secs=<secs>
          -e id_prefix=<p> -e pool_size=<N>.

    - name: Run workload_w3.sh
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/workload_w3.sh"
      environment:
        TARGET: "{{ target }}"
        DB_NAME: "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs }}"
        ID_PREFIX: "{{ id_prefix }}"
        POOL_SIZE: "{{ pool_size }}"
        WRITERS: "{{ writers | default(8) }}"
        COLLECTION: "{{ collection | default('HotDocs') }}"
        RAVEN_DOMAIN: "{{ ravendb_domain }}"
        CERT_PEM: "{{ cert_dir }}/client.pem"
        CA_CRT: "{{ cert_ca_crt }}"
      register: out

    - name: Done
      ansible.builtin.debug:
        msg: "{{ out.stdout }}"
