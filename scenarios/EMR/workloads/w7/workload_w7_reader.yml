##################################################################################################
# scenarios/EMR/workloads/w7/workload_w7_reader.yml
#
# Thin ansible wrapper around workload_w7_reader.sh.  See that script for the loop logic.
# W-7 reader runs alongside the W-7 writer during RV-1 Phase 3: every $sample_interval
# seconds it fetches the FULL revision history of $doc_id and records latency; every
# $stats_interval seconds it also snapshots /stats (SizeOnDisk + CountOfRevisionDocuments).
#
# INPUTS:
#   target            REQUIRED.  Node to read from.
#   db_name           REQUIRED.
#   duration_secs     REQUIRED.  Wall-clock seconds (match the writer's duration).
#   doc_id            REQUIRED.  Doc whose history we read (e.g. users/hot).
#   sample_interval   OPTIONAL.  Seconds between history fetches.  Default 30.
#   stats_interval    OPTIONAL.  Seconds between /stats snapshots.  Default 300.
#   log_file          OPTIONAL.  Output log path.  Default /tmp/w7-reader-<target>-<db>.log.
#
# RUN EXAMPLE:
#   ansible-playbook scenarios/EMR/workloads/w7/workload_w7_reader.yml \
#       -e target=1a -e db_name=db1 -e doc_id=users/hot -e duration_secs=3600
##################################################################################################

- name: W-7 reader (history + stats sampler)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - db_name is defined
          - duration_secs is defined and (duration_secs | int) > 0
          - doc_id is defined
        fail_msg: >-
          Required: -e target=<node> -e db_name=<db> -e duration_secs=<secs> -e doc_id=<id>.

    - name: Run workload_w7_reader.sh
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/workload_w7_reader.sh"
      environment:
        TARGET: "{{ target }}"
        DB_NAME: "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs }}"
        DOC_ID: "{{ doc_id }}"
        SAMPLE_INTERVAL: "{{ sample_interval | default(30) }}"
        STATS_INTERVAL: "{{ stats_interval | default(300) }}"
        LOG_FILE: "{{ log_file | default('') }}"
        RAVEN_DOMAIN: "{{ ravendb_domain }}"
        CERT_PEM: "{{ cert_dir }}/client.pem"
        CA_CRT: "{{ cert_ca_crt }}"
      register: out

    - name: Done
      ansible.builtin.debug:
        msg: "{{ out.stdout }}"
