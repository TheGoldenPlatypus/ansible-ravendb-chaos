# Wrapper around workload_w2.sh -- see the .sh for the workload logic.
# Required: target, db_name
# One of:   id_prefix + pool_size      OR     buckets_spec
# Optional: duration_secs (default 0 = run until killed via stop_workload)
#
# Example:
#   ansible-playbook scenarios/EMR/workloads/w2/workload_w2.yml \
#     -e target=1a -e db_name=db1 -e id_prefix=users/hub -e pool_size=3000

- name: W-2 doc-extension churn
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run workload_w2.sh
      ansible.builtin.command: "bash {{ playbook_dir }}/workload_w2.sh"
      environment:
        TARGET:        "{{ target }}"
        DB_NAME:       "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
        BUCKETS_SPEC:  "{{ buckets_spec | default('') }}"
        ID_PREFIX:     "{{ id_prefix    | default('') }}"
        POOL_SIZE:     "{{ pool_size    | default('') }}"
      register: out

    - ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
