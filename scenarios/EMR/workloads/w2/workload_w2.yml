##################################################################################################
# scenarios/EMR/workloads/w2/workload_w2.yml
#
# Thin ansible wrapper around workload_w2.sh -- validates inputs, exports env vars, exec's the
# script.  See workload_w2.sh for the workload logic.
#
# W-2 is the EMR plan's doc-extension churn workload (attachments / counters / time-series, no
# doc CRUD).  Pairs naturally with W-1 -- W-1 churns the docs themselves while W-2 churns the
# extensions hanging off them.
#
# TWO MODES (same as W-1):
#   * Single-bucket: pass id_prefix + pool_size.
#   * Multi-bucket: pass buckets_spec (pipe-separated "prefix:pool:weight" triples).
#
# INPUTS:
#   target          REQUIRED.  Node to direct writes at.
#   db_name         REQUIRED.
#   duration_secs   OPTIONAL.  Default 0 = run indefinitely until killed via stop_workload.
#                              Set positive value for ad-hoc bounded runs.
#   buckets_spec    OPTIONAL.  Multi-bucket spec.  If set, id_prefix/pool_size are ignored.
#   id_prefix       OPTIONAL.
#   pool_size       OPTIONAL.
#
# RUN EXAMPLES:
#   # Indefinite (scenario-driven; killed via stop_workload):
#   ansible-playbook scenarios/EMR/workloads/w2/workload_w2.yml \
#       -e target=1a -e db_name=db1 -e id_prefix=users/hub -e pool_size=3000
#   # Bounded ad-hoc:
#   ansible-playbook scenarios/EMR/workloads/w2/workload_w2.yml \
#       -e target=1a -e db_name=db1 -e id_prefix=users/hub -e pool_size=3000 -e duration_secs=600
##################################################################################################

- name: W-2 doc-extension churn
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - db_name is defined
          - (buckets_spec is defined) or (id_prefix is defined and pool_size is defined and (pool_size | int) > 0)
        fail_msg: >-
          Required: -e target=<node> -e db_name=<db> AND
          either -e buckets_spec='...' OR -e id_prefix=<p> -e pool_size=<N>.
          OPTIONAL: -e duration_secs=<secs>  (default = 0 = run until killed via stop_workload).

    - name: Run workload_w2.sh
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/workload_w2.sh"
      environment:
        TARGET: "{{ target }}"
        DB_NAME: "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        RAVEN_DOMAIN: "{{ ravendb_domain }}"
        CERT_PEM: "{{ cert_dir }}/client.pem"
        CA_CRT: "{{ cert_ca_crt }}"
        BUCKETS_SPEC: "{{ buckets_spec | default('') }}"
        ID_PREFIX: "{{ id_prefix | default('') }}"
        POOL_SIZE: "{{ pool_size | default('') }}"
      register: out

    - name: Done
      ansible.builtin.debug:
        msg: "{{ out.stdout }}"
