##################################################################################################
# scenarios/EMR/RPV1/rpv1.yml -- cross-cluster v_old -> v_new rolling upgrade, filter-aware.
#
# 9 nodes across 3 clusters all start on v_old:
#   * Hub      ({{ hub_id | default(1) }}a/{{ hub_id | default(1) }}b/{{ hub_id | default(1) }}c) -- writes happen here
#   * Sink-1   ({{ sink1_id | default(2) }}a/{{ sink1_id | default(2) }}b/{{ sink1_id | default(2) }}c) -- filtered pull of users/sink1/* + orders/sink1/*
#   * Sink-2   ({{ sink2_id | default(3) }}a/{{ sink2_id | default(3) }}b/{{ sink2_id | default(3) }}c) -- filtered pull of users/sink2/* + orders/sink2/*
#
# Steps:
#   0.   Kill any leftover background workload from a previous interrupted run.  Validate inputs.
#   1.   Create db1 on all 3 clusters with the per-collection revisions config
#        (Users / Orders / Internal).  Wire filtered pull from Hub to both sinks.
#   2.   Seed Hub with 7 prefix buckets (~15k docs).  Wait for filtered drain -- each sink should
#        receive only its allowed prefixes; hub-only buckets stay on Hub.
#   3.   T0 baseline checkpoint -- cluster is quiet, all on v_old.  Check filter geometry holds at
#        the start (catches any seeding leak).
#   4.   Start W-1 + W-2 on Hub against ALL 7 buckets weighted 40/40/20 across collections
#        (users / orders / Internal) -- per the RPV-1 spec.  Both run ~50 ops/min combined
#        through sections 5..10.
#   5.   Upgrade step 1 -- variant A upgrades sink-1 (3 nodes one by one).
#   6.   Checkpoint A -- light checks (workloads still flowing): drain per cluster, marker
#        propagation, schema version dump (mixed), filter compliance, cross-sink isolation,
#        lane-inert on the just-upgraded nodes.
#   7.   Upgrade step 2 -- variant A upgrades hub.
#   8.   Checkpoint B -- same shape as Checkpoint A.
#   9.   Upgrade step 3 -- variant A upgrades sink-2.  All 9 nodes now on v_new.
#   10.  Endpoint checkpoint -- workloads still running; filter compliance + cross-sink isolation
#        + schema parity (every node v_new) + LANE-INERT (no '|' in any revision CV).
#   11.  Stop W-1 + W-2.  Wait for everything to settle.  Full final asserts -- per-bucket id-set
#        parity (all 7 buckets on their target clusters), revision count parity, no orphans,
#        cross-sink isolation, CV-BOUNDARY-BY-DBID (load-bearing -- tag-letter is too lax in T3).
#
# "Light checks" in sections 6, 8, 10 are safe under live writes -- marker doc reaches every
# destination, conflicts get resolved if they appear, binaries are on the expected version.  The
# strict everything-must-match checks happen in section 11 once W-1 + W-2 stop.
#
# 3 VARIANTS.  The RPV-1 spec calls for 3 upgrade orders:
#   * Variant A -- sinks first (sink-1 -> hub -> sink-2).  Default.
#   * Variant B -- hub first.
#   * Variant C -- seeded random shuffle of all 9 nodes.
# Switch variants by overriding the three upgrade_step_N lists on the CLI; the rest of the
# scenario is identical.  Variant A is the only one wired with defaults today.
#
# Deep version (invariants, risks, validators) -> EMR_TESTING_PLAN/.
#
# PREREQ -- bring up a clean T3 (3-cluster x 3-node) lab at v_old.
#
#   1. ansible-playbook playbooks/teardown_containers.yml -K
#   2. ansible-playbook playbooks/provision_nodes.yml -K -e clusters_count=3 -e nodes_per_cluster=3
#   3. ansible-playbook playbooks/install_ravendb.yml -K -e rdb_version=6.2.15
#   4. ansible-playbook playbooks/form_clusters.yml -K -e clusters_count=3 -e nodes_per_cluster=3
#
# RUN -- pick one of the 3 variants.  Same scenario, only the upgrade order differs.
#
#   # Variant A -- SINKS FIRST (the default if you pass nothing extra).
#   #   sink-1 -> hub -> sink-2.  Stresses v_old-sender -> v_new-receiver at Checkpoint A.
#   ansible-playbook scenarios/EMR/RPV1/rpv1.yml -K \
#       -e v_old=6.2.15 \
#       -e v_new_build=$PWD/builds/raven-prNNN.deb
#
#   # Variant B -- HUB FIRST.
#   #   hub -> sink-1 -> sink-2.  Stresses v_new-sender -> v_old-receivers at Checkpoint A.
#   ansible-playbook scenarios/EMR/RPV1/rpv1.yml -K \
#       -e v_old=6.2.15 \
#       -e v_new_build=$PWD/builds/raven-prNNN.deb \
#       -e '{"upgrade_step_1":["{{ hub_id | default(1) }}a","{{ hub_id | default(1) }}b","{{ hub_id | default(1) }}c"],
#            "upgrade_step_2":["{{ sink1_id | default(2) }}a","{{ sink1_id | default(2) }}b","{{ sink1_id | default(2) }}c"],
#            "upgrade_step_3":["{{ sink2_id | default(3) }}a","{{ sink2_id | default(3) }}b","{{ sink2_id | default(3) }}c"]}'
#
#   # Variant C -- INTERLEAVED (seeded random shuffle of all 9 nodes, 3 per step).
#   #   Dwells in intra-cluster mixed-binary states (1 v_new + 2 v_old inside one cluster).
#   #   The example shuffle below is one valid seed; swap node names to use a different seed.
#   ansible-playbook scenarios/EMR/RPV1/rpv1.yml -K \
#       -e v_old=6.2.15 \
#       -e v_new_build=$PWD/builds/raven-prNNN.deb \
#       -e '{"upgrade_step_1":["{{ sink1_id | default(2) }}a","{{ hub_id | default(1) }}b","{{ sink2_id | default(3) }}c"],
#            "upgrade_step_2":["{{ hub_id | default(1) }}a","{{ sink2_id | default(3) }}b","{{ sink1_id | default(2) }}c"],
#            "upgrade_step_3":["{{ sink2_id | default(3) }}a","{{ hub_id | default(1) }}c","{{ sink1_id | default(2) }}b"]}'
#
# OPT-IN: -e pause_between_sections=true makes the playbook wait for ENTER before each
# section (useful for demo / showcase walkthroughs).  Default off.  The W-1 + W-2 background
# workloads keep running during the pause -- NOT for unattended / production runs.
##################################################################################################


# =====================================================================================
# SECTION 0 -- kill any orphan W-1 / W-2 from a previously interrupted run + validate
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 0 -- kill orphan workloads + validate inputs" }

- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars:
    pidfile: "/tmp/w1-{{ hub_id | default(1) }}a-db1.pid"

- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars:
    pidfile: "/tmp/w2-{{ hub_id | default(1) }}a-db1.pid"

- name: RPV-1 SECTION 0 -- validate inputs + show plan
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - v_old is defined
          - v_new_build is defined
        fail_msg: "Required: -e v_old=<6.2.x version> -e v_new_build=<path to v_new .deb>"

    - name: Show plan
      ansible.builtin.debug:
        msg: >-
          RPV-1  v_old={{ v_old }}  v_new_build={{ v_new_build }}
          upgrade_step_1={{ upgrade_step_1 }}
          upgrade_step_2={{ upgrade_step_2 }}
          upgrade_step_3={{ upgrade_step_3 }}


# =====================================================================================
# SECTION 1 -- create db1 on all 3 clusters + per-collection revisions
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 1 -- create db1 on hub + both sinks + per-collection revisions" }

- name: RPV-1 SECTION 1 -- create db1 on hub + both sinks
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 1 -- create db1 on hub + both sinks ===="

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ hub_id | default(1) }}a", db_name: db1, replication_factor: 3 }

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ sink1_id | default(2) }}a", db_name: db1, replication_factor: 3 }

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ sink2_id | default(3) }}a", db_name: db1, replication_factor: 3 }

# Per-collection revisions config -- per the RPV-1 spec recipe step 1: "create database
# with the plan's per-collection revisions config (Users / Orders / Internal)".
- ansible.builtin.import_playbook: ../../../toolbox/db/configure_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    collections_config:
      Users:    { keep: 10, max_age_secs: 1800 }
      Orders:   { keep: 50, max_age_secs: 7200 }
      Internal: { keep: 25, max_age_secs: 21600 }

- ansible.builtin.import_playbook: ../../../toolbox/db/configure_revisions.yml
  vars:
    target: "{{ sink1_id | default(2) }}a"
    db_name: db1
    collections_config:
      Users:    { keep: 10, max_age_secs: 1800 }
      Orders:   { keep: 50, max_age_secs: 7200 }
      Internal: { keep: 25, max_age_secs: 21600 }

- ansible.builtin.import_playbook: ../../../toolbox/db/configure_revisions.yml
  vars:
    target: "{{ sink2_id | default(3) }}a"
    db_name: db1
    collections_config:
      Users:    { keep: 10, max_age_secs: 1800 }
      Orders:   { keep: 50, max_age_secs: 7200 }
      Internal: { keep: 25, max_age_secs: 21600 }


# =====================================================================================
# SECTION 2 -- wire filtered pull from Hub to both sinks
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 2 -- wire filtered pull from Hub to both sinks" }

- name: RPV-1 SECTION 2 -- wire filtered pull (Hub -> Sink-1, Sink-2)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 2 -- wire filtered pull (hub task + sink-pull tasks for both sinks) ===="

- ansible.builtin.import_playbook: ../../../toolbox/replication/define_hub.yml
  vars:
    hub_leader: "{{ hub_id | default(1) }}a"
    db_name: db1
    hub_task_name: rpv1-hub
    sink_cluster_ids:
      - "{{ sink1_id | default(2) | int }}"
      - "{{ sink2_id | default(3) | int }}"
    # Build the dict via a single Jinja expression -- templated KEYS inside a YAML dict
    # literal under import_playbook vars: don't reliably resolve (the key stays literal
    # "{{ sink1_id... }}", attach_sinks/define_hub's lookup misses, and AllowedHubToSinkPaths
    # silently falls back to ["*"] = WIDE-OPEN filter).  Verified live by querying the hub
    # access entry: docs from disallowed prefixes were replicating to the sink.
    sink_allowed_paths: >-
      {{
        {
          (sink1_id | default(2) | int | string): ['users/sink1/*', 'orders/sink1/*'],
          (sink2_id | default(3) | int | string): ['users/sink2/*', 'orders/sink2/*']
        }
      }}

- ansible.builtin.import_playbook: ../../../toolbox/replication/attach_sinks.yml
  vars:
    db_name: db1
    hub_task_name: rpv1-hub
    hub_topology_urls:
      - "https://{{ hub_id | default(1) }}a.hubsink.test:443"
      - "https://{{ hub_id | default(1) }}b.hubsink.test:443"
      - "https://{{ hub_id | default(1) }}c.hubsink.test:443"
    sink_cluster_ids:
      - "{{ sink1_id | default(2) | int }}"
      - "{{ sink2_id | default(3) | int }}"
    # Build the dict via a single Jinja expression -- templated KEYS inside a YAML dict
    # literal under import_playbook vars: don't reliably resolve (the key stays literal
    # "{{ sink1_id... }}", attach_sinks/define_hub's lookup misses, and AllowedHubToSinkPaths
    # silently falls back to ["*"] = WIDE-OPEN filter).  Verified live by querying the hub
    # access entry: docs from disallowed prefixes were replicating to the sink.
    sink_allowed_paths: >-
      {{
        {
          (sink1_id | default(2) | int | string): ['users/sink1/*', 'orders/sink1/*'],
          (sink2_id | default(3) | int | string): ['users/sink2/*', 'orders/sink2/*']
        }
      }}


# =====================================================================================
# SECTION 3 -- seed Hub with 7 prefix buckets + wait for filtered drain
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 3 -- seed Hub with 7 prefix buckets + wait for filtered drain" }

- name: RPV-1 SECTION 3 -- seed Hub with 7 prefix buckets
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 3 -- seed Hub with 7 prefix buckets, then wait for filtered drain ===="

# Users collection -- 3 buckets
- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: users/sink1
    collection: Users
    count: "{{ bucket_users_sink1 | default(2000) | int }}"
    revs_per_doc: 1

- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: users/sink2
    collection: Users
    count: "{{ bucket_users_sink2 | default(2000) | int }}"
    revs_per_doc: 1

- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: users/hub
    collection: Users
    count: "{{ bucket_users_hub | default(2000) | int }}"
    revs_per_doc: 1

# Orders collection -- 3 buckets
- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: orders/sink1
    collection: Orders
    count: "{{ bucket_orders_sink1 | default(2000) | int }}"
    revs_per_doc: 1

- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: orders/sink2
    collection: Orders
    count: "{{ bucket_orders_sink2 | default(2000) | int }}"
    revs_per_doc: 1

- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: orders/hub
    collection: Orders
    count: "{{ bucket_orders_hub | default(2000) | int }}"
    revs_per_doc: 1

# Internal collection
- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ hub_id | default(1) }}a"
    db_name: db1
    id_prefix: Internal
    collection: Internal
    count: "{{ bucket_internal | default(3000) | int }}"
    revs_per_doc: 1

# Wait for Hub itself to settle
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_quiescence.yml
  vars:
    db_name: db1
    nodes: ["{{ hub_id | default(1) }}a", "{{ hub_id | default(1) }}b", "{{ hub_id | default(1) }}c"]
    timeout: "{{ quiesce_budget_secs | default(1200) | int }}"

# Confirm filtered pull is flowing -- a sink-1-filter-matching marker should reach the sink-1
# cluster, and a sink-2-filter-matching marker should reach the sink-2 cluster.
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_marker_propagation.yml
  vars:
    db_name: db1
    source: "{{ hub_id | default(1) }}a"
    targets: ["{{ sink1_id | default(2) }}a", "{{ sink1_id | default(2) }}b", "{{ sink1_id | default(2) }}c"]
    marker_id_prefix: "users/sink1/marker-"
    timeout_secs: "{{ filter_drain_budget_secs | default(600) | int }}"

- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_marker_propagation.yml
  vars:
    db_name: db1
    source: "{{ hub_id | default(1) }}a"
    targets: ["{{ sink2_id | default(3) }}a", "{{ sink2_id | default(3) }}b", "{{ sink2_id | default(3) }}c"]
    marker_id_prefix: "users/sink2/marker-"
    timeout_secs: "{{ filter_drain_budget_secs | default(600) | int }}"

# NOTE: no sink-side wait_for_quiescence here.  Under bidirectional pull replication
# (HubToSink + SinkToHub), the sink cluster's "responsible node" for the pull is the only
# one that registers a self-tag etag in its DatabaseChangeVector -- the other 2 nodes
# report shorter CVs.  Data is identical across the 3 sink nodes (counts match exactly);
# only the CV-reporting is asymmetric.  wait_for_quiescence demands strict CV equality,
# which is structurally impossible on a sink under bidirectional pull.  The marker
# propagation above is the live-write-safe sync gate; data parity is checked at Section 4
# (T0 baseline) and Section 12 (endpoint) via doc-id-set parity, which compares actual
# data not CV strings.


# =====================================================================================
# SECTION 4 -- T0 baseline checkpoint -- cluster is quiet, all on v_old
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 4 -- T0 baseline (all-v_old, full validator suite)" }

- name: RPV-1 SECTION 4 -- T0 baseline checkpoint
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 4 -- T0 baseline (everything quiet on v_old) ===="

# Filter geometry must hold from the start -- catches seeding leaks
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_filter_compliance.yml
  vars:
    sink_cluster_leader: "{{ sink1_id | default(2) }}a"
    db_name: db1
    allowed_prefixes: ["users/sink1/", "orders/sink1/"]

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_filter_compliance.yml
  vars:
    sink_cluster_leader: "{{ sink2_id | default(3) }}a"
    db_name: db1
    allowed_prefixes: ["users/sink2/", "orders/sink2/"]

# All 9 nodes report v_old.
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_schema_version.yml
  vars:
    nodes: ["{{ hub_id | default(1) }}a", "{{ hub_id | default(1) }}b", "{{ hub_id | default(1) }}c", "{{ sink1_id | default(2) }}a", "{{ sink1_id | default(2) }}b", "{{ sink1_id | default(2) }}c", "{{ sink2_id | default(3) }}a", "{{ sink2_id | default(3) }}b", "{{ sink2_id | default(3) }}c"]

# Sink-routed buckets present on the matching sink (skip-side I-7).
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars:
    db_name: db1
    nodes: ["{{ sink1_id | default(2) }}a", "{{ sink1_id | default(2) }}b", "{{ sink1_id | default(2) }}c"]
    id_prefix: users/sink1
    count: "{{ parity_probe_count | default(50) | int }}"

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars:
    db_name: db1
    nodes: ["{{ sink2_id | default(3) }}a", "{{ sink2_id | default(3) }}b", "{{ sink2_id | default(3) }}c"]
    id_prefix: users/sink2
    count: "{{ parity_probe_count | default(50) | int }}"

# Consolidated /stats parity at T0 (one GET per node, 12 fields).  Covers the spec's I-1 +
# I-5 + I-6 anchor invariants for T0 baseline.  Each cluster is asserted independently --
# they hold different bucket sets per filter geometry, so cross-cluster /stats parity would
# fail by design.
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_stats_parity.yml
  vars: { db_name: db1, nodes: ["{{ hub_id | default(1) }}a", "{{ hub_id | default(1) }}b", "{{ hub_id | default(1) }}c"] }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_stats_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink1_id | default(2) }}a", "{{ sink1_id | default(2) }}b", "{{ sink1_id | default(2) }}c"] }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_stats_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink2_id | default(3) }}a", "{{ sink2_id | default(3) }}b", "{{ sink2_id | default(3) }}c"] }


# =====================================================================================
# SECTION 5 -- start W-1 + W-2 on Hub.  Continuous through 6/7/8/9/10/11.
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 5 -- launch W-1 + W-2 background workloads on Hub" }

- name: RPV-1 SECTION 5 -- start W-1 + W-2 in background on Hub
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 5 -- launch W-1 + W-2 (hub-only buckets) ===="

    # W-1 + W-2 both run a weighted multi-bucket spec.  Per the RPV-1 spec the per-group
    # weighting is 40/40/20 across sink-1 / sink-2 / hub-only -- the buckets_spec encodes that.
    # Replication-filtered docs (sink1/sink2 prefixes) get pulled by their target sink; hub-only
    # buckets stay on Hub.  Both workloads write to the Hub leader ({{ hub_id | default(1) }}a).
    # Per the RPV-1 spec: "continuous from T0 through endpoint".  No duration_secs passed --
    # the workload runs indefinitely until Section 12 explicitly stops it via stop_workload.
    # No more "natural exit" race where workload duration was shorter than the scenario wall.
    - name: Launch W-1 (doc CRUD churn, 7-bucket 40/40/20 split)
      ansible.builtin.shell: |
        nohup ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml \
          -e target={{ hub_id | default(1) }}a -e db_name={{ db_name }} \
          -e 'buckets_spec={{ workload_buckets_spec }}' \
          </dev/null >/tmp/w1-rpv1.log 2>&1 &
        echo "W-1 background PID: $!"
      args:
        chdir: "{{ playbook_dir }}/../../.."

    - name: Launch W-2 (doc-extension churn, same 7-bucket 40/40/20 split)
      ansible.builtin.shell: |
        nohup ansible-playbook scenarios/EMR/workloads/w2/workload_w2.yml \
          -e target={{ hub_id | default(1) }}a -e db_name={{ db_name }} \
          -e 'buckets_spec={{ workload_buckets_spec }}' \
          </dev/null >/tmp/w2-rpv1.log 2>&1 &
        echo "W-2 background PID: $!"
      args:
        chdir: "{{ playbook_dir }}/../../.."

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars:
    pidfile: "/tmp/w1-{{ hub_id | default(1) }}a-db1.pid"
    timeout: 30

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars:
    pidfile: "/tmp/w2-{{ hub_id | default(1) }}a-db1.pid"
    timeout: 30


# =====================================================================================
# SECTION 6 -- UPGRADE STEP 1 (variant A: sink-1 nodes {{ sink1_id | default(2) }}a -> {{ sink1_id | default(2) }}b -> {{ sink1_id | default(2) }}c)
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 6 -- upgrade step 1 ({{ upgrade_step_1 | default([((sink1_id | default(2)) | string) ~ 'a', ((sink1_id | default(2)) | string) ~ 'b', ((sink1_id | default(2)) | string) ~ 'c']) }})" }

- name: RPV-1 SECTION 6 -- upgrade step 1 (3 nodes from upgrade_step_1)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 6 -- upgrade step 1 ({{ upgrade_step_1 }}) ===="

    # Variant-agnostic: upgrade each node THEN wait_for_member with the peer derived from
