# Each bucket is checked on the cluster where it's expected to live.  Literals inlined --
# all_buckets in vars.yml isn't reachable from import_playbook vars context (vars_files
# only applies inside plays).
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink1_id | default(2) }}a","{{ sink1_id | default(2) }}b","{{ sink1_id | default(2) }}c"], id_prefix: "users/sink1",  count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink1_id | default(2) }}a","{{ sink1_id | default(2) }}b","{{ sink1_id | default(2) }}c"], id_prefix: "orders/sink1", count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink2_id | default(3) }}a","{{ sink2_id | default(3) }}b","{{ sink2_id | default(3) }}c"], id_prefix: "users/sink2",  count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ sink2_id | default(3) }}a","{{ sink2_id | default(3) }}b","{{ sink2_id | default(3) }}c"], id_prefix: "orders/sink2", count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ hub_id | default(1) }}a","{{ hub_id | default(1) }}b","{{ hub_id | default(1) }}c"], id_prefix: "users/hub",    count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ hub_id | default(1) }}a","{{ hub_id | default(1) }}b","{{ hub_id | default(1) }}c"], id_prefix: "orders/hub",   count: "{{ parity_probe_count | default(50) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
  vars: { db_name: db1, nodes: ["{{ hub_id | default(1) }}a","{{ hub_id | default(1) }}b","{{ hub_id | default(1) }}c"], id_prefix: "Internal",     count: "{{ parity_probe_count | default(50) | int }}" }

# ---------- Filter compliance per sink ---------------------------------------------------
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_filter_compliance.yml
  vars:
    sink_cluster_leader: "{{ sink1_id | default(2) }}a"
    db_name: db1
    allowed_prefixes: ["users/sink1/", "orders/sink1/"]

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_filter_compliance.yml
  vars:
    sink_cluster_leader: "{{ sink2_id | default(3) }}a"
    db_name: db1
    allowed_prefixes: ["users/sink2/", "orders/sink2/"]

# ---------- Filter invariant (v) -- no leak across sinks ---------------------------------
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_cross_sink_isolation.yml
  vars:
    db_name: db1
    sink_cluster_leader: "{{ sink1_id | default(2) }}a"
    forbidden_prefixes: ["users/sink2/", "orders/sink2/"]

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_cross_sink_isolation.yml
  vars:
    db_name: db1
    sink_cluster_leader: "{{ sink2_id | default(3) }}a"
    forbidden_prefixes: ["users/sink1/", "orders/sink1/"]

# Note: cv_boundary_by_dbid (I-13) now lives in Section 11 endpoint -- per the RPV-1 spec
# that's where the "full I-13 suite" runs (strict_v_new=true).  Sec 12 here is convergence
# parity on a quiet cluster; the lane-validation check belongs upstream at the endpoint.


- name: RPV-1 -- DONE
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: >-
          RPV-1 PASS  hub=[{{ hub_id | default(1) }}a,{{ hub_id | default(1) }}b,{{ hub_id | default(1) }}c]  sink-1=[{{ sink1_id | default(2) }}a,{{ sink1_id | default(2) }}b,{{ sink1_id | default(2) }}c]  sink-2=[{{ sink2_id | default(3) }}a,{{ sink2_id | default(3) }}b,{{ sink2_id | default(3) }}c]  db=db1
          cross-cluster rolling upgrade + filter geometry + CV-boundary all held
