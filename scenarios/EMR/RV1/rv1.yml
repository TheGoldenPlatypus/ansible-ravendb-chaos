    writers: "{{ phase2_writers | default(8) | int }}"
    collection: "{{ phase2_hot_collection | default('HotDocs') }}"

# Post-W-3 controller cooldown -- W-3 fires ~12k short-lived curl connections in 30-300s
# (8 workers x ~10 curls/sec each).  Every TCP socket lingers ~60s in TIME_WAIT on the
# controller; without this idle, the next /stats probe hits EADDRNOTAVAIL ("Cannot assign
# requested address") because the local ephemeral-port pool is exhausted.  Sleeps until
# TIME_WAIT sockets recycle.  Override -e w3_cooldown_secs=0 if you've widened the local
# ephemeral-port range / enabled tcp_tw_reuse.
- name: RV-1 SECTION 10 -- post-W-3 controller TCP cooldown
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Pause {{ w3_cooldown_secs | default(45) | int }}s for controller-side TIME_WAIT sockets to recycle
      ansible.builtin.pause:
        seconds: "{{ w3_cooldown_secs | default(45) | int }}"
      when: (w3_cooldown_secs | default(45) | int) > 0

- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_docs_drain.yml
  vars: { db_name: db1, nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"], timeout: "{{ drain_budget_secs | default(180) | int }}" }

# Post-W-3 tombstone convergence wait -- W-3's 5-op iteration includes a DELETE every cycle,
