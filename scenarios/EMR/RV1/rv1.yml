# W-3 runs synchronously (foreground) -- it's a bounded 5-min churn, not a continuous backdrop.
- ansible.builtin.import_playbook: ../../../scenarios/EMR/workloads/w3/workload_w3.yml
  vars:
    target: "{{ cluster_id | default(1) }}a"
