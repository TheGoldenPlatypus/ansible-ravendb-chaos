# =====================================================================================
# SECTION 12 -- Phase 3 launch: W-7 writer + W-7 reader on users/hot (60 min)
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 12 -- W-7 single-writer firehose on {{ phase3_doc_id | default('users/hot') }} ({{ phase3_duration_secs | default(3600) }}s)" }

- name: RV-1 SECTION 12 -- Phase 3 W-7 firehose + reader on users/hot
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 12 -- W-7 single-writer on {{ phase3_doc_id }} for {{ phase3_duration_secs }}s ===="

    - name: Launch W-7 writer (background, single loop)
      ansible.builtin.shell: |
        nohup ansible-playbook scenarios/EMR/workloads/w7/workload_w7.yml \
          -e target={{ cluster_id | default(1) }}a -e db_name={{ db_name }} \
          -e duration_secs={{ phase3_duration_secs }} \
          -e doc_id={{ phase3_doc_id }} \
          </dev/null >/tmp/w7-rv1.log 2>&1 &
        echo "W-7 writer background PID: $!"
      args:
        chdir: "{{ playbook_dir }}/../../.."

    - name: Launch W-7 reader (background, latency + voron stats sampler)
      ansible.builtin.shell: |
        nohup ansible-playbook scenarios/EMR/workloads/w7/workload_w7_reader.yml \
          -e target={{ cluster_id | default(1) }}a -e db_name={{ db_name }} \
          -e duration_secs={{ phase3_duration_secs }} \
          -e doc_id={{ phase3_doc_id }} \
          -e sample_interval={{ phase3_reader_sample_interval }} \
          -e stats_interval={{ phase3_reader_stats_interval }} \
          </dev/null >/tmp/w7r-rv1.log 2>&1 &
        echo "W-7 reader background PID: $!"
      args:
        chdir: "{{ playbook_dir }}/../../.."

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w7-{{ cluster_id | default(1) }}a-db1.pid", timeout: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid", timeout: 30 }

# Block here until both finish naturally (writer + reader honor duration_secs).
- name: RV-1 SECTION 12 -- wait for W-7 writer + reader to finish
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    # Poll the W-7 writer's pidfile + process every 5s.  Three outcomes:
    #   rc=0  pidfile gone           -> writer finished cleanly, stop polling (until: matches)
    #   rc=1  pidfile + pid alive    -> still running, retry
    #   rc=99 pidfile + pid dead     -> crashed leaving a stale pidfile, fail FAST (failed_when)
    # Without the rc=99 branch, a crash mid-Phase-3 would block here for `duration_secs+300`
    # before timing out -- this short-circuits to the actual failure.
    - name: Poll W-7 writer (fast-fail on crash, clean-exit on natural finish)
      ansible.builtin.shell: |
        set -u
        if [ ! -f /tmp/w7-{{ cluster_id | default(1) }}a-db1.pid ]; then echo "FINISHED"; exit 0; fi
        PID=$(cat /tmp/w7-{{ cluster_id | default(1) }}a-db1.pid 2>/dev/null || true)
        if [ -z "$PID" ]; then echo "FINISHED (empty pidfile)"; exit 0; fi
        if kill -0 "$PID" 2>/dev/null; then echo "RUNNING pid=$PID"; exit 1; fi
        echo "CRASHED pid=$PID (stale pidfile, process gone)"; exit 99
      register: w7_writer_poll
      changed_when: false
      failed_when: w7_writer_poll.rc == 99
      retries: "{{ (((phase3_duration_secs | int) + 300) / 5) | int }}"
      delay: 5
      until: w7_writer_poll.rc == 0

    - name: Poll W-7 reader (fast-fail on crash, clean-exit on natural finish)
      ansible.builtin.shell: |
        set -u
        if [ ! -f /tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid ]; then echo "FINISHED"; exit 0; fi
        PID=$(cat /tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid 2>/dev/null || true)
        if [ -z "$PID" ]; then echo "FINISHED (empty pidfile)"; exit 0; fi
        if kill -0 "$PID" 2>/dev/null; then echo "RUNNING pid=$PID"; exit 1; fi
        echo "CRASHED pid=$PID (stale pidfile, process gone)"; exit 99
      register: w7_reader_poll
      changed_when: false
      failed_when: w7_reader_poll.rc == 99
      retries: "{{ (((phase3_duration_secs | int) + 300) / 5) | int }}"
      delay: 5
      until: w7_reader_poll.rc == 0

    - name: Show W-7 reader log tail (latency + stats samples)
      ansible.builtin.shell: tail -n 30 /tmp/w7-reader-{{ cluster_id | default(1) }}a-db1.log || true
      register: w7r_tail
      changed_when: false

    - ansible.builtin.debug:
        msg: "W-7 reader log tail:\n{{ w7r_tail.stdout }}"

# Quiet after the firehose stops.
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_etag_parity.yml
  vars: { db_name: db1, nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"], timeout: "{{ quiesce_budget_secs | default(1200) | int }}" }

# Post-W-7 tombstone convergence wait -- even though W-7 only does PUTs (no deletes),
