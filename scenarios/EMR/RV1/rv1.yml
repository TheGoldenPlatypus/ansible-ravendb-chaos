##################################################################################################
# scenarios/EMR/RV1/rv1.yml -- single-cluster v_old -> v_new full chain + churn races +
#                              1M-revision single doc + count-parity sweep.
#
# 3-node cluster ({{ cluster_id | default(1) }}a/{{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c) starts all on v_old:
#
#   0.   Kill any leftover background workload from a previous interrupted run.  Validate inputs.
#   1.   Create db1 with a KEEP-ALL revisions config 
#   2.   Seed 10k docs x 5 revs = 50k v_old raw-CV revisions on {{ cluster_id | default(1) }}a, then wait for the cluster
#        to settle.
#   3.   T0 baseline -- cluster is quiet on v_old.  Schema-version dump + doc-count parity.
#   4.   Start W-1 x 4 writers in the background -- continuous CRUD on the seeded pool through
#        5 + 6 + 7.
#   5.   Upgrade {{ cluster_id | default(1) }}a to v_new through the full schema chain; wait for member; light checkpoint
#        (workloads still flowing -- schema-version dump + marker propagation {{ cluster_id | default(1) }}a -> {{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c);
#        delay `upgrade_delay_secs` (default 60s) before the next upgrade.
#   6.   Upgrade {{ cluster_id | default(1) }}b; wait for member; same light checkpoint; same delay.
#   7.   Upgrade {{ cluster_id | default(1) }}c; wait for member; stop W-1; wait for etag stability; poll
#        CountOfTombstones until cross-node parity (background cleanup convergence).
#   8.   Phase-1 final on a quiet cluster -- doc-count parity, revision-count parity on a sampled
#        probe set of seed ids, no orphan revisions, extension-stats parity, schema parity at
#        v_new, size envelope baseline capture.
#   9.   Pre-seed 1000 hot docs x 30 revs (lands as v_new hashed form), then wait to settle.
#   10.  Run W-3: 8 concurrent writers, each picking a random hot doc and doing
#        delete -> revert-from-revision -> put -> add attachment -> remove attachment.
#        Stop W-3, drain.
#   11.  Phase-2 checkpoint -- doc-count parity, revision-count parity on the hot pool,
#        no orphan revisions. 
#   12.  Start W-7 on users/hot in the background -- ONE writer loop hammering one doc
#        Start the W-7 reader alongside -- every 30s it fetches the full revision history
#        and times it; every 5 min it snapshots SizeOnDisk + CountOfRevisionDocuments.
#        Reader log: /tmp/w7-reader-{{ cluster_id | default(1) }}a-db1.log.  Block until both finish; quiet.
#   13.  Phase-3 checkpoint -- per-id revision-count parity on users/hot (count = whatever
#        the writer achieved, equal across the 3 nodes), no orphan revisions, size envelope
#        vs baseline.
#   14.  Phase-4 sparse-sample count-parity sweep -- revision-count parity probe on the seed
#        set + the hot pool + the 1M-revision single doc.
#   15.  Finish -- final size envelope snapshot + DONE.
#
# "Light checks" in 5/6 are safe under live writes: schema version dump (mixed expected),
# and a marker propagation probe (writes a marker doc on {{ cluster_id | default(1) }}a, polls until it appears on {{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c).
# NOT used mid-roll: wait_for_docs_drain (requires CV stillness, can't fire under continuous
# writes) and doc_count_parity (flickers across mixed-binary peers during the burst).  The
# strict everything-must-match checks happen in 8 / 11 / 13 / 14 once the relevant workload
# has stopped.
#
# Deep version (invariants, risks, validators) -> EMR_TESTING_PLAN/.
#
# PREREQ -- bring up a clean 3-node cluster at v_old.
#
#   1. ansible-playbook playbooks/teardown_containers.yml -K
#   2. ansible-playbook playbooks/provision_nodes.yml -K -e clusters_count=1 -e nodes_per_cluster=3
#   3. ansible-playbook playbooks/install_ravendb.yml -K -e rdb_version=6.2.15
#   4. ansible-playbook playbooks/form_clusters.yml -K -e clusters_count=1 -e nodes_per_cluster=3
#
# RUN:
#   ansible-playbook scenarios/EMR/RV1/rv1.yml -K \
#       -e v_old=6.2.15 \
#       -e v_new_build=$PWD/builds/raven-prNNN.deb
#
# OPT-IN: -e pause_between_sections=true makes the playbook wait for ENTER before each
# section (useful for demo / showcase walkthroughs).  Default off.  Background workloads
# (W-1, W-7) keep running during the pause -- NOT for unattended / production runs.
##################################################################################################


# =====================================================================================
# SECTION 0 -- kill any orphan workloads from a previously interrupted run + validate
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 0 -- kill orphan workloads + validate inputs" }

- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w3-{{ cluster_id | default(1) }}a-db1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w7-{{ cluster_id | default(1) }}a-db1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid" }

- name: RV-1 SECTION 0 -- validate inputs + show plan
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - v_old is defined
          - v_new_build is defined
        fail_msg: "Required: -e v_old=<6.2.x version> -e v_new_build=<path to v_new .deb>"

    - name: Show plan
      ansible.builtin.debug:
        msg: >-
          RV-1  v_old={{ v_old }}  v_new_build={{ v_new_build }}
          upgrade_order={{ upgrade_order }}
          phase1_seed={{ phase1_seed_count }}x{{ phase1_seed_revs_per_doc }}
          phase2_hot={{ phase2_hot_count }}x{{ phase2_hot_revs_per_doc }} writers={{ phase2_writers }} dur={{ phase2_churn_duration_secs }}s
          phase3_doc={{ phase3_doc_id }} dur={{ phase3_duration_secs }}s


# =====================================================================================
# SECTION 1 -- create db1 + KEEP-ALL revisions config (RV-1 spec: "override of the plan's default")
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 1 -- create db1 + keep-all revisions" }

- name: RV-1 SECTION 1 -- create db1 + keep-all revisions
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 1 -- create db1 on cluster 1 + KEEP-ALL revisions config ===="

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ cluster_id | default(1) }}a", db_name: db1, replication_factor: 3 }

# Keep-all = simple-mode configure_revisions with a huge MinimumRevisionsToKeep; no
# MinimumRevisionAgeToKeep means no age purge either.  Per the RV-1 spec: "phase 3 needs the
# 1M-revision history to accumulate."
- ansible.builtin.import_playbook: ../../../toolbox/db/configure_revisions.yml
  vars:
    target: "{{ cluster_id | default(1) }}a"
    db_name: db1
    minimum_revisions: 100000000


# =====================================================================================
# SECTION 2 -- seed 10k docs x 5 revs = 50k v_62 raw-CV revisions
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 2 -- seed {{ phase1_seed_count | default(10000) }} docs x {{ phase1_seed_revs_per_doc | default(5) }} revs (v_old raw-CV)" }

- name: RV-1 SECTION 2 -- seed v_old raw-CV revisions
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 2 -- seed {{ phase1_seed_count | default(10000) }} docs x {{ phase1_seed_revs_per_doc | default(5) }} revs = {{ (phase1_seed_count | default(10000) | int) * (phase1_seed_revs_per_doc | default(5) | int) }} v_old raw-CV revisions ===="

- ansible.builtin.import_playbook: ../../../toolbox/writes/write_docs_revisions.yml
  vars:
    target: "{{ cluster_id | default(1) }}a"
    db_name: db1
    id_prefix: "{{ phase1_seed_prefix | default('seed') }}"
    collection: "{{ phase1_seed_collection | default('MicroDocs') }}"
    count: "{{ phase1_seed_count | default(10000) | int }}"
    revs_per_doc: "{{ phase1_seed_revs_per_doc | default(5) | int }}"

- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_etag_parity.yml
  vars:
    db_name: db1
    nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
    timeout: "{{ quiesce_budget_secs | default(1200) | int }}"


# =====================================================================================
# SECTION 3 -- T0 baseline: schema_version dump (all 3 on v_old)
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 3 -- T0 baseline (all 3 on v_old)" }

- name: RV-1 SECTION 3 -- T0 baseline (everything on v_old)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 3 -- T0 baseline (3-node cluster on v_old) ===="

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_schema_version.yml
  vars:
    nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]

# I-1 baseline -- consolidated /stats parity (12 fields in one pass).
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_stats_parity.yml
  vars: { db_name: db1, nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"] }


# =====================================================================================
# SECTION 4 -- Phase 1 launch W-1 x 4 in background (continuous through upgrades)
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 4 -- launch W-1 x {{ phase1_writers | default(4) }} background writers" }

- name: RV-1 SECTION 4 -- launch W-1 x {{ phase1_writers | default(4) }} writers in background on {{ cluster_id | default(1) }}a
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 4 -- launch {{ phase1_writers }} W-1 writers on the seed pool ===="

    # Per the RV-1 spec: "Start W-1 at 4 writers."  Four parallel W-1 instances against the
    # same seed pool, distinct WRITER_ID per instance for unique pidfiles.  No duration --
    # workloads run indefinitely until Section 7 explicitly stops them via stop_workload.
    - name: Launch W-1 writer {{ item }} (background)
      ansible.builtin.shell: |
        nohup ansible-playbook scenarios/EMR/workloads/w1/workload_w1.yml \
          -e target={{ cluster_id | default(1) }}a -e db_name={{ db_name }} \
          -e id_prefix={{ phase1_seed_prefix }} \
          -e pool_size={{ phase1_seed_count }} \
          -e writer_id={{ item }} \
          </dev/null >/tmp/w1-rv1-w{{ item }}.log 2>&1 &
        echo "W-1 writer {{ item }} background PID: $!"
      args:
        chdir: "{{ playbook_dir }}/../../.."
      loop: "{{ range(1, (phase1_writers | int) + 1) | list }}"

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid", timeout: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid", timeout: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid", timeout: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid", timeout: 30 }


# =====================================================================================
# SECTION 5 -- Phase 1 upgrade {{ cluster_id | default(1) }}a -> wait_for_member -> mixed-binary checkpoint
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 5 -- upgrade {{ cluster_id | default(1) }}a + mid-roll checkpoint" }

- name: RV-1 SECTION 5 -- upgrade {{ cluster_id | default(1) }}a (full schema chain) + mixed checkpoint
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 5 -- upgrade {{ cluster_id | default(1) }}a ({{ cluster_id | default(1) }}a v_new, {{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c still v_old) ===="

    - name: Upgrade {{ cluster_id | default(1) }}a + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}a -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}a.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map['{{ cluster_id | default(1) }}a'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}a -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}a.log 2>&1
      args:
        chdir: "{{ playbook_dir }}/../../.."
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

# Per the RV-1 spec: "Checkpoint after {{ cluster_id | default(1) }}a: I-2 (CV), I-3 (proxy), I-4, I-10 ({{ cluster_id | default(1) }}a 72001, {{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c 62000)."
# Workloads still running -- use live-write-safe gates only.  Marker propagation (writes a
# marker doc on {{ cluster_id | default(1) }}a, polls until it appears on {{ cluster_id | default(1) }}b/{{ cluster_id | default(1) }}c) confirms replication is flowing despite
# the mixed-binary mid-roll state; schema_version dump confirms only {{ cluster_id | default(1) }}a moved to v_new.
# Drain + doc-count parity defer to Section 8 once W-1 stops.
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_marker_propagation.yml
  vars:
    db_name: db1
    source: "{{ cluster_id | default(1) }}a"
    targets: ["{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
    marker_id_prefix: "rv1/marker-post1a-"
    timeout_secs: 120

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_schema_version.yml
  vars: { nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"] }

# Delay before the next upgrade kicks off in Section 6 (configurable via upgrade_delay_secs).
- name: RV-1 SECTION 5 -- delay before next upgrade
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - name: Pause {{ upgrade_delay_secs | default(60) | int }}s before upgrading {{ cluster_id | default(1) }}b
      ansible.builtin.pause:
        seconds: "{{ upgrade_delay_secs | default(60) | int }}"
      when: (upgrade_delay_secs | default(60) | int) > 0


# =====================================================================================
# SECTION 6 -- Phase 1 upgrade {{ cluster_id | default(1) }}b -> wait_for_member -> mixed-binary checkpoint
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 6 -- upgrade {{ cluster_id | default(1) }}b + mid-roll checkpoint" }

- name: RV-1 SECTION 6 -- upgrade {{ cluster_id | default(1) }}b + mixed checkpoint
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 6 -- upgrade {{ cluster_id | default(1) }}b ({{ cluster_id | default(1) }}a/{{ cluster_id | default(1) }}b v_new, {{ cluster_id | default(1) }}c still v_old) ===="

    - name: Upgrade {{ cluster_id | default(1) }}b + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}b -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}b.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map['{{ cluster_id | default(1) }}b'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}b -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}b.log 2>&1
      args:
        chdir: "{{ playbook_dir }}/../../.."
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

# Same live-write-safe gates as Section 5.  After this step {{ cluster_id | default(1) }}a + {{ cluster_id | default(1) }}b are v_new, {{ cluster_id | default(1) }}c is still v_old.
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_marker_propagation.yml
  vars:
    db_name: db1
    source: "{{ cluster_id | default(1) }}a"
    targets: ["{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
    marker_id_prefix: "rv1/marker-post1b-"
    timeout_secs: 120

- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_schema_version.yml
  vars: { nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"] }

# Delay before the next upgrade kicks off in Section 7 (configurable via upgrade_delay_secs).
- name: RV-1 SECTION 6 -- delay before next upgrade
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - name: Pause {{ upgrade_delay_secs | default(60) | int }}s before upgrading {{ cluster_id | default(1) }}c
      ansible.builtin.pause:
        seconds: "{{ upgrade_delay_secs | default(60) | int }}"
      when: (upgrade_delay_secs | default(60) | int) > 0


# =====================================================================================
# SECTION 7 -- Phase 1 upgrade {{ cluster_id | default(1) }}c -> wait_for_member -> stop W-1 -> quiet
# =====================================================================================

- ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
  vars: { section_label: "SECTION 7 -- upgrade {{ cluster_id | default(1) }}c + stop W-1 + quiet" }

- name: RV-1 SECTION 7 -- upgrade {{ cluster_id | default(1) }}c + stop W-1 + quiet
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - ansible.builtin.debug:
        msg: "==== SECTION 7 -- upgrade {{ cluster_id | default(1) }}c (all 3 nodes v_new) + stop W-1 + quiet ===="

    - name: Upgrade {{ cluster_id | default(1) }}c + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}c -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}c.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map['{{ cluster_id | default(1) }}c'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}c -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}c.log 2>&1
      args:
        chdir: "{{ playbook_dir }}/../../.."
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

# Immediate post-upgrade version dump -- symmetric with Sec 5 / Sec 6 so the "{{ cluster_id | default(1) }}c is now v_new"
# moment is visible right here in the log, not buried in Section 8's final parity check.
- ansible.builtin.import_playbook: ../../../toolbox/diagnostic/diagnostic_schema_version.yml
  vars: { nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"] }

# Pre-stop liveness assertions -- catch silent W-1 deaths during Phase 1.  Without this,
# stop_workload would shrug "WORKLOAD ALREADY EXITED" and Phase 1 would pass with degraded
# write load instead of failing loud.
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }

# Per the RV-1 spec: "Stop W-1; quiet."
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }

- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_docs_drain.yml
  vars: { db_name: db1, nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"], timeout: "{{ drain_budget_secs | default(180) | int }}" }

- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_etag_parity.yml
  vars: { db_name: db1, nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"], timeout: "{{ quiesce_budget_secs | default(1200) | int }}" }

# Post-upgrade convergence wait -- RavenDB's background tombstone cleanup runs on its own
# timer; etag stability says "no new writes" but the cleanup job needs idle time to bring
# per-node tombstone counts into parity.  This polls until CountOfTombstones matches across
# every node (or times out).  Replaces a fragile fixed sleep -- exits fast when cleanup is
# fast, waits longer when it's slow, and fails loud with drift visible if genuinely stuck.
- ansible.builtin.import_playbook: ../../../toolbox/wait/wait_for_stats_field_parity.yml
  vars:
