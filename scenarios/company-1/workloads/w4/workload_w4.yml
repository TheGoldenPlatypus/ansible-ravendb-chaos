# Wrapper around workload_w4.sh -- see the .sh for the workload logic.
# Required: target, db_name, in_prefix, out_prefix, pool_size
# Optional: duration_secs (default 0 = run until killed via stop_workload)
#           writer_id      (pidfile suffix for parallel W-4 instances on same target+db)
#
# Example:
#   ansible-playbook scenarios/company-1/workloads/w4/workload_w4.yml \
#     -e target=1a -e db_name=db1 -e in_prefix=users -e out_prefix=orders \
#     -e pool_size=1000 -e duration_secs=120

- name: W-4 filter-boundary churn
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run workload_w4.sh
      ansible.builtin.command: "bash {{ playbook_dir }}/workload_w4.sh"
      environment:
        TARGET:        "{{ target }}"
        DB_NAME:       "{{ db_name }}"
        IN_PREFIX:     "{{ in_prefix }}"
        OUT_PREFIX:    "{{ out_prefix }}"
        POOL_SIZE:     "{{ pool_size }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        WRITER_ID:     "{{ writer_id     | default('') }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
      register: out

    - ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
