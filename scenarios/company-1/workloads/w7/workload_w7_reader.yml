# Wrapper around workload_w7_reader.sh -- see the .sh for what it samples.
# Required: target, db_name, duration_secs, doc_id
# Optional: sample_interval (default 30s history-fetch cadence)
#           stats_interval  (default 300s /stats snapshot cadence)
#           log_file        (default /tmp/w7-reader-<target>-<db>.log)
#
# Example:
#   ansible-playbook scenarios/company-1/workloads/w7/workload_w7_reader.yml \
#     -e target=1a -e db_name=db1 -e duration_secs=3600 -e doc_id=users/hot

- name: W-7 concurrent reader
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run workload_w7_reader.sh
      ansible.builtin.command: "bash {{ playbook_dir }}/workload_w7_reader.sh"
      environment:
        TARGET:          "{{ target }}"
        DB_NAME:         "{{ db_name }}"
        DURATION_SECS:   "{{ duration_secs }}"
        DOC_ID:          "{{ doc_id }}"
        SAMPLE_INTERVAL: "{{ sample_interval | default(30) }}"
        STATS_INTERVAL:  "{{ stats_interval  | default(300) }}"
        LOG_FILE:        "{{ log_file        | default('') }}"
        RAVEN_DOMAIN:    "{{ ravendb_domain }}"
        CERT_PEM:        "{{ cert_dir }}/client.pem"
        CA_CRT:          "{{ cert_ca_crt }}"
      register: out

    - ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
