# Wrapper around workload_w5.sh -- see the .sh for the workload logic.
# Launch TWO instances (one per partitioned side, same db_name / id_prefix / pool_size,
# distinct side_label) so heal produces conflicts.
#
# Required: target, db_name, id_prefix, pool_size, side_label
# Optional: duration_secs (default 0 = run until killed via stop_workload)
#
# Example (one side):
#   ansible-playbook scenarios/company-1/workloads/w5/workload_w5.yml \
#     -e target=1a -e db_name=db1 -e id_prefix=users/conflict -e pool_size=200 \
#     -e side_label=majority -e duration_secs=120

- name: W-5 conflict generator (single side)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run workload_w5.sh
      ansible.builtin.command: "bash {{ playbook_dir }}/workload_w5.sh"
      environment:
        TARGET:        "{{ target }}"
        DB_NAME:       "{{ db_name }}"
        ID_PREFIX:     "{{ id_prefix }}"
        POOL_SIZE:     "{{ pool_size }}"
        SIDE_LABEL:    "{{ side_label }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
      register: out

    - ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
