# Wrapper around workload_w1c.sh -- see the .sh for the workload logic.
# W-1C is the CLUSTER-WIDE-TX sidecar to W-1.  Same ID semantics, same bucket spec
# format, same pidfile convention as W-1 except the prefix is "w1c-" not "w1-".
#
# Required: target, db_name
# One of:   id_prefix + pool_size      OR     buckets_spec
# Optional: duration_secs (default 0 = run until killed via stop_workload)
#           writer_id      (pidfile suffix for parallel W-1C instances on same target+db)
#
# Example:
#   ansible-playbook scenarios/company-1/workloads/w1c/workload_w1c.yml \
#     -e target=1a -e db_name=db1 -e id_prefix=seed -e pool_size=10000 -e duration_secs=300

- name: W-1C doc CRUD mix (cluster-wide tx, 60/30/10)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run workload_w1c.sh
      ansible.builtin.command: "bash {{ playbook_dir }}/workload_w1c.sh"
      environment:
        TARGET:        "{{ target }}"
        DB_NAME:       "{{ db_name }}"
        DURATION_SECS: "{{ duration_secs | default(0) }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
        BUCKETS_SPEC:  "{{ buckets_spec | default('') }}"
        ID_PREFIX:     "{{ id_prefix    | default('') }}"
        POOL_SIZE:     "{{ pool_size    | default('') }}"
        WRITER_ID:     "{{ writer_id    | default('') }}"
      register: out

    - ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
