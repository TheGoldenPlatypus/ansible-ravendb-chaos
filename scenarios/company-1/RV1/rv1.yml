# ----- step 11: W-7 -- a single-doc firehose writer plus a paired reader on users/hot ---------

- name: RV-1 step 11 -- launch W-7 writer + reader (background)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Launch W-7 writer (single loop, background async)
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/../workloads/w7/workload_w7.sh"
      environment:
        TARGET:        "{{ cluster_id | default(1) }}a"
        DB_NAME:       "{{ db_name }}"
        DURATION_SECS: "{{ phase3_duration_secs }}"
        DOC_ID:        "{{ phase3_doc_id }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
      async: "{{ phase3_duration_secs | int + 600 }}"
      poll: 0

    - name: Launch W-7 reader (latency + voron sampler, background async)
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/../workloads/w7/workload_w7_reader.sh"
      environment:
        TARGET:          "{{ cluster_id | default(1) }}a"
        DB_NAME:         "{{ db_name }}"
        DURATION_SECS:   "{{ phase3_duration_secs }}"
        DOC_ID:          "{{ phase3_doc_id }}"
        SAMPLE_INTERVAL: "{{ phase3_reader_sample_interval }}"
        STATS_INTERVAL:  "{{ phase3_reader_stats_interval }}"
        RAVEN_DOMAIN:    "{{ ravendb_domain }}"
        CERT_PEM:        "{{ cert_dir }}/client.pem"
        CA_CRT:          "{{ cert_ca_crt }}"
      async: "{{ phase3_duration_secs | int + 600 }}"
      poll: 0

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w7-{{ cluster_id | default(1) }}a-db1.pid", timeout_secs: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid", timeout_secs: 30 }

# Block until both processes finish on their own -- writer and reader both stop at duration_secs.
- name: RV-1 step 11 -- wait for W-7 writer + reader to finish
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Wait for W-7 writer to finish (internal loop, no retry spam)
      ansible.builtin.shell: |
        set -u
        pidfile=/tmp/w7-{{ cluster_id | default(1) }}a-db1.pid
        deadline=$(( $(date +%s) + {{ phase3_duration_secs | int + 300 }} ))
        while [ $(date +%s) -lt $deadline ]; do
          if [ ! -f "$pidfile" ]; then echo "FINISHED"; exit 0; fi
          PID=$(cat "$pidfile" 2>/dev/null || true)
          if [ -z "$PID" ]; then echo "FINISHED (empty pidfile)"; exit 0; fi
          if ! kill -0 "$PID" 2>/dev/null; then echo "CRASHED pid=$PID (stale pidfile, process gone)"; exit 99; fi
          sleep 5
        done
        echo "TIMEOUT after {{ phase3_duration_secs | int + 300 }}s"; exit 124
      register: w7_writer_poll
      changed_when: false

    - name: Wait for W-7 reader to finish (internal loop, no retry spam)
      ansible.builtin.shell: |
        set -u
        pidfile=/tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid
        deadline=$(( $(date +%s) + {{ phase3_duration_secs | int + 300 }} ))
        while [ $(date +%s) -lt $deadline ]; do
          if [ ! -f "$pidfile" ]; then echo "FINISHED"; exit 0; fi
          PID=$(cat "$pidfile" 2>/dev/null || true)
          if [ -z "$PID" ]; then echo "FINISHED (empty pidfile)"; exit 0; fi
          if ! kill -0 "$PID" 2>/dev/null; then echo "CRASHED pid=$PID (stale pidfile, process gone)"; exit 99; fi
          sleep 5
        done
        echo "TIMEOUT after {{ phase3_duration_secs | int + 300 }}s"; exit 124
      register: w7_reader_poll
      changed_when: false

    - name: Show W-7 reader log tail
      ansible.builtin.shell: tail -n 30 /tmp/w7-reader-{{ cluster_id | default(1) }}a-db1.log || true
      register: w7r_tail
      changed_when: false

    - name: Show W-7 reader log tail
      ansible.builtin.debug:
        msg: "{{ ['W-7 reader log tail:'] + w7r_tail.stdout_lines }}"

    - name: "Post-W-7: wait for etag parity across a/b/c"
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        timeout: "{{ quiesce_budget_secs | default(1200) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Post-W-7: wait for tombstone-count convergence across a/b/c"
      ravendb_wait:
        kind: stats_field_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        fields: ["CountOfTombstones"]
        timeout: "{{ tombstone_settle_timeout_secs | default(300) | int }}"
        poll_interval: 3
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


