##################################################################################################
# scenarios/company-1/RV1/rv1.yml
#
# One 3-node cluster (1a/1b/1c).  Starts on RavenDB 6.2.15 and gets rolled, one node at a time,
# onto the build under test.  After the upgrade the same cluster has to survive heavy churn and
# one ridiculously revisioned document.
#
# What this scenario does:
#   pre.  Sanity-check inputs.  Kill any background workloads still hanging around from a
#         previous run.
#   1.    Create the database with revisions set to keep everything, then seed it with 10k
#         docs x 5 revisions each (= 50k revisions written by the old build).
#   2.    Capture a baseline while the cluster is still quiet on the old build: schema version
#         on every node, plus a /stats parity check across the three nodes.
#   3.    Launch four background writers (W-1).  They keep writing all the way through the
#         upgrade window so the rolling upgrade has to cope with live traffic.
#   4.    Upgrade node 1a to the new build.  Run light mid-roll checks that are safe with
#         mixed-version peers (a marker doc has to propagate, schema versions are dumped),
#         then pause before the next node.
#   5.    Upgrade node 1b.  Same light mid-roll checks + pause.
#   6.    Upgrade node 1c.  Stop the background writers.  Wait for replication to drain and
#         for tombstone counts across all three nodes to converge.
#   7.    Cluster is fully on the new build and quiet -- run the phase-1 assertions:
#         /stats parity, per-doc revision-count parity for the seed pool, no orphan revisions,
#         schema versions identical across all nodes, and a size envelope baseline snapshot.
#   8.    Seed a hot pool of 1000 docs x 30 revisions each (written by the new build), then
#         wait for the cluster to settle.
#   9.    Run W-3: 8 concurrent writers spend 5 minutes doing
#         delete -> revert -> put -> add attachment -> remove attachment loops on the hot pool.
#         Stop, drain, wait for tombstone counts to converge.
#   10.   Phase-2 checkpoint on the hot pool: /stats parity, revision-count parity, no orphans.
#   11.   Launch W-7 -- a single writer hammering one document (users/hot) plus a paired reader
#         that samples latency and Voron stats.  Block until both finish naturally, then drain.
#   12.   Phase-3 checkpoint focused on that one mega-doc: /stats parity, revision count for
#         users/hot lines up across all nodes, no orphans, size envelope vs baseline.
#   13.   Phase-4 sweep: revision-count parity across all three pools (seed, hot, the mega-doc).
#   14.   Final size envelope snapshot, then done.
#
# The "light checks" in steps 4 and 5 are deliberately the only ones safe to run while peers
# are on different binaries: dumping schema versions (a mix is expected) and watching a marker
# doc propagate.  Stricter checks (full drain waits, doc-count parity) are saved for the quiet
# checkpoints in steps 7, 10, 12 and 13 where every node is on the new build.
#
# Deep version (invariants, risks, validators) -> company-1_TESTING_PLAN/scenarios.md (RV-1).
#
# PREREQ -- bring up a clean 3-node cluster on RavenDB 6.2.15.
#
#   1. ansible-playbook playbooks/teardown_containers.yml -K
#   2. ansible-playbook playbooks/provision_nodes.yml -K -e clusters_count=1 -e nodes_per_cluster=3
#   3. ansible-playbook playbooks/install_ravendb.yml -K -e rdb_version=6.2.15
#   4. ansible-playbook playbooks/form_clusters.yml -K -e clusters_count=1 -e nodes_per_cluster=3
#
# RUN:
#   ansible-playbook scenarios/company-1/RV1/rv1.yml -K \
#       -e v_old=6.2.15 -e v_new_build=$PWD/builds/raven-prNNN.deb
##################################################################################################


# ----- pre: orphan-kill + validate ------------------------------------------------------------

- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w3-{{ cluster_id | default(1) }}a-db1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w7-{{ cluster_id | default(1) }}a-db1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w7r-{{ cluster_id | default(1) }}a-db1.pid" }

- name: RV-1 pre -- validate inputs + show plan
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - v_old is defined
          - v_new_build is defined
        fail_msg: "Required: -e v_old=<6.2.x version> -e v_new_build=<path to v_new .deb>"

    - name: Show RV-1 plan
      ansible.builtin.debug:
        msg: >-
          RV-1  v_old={{ v_old }}  v_new_build={{ v_new_build }}  order={{ upgrade_order }}
          phase1_seed={{ phase1_seed_count }}x{{ phase1_seed_revs_per_doc }}
          phase2_hot={{ phase2_hot_count }}x{{ phase2_hot_revs_per_doc }} writers={{ phase2_writers }} dur={{ phase2_churn_duration_secs }}s
          phase3_doc={{ phase3_doc_id }} dur={{ phase3_duration_secs }}s


# ----- step 1: create the database (keep every revision) and seed 50k old-build revisions -----

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ cluster_id | default(1) }}a", db_name: db1, replication_factor: 3 }

- name: RV-1 step 1 -- configure keep-all revisions + seed 50k v_62 revs
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    # Keep every revision forever -- phase 3 hammers a single doc with ~1M revisions and we
    # need the full history to stay around.
    - name: "Configure keep-all revisions on 1a/db1 (minimum_revisions=1e8)"
      ravendb_revisions:
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ cluster_id | default(1) }}a"
        db_name: db1
        minimum_revisions: 100000000
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # 10k docs x 5 distinct revisions each = 50k revisions, all written by the old build on 1a.
    - name: "Phase 1 seed: write seed/* on 1a/db1 (10k x 5 v_62 raw-CV revisions)"
      ravendb_writes:
        kind: docs_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ cluster_id | default(1) }}a"
        db_name: db1
        id_prefix: "{{ phase1_seed_prefix | default('seed') }}"
        collection: "{{ phase1_seed_collection | default('MicroDocs') }}"
        count: "{{ phase1_seed_count | default(10000) | int }}"
        revs_per_doc: "{{ phase1_seed_revs_per_doc | default(5) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Let the cluster settle before moving on.
    - name: "Wait for etag parity across cluster a/b/c (post-seed quiescence)"
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        timeout: "{{ quiesce_budget_secs | default(1200) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 2: baseline snapshot while the cluster is still quiet on the old build ------------

- name: RV-1 step 2 -- T0 baseline (3 nodes on v_62, quiet)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "T0 baseline: dump schema version on a/b/c (expect all v_old)"
      ravendb_diagnostic:
        kind: schema_version
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "T0 baseline: assert /stats parity across a/b/c (quiet v_old)"
      ravendb_diagnostic:
        kind: stats_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        assert_fields: "{{ t0_stats_assert_fields }}"
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 3: start the four background writers that keep traffic flowing during the upgrade -

- name: RV-1 step 3 -- launch W-1 x {{ phase1_writers | default(4) }} writers in background
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Launch W-1 writer (background, async)
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/../workloads/w1/workload_w1.sh"
      environment:
        TARGET:        "{{ cluster_id | default(1) }}a"
        DB_NAME:       "{{ db_name }}"
        ID_PREFIX:     "{{ phase1_seed_prefix }}"
        POOL_SIZE:     "{{ phase1_seed_count }}"
        WRITER_ID:     "{{ item }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
      async: 14400  # 4h backstop; stopped explicitly via stop_workload
      poll: 0
      loop: "{{ range(1, (phase1_writers | int) + 1) | list }}"
      loop_control:
        label: "{{ item }}"

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid", timeout_secs: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid", timeout_secs: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid", timeout_secs: 30 }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid", timeout_secs: 30 }


# ----- step 4: upgrade node 1a and run the light mid-roll checkpoint --------------------------

- name: RV-1 step 4 -- upgrade {{ cluster_id | default(1) }}a (full schema chain) + mixed checkpoint
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Upgrade {{ cluster_id | default(1) }}a + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}a -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}a.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map[((cluster_id | default(1)) | string) ~ 'a'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}a -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}a.log 2>&1
      args: { chdir: "{{ playbook_dir }}/../../.." }
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

- name: RV-1 step 4 -- mid-roll light checkpoint + delay
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    # Send a marker doc from 1a and confirm it reaches 1b and 1c -- proves replication still
    # moves between the new build and the old build.
    - name: "Mid-roll: wait for rv1/marker-post1a-* propagation 1a -> 1b/1c"
      ravendb_wait:
        kind: marker_propagation
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        source: "{{ cluster_id | default(1) }}a"
        targets: ["{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        marker_id_prefix: "rv1/marker-post1a-"
        timeout: 120
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Dump the schema version on each node.  At this point 1a is on the new build while
    # 1b and 1c are still on the old build -- the dump is just for visibility, no assert.
    - name: "Mid-roll: dump schema version on a/b/c (1a v_new, 1b/1c v_old expected)"
      ravendb_diagnostic:
        kind: schema_version
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Mid-roll: assert zero orphan revisions on a/b/c (I-4)"
      ravendb_diagnostic:
        kind: orphan_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Pause before upgrading {{ cluster_id | default(1) }}b
      ansible.builtin.pause:
        seconds: "{{ upgrade_delay_secs | default(60) | int }}"
      when: (upgrade_delay_secs | default(60) | int) > 0


# ----- step 5: upgrade node 1b and run the light mid-roll checkpoint --------------------------

- name: RV-1 step 5 -- upgrade {{ cluster_id | default(1) }}b + mixed checkpoint
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Upgrade {{ cluster_id | default(1) }}b + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}b -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}b.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map[((cluster_id | default(1)) | string) ~ 'b'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}b -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}b.log 2>&1
      args: { chdir: "{{ playbook_dir }}/../../.." }
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

- name: RV-1 step 5 -- mid-roll light checkpoint + delay
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Mid-roll: wait for rv1/marker-post1b-* propagation 1a -> 1b/1c"
      ravendb_wait:
        kind: marker_propagation
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        source: "{{ cluster_id | default(1) }}a"
        targets: ["{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        marker_id_prefix: "rv1/marker-post1b-"
        timeout: 120
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Mid-roll: dump schema version on a/b/c (1a/1b v_new, 1c v_old expected)"
      ravendb_diagnostic:
        kind: schema_version
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # I-4 mid-roll: same as after 1a -- orphan revisions must stay at zero across any
    # mixed-binary state.  See step-4 comment for why count/revision parity are
    # deferred to step 7's quiet final checkpoint.
    - name: "Mid-roll: assert zero orphan revisions on a/b/c (I-4)"
      ravendb_diagnostic:
        kind: orphan_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Pause before upgrading {{ cluster_id | default(1) }}c
      ansible.builtin.pause:
        seconds: "{{ upgrade_delay_secs | default(60) | int }}"
      when: (upgrade_delay_secs | default(60) | int) > 0


# ----- step 6: upgrade node 1c, stop the writers, let the cluster go quiet --------------------

- name: RV-1 step 6 -- upgrade {{ cluster_id | default(1) }}c + stop W-1 + quiet
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Upgrade {{ cluster_id | default(1) }}c + wait_for_member
      ansible.builtin.shell: |
        set -e
        ansible-playbook toolbox/service/upgrade_node.yml \
          -e target={{ cluster_id | default(1) }}c -e custom_build={{ v_new_build }} --skip-tags download \
          > /tmp/rv1-upgrade-{{ cluster_id | default(1) }}c.log 2>&1
        ansible-playbook toolbox/wait/wait_for_member.yml \
          -e cluster_leader={{ peer_map[((cluster_id | default(1)) | string) ~ 'c'] }} -e db_name={{ db_name }} \
          -e target={{ cluster_id | default(1) }}c -e timeout_secs={{ member_budget_secs | default(300) | int }} \
          > /tmp/rv1-member-{{ cluster_id | default(1) }}c.log 2>&1
      args: { chdir: "{{ playbook_dir }}/../../.." }
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"
      async: 2400
      poll: 30

    - name: "Post-upgrade: dump schema version on a/b/c (all v_new expected)"
      ravendb_diagnostic:
        kind: schema_version
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }

- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w1.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w2.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w3.pid" }
- ansible.builtin.import_playbook: ../../../toolbox/workloads/stop_workload.yml
  vars: { pidfile: "/tmp/w1-{{ cluster_id | default(1) }}a-db1-w4.pid" }

- name: RV-1 step 6 -- post-W-1-stop drain + tombstone settle
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Post-W-1-stop: wait for docs drain across a/b/c"
      ravendb_wait:
        kind: docs_drain
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Post-W-1-stop: wait for etag parity across a/b/c"
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        timeout: "{{ quiesce_budget_secs | default(1200) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Post-W-1-stop: wait for tombstone-count convergence across a/b/c"
      ravendb_wait:
        kind: stats_field_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        fields: ["CountOfTombstones"]
        timeout: "{{ tombstone_settle_timeout_secs | default(300) | int }}"
        poll_interval: 3
      register: r
    - name: Show result
