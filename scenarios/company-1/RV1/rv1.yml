# ----- step 9: W-3 churn races -- 8 writers for 5 minutes, then drain -------------------------

# W-3 runs in the foreground -- it's a bounded 5-minute burst, not a continuous backdrop.
- ansible.builtin.import_playbook: ../../../scenarios/company-1/workloads/w3/workload_w3.yml
  vars:
    target: "{{ cluster_id | default(1) }}a"
    db_name: db1
    duration_secs: "{{ phase2_churn_duration_secs | default(300) | int }}"
    id_prefix: "{{ phase2_hot_prefix | default('hot') }}"
    pool_size: "{{ phase2_hot_count | default(1000) | int }}"
    writers: "{{ phase2_writers | default(8) | int }}"
    collection: "{{ phase2_hot_collection | default('HotDocs') }}"

- name: RV-1 step 9 -- post-W-3 cooldown + drain + tombstone settle
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Pause so the controller's TCP sockets can recycle
      ansible.builtin.pause:
        seconds: "{{ w3_cooldown_secs | default(45) | int }}"
      when: (w3_cooldown_secs | default(45) | int) > 0

    - name: "Post-W-3: wait for docs drain across a/b/c"
      ravendb_wait:
        kind: docs_drain
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Post-W-3: wait for tombstone-count convergence across a/b/c"
      ravendb_wait:
        kind: stats_field_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ cluster_id | default(1) }}a", "{{ cluster_id | default(1) }}b", "{{ cluster_id | default(1) }}c"]
        fields: ["CountOfTombstones"]
        timeout: "{{ tombstone_settle_timeout_secs | default(300) | int }}"
        poll_interval: 3
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


