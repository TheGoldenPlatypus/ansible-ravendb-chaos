# scenarios/company-1/RV3/vars.yml -- shared config for RV-3
# (sharded extended: non-sharded -> sharded smuggler reverse + ETL/backup 3-way cross-check).

# ---------- Topology -- T4-extended: 5 clusters, 21 containers total ------------------------
#   * Cluster 1 (9 nodes 1a..1i) -- sharded source for phase (b)
#   * Cluster 2 (1 node  2a)     -- non-sharded source for phase (a)
#   * Cluster 3 (9 nodes 3a..3i) -- sharded import target for phase (a)
#   * Cluster 4 (1 node  4a)     -- ETL target for phase (b)
#   * Cluster 5 (1 node  5a)     -- backup-restored comparison target for phase (b)

db_name: db1

# Cluster ids.  Override via -e to shift the whole block (parallel runs / different host).
src_sharded_cluster_id:  1
nonshd_src_cluster_id:   2
sharded_tgt_cluster_id:  3
etl_tgt_cluster_id:      4
bkp_cmp_cluster_id:      5

# All node names below are DERIVED from the cluster_id vars above so this
# scenario can be shifted to any cluster id range via -e overrides (parallel
# overnight runs, etc.).  Previously these were hardcoded as "1a"/"2a"/etc.
# and ignored cluster_id_start overrides, which caused DNS-resolution failures
# when run on non-default cluster ids.

# Source sharded cluster nodes (9; 3 shards x 3 replicas).
src_sharded_nodes:
  - "{{ src_sharded_cluster_id }}a"
  - "{{ src_sharded_cluster_id }}b"
  - "{{ src_sharded_cluster_id }}c"
  - "{{ src_sharded_cluster_id }}d"
  - "{{ src_sharded_cluster_id }}e"
  - "{{ src_sharded_cluster_id }}f"
  - "{{ src_sharded_cluster_id }}g"
  - "{{ src_sharded_cluster_id }}h"
  - "{{ src_sharded_cluster_id }}i"
src_sharded_leader: "{{ src_sharded_cluster_id }}a"

# Non-sharded source (1 node).
nonshd_src_node:    "{{ nonshd_src_cluster_id }}a"
nonshd_src_leader:  "{{ nonshd_src_cluster_id }}a"

# Sharded import target (9; 3 shards x 3 replicas).
sharded_tgt_nodes:
  - "{{ sharded_tgt_cluster_id }}a"
  - "{{ sharded_tgt_cluster_id }}b"
  - "{{ sharded_tgt_cluster_id }}c"
  - "{{ sharded_tgt_cluster_id }}d"
  - "{{ sharded_tgt_cluster_id }}e"
  - "{{ sharded_tgt_cluster_id }}f"
  - "{{ sharded_tgt_cluster_id }}g"
  - "{{ sharded_tgt_cluster_id }}h"
  - "{{ sharded_tgt_cluster_id }}i"
sharded_tgt_leader: "{{ sharded_tgt_cluster_id }}a"

# ETL target (1 node).
etl_tgt_node:   "{{ etl_tgt_cluster_id }}a"
etl_tgt_leader: "{{ etl_tgt_cluster_id }}a"

# Backup-restored comparison target (1 node).
bkp_cmp_node:   "{{ bkp_cmp_cluster_id }}a"
bkp_cmp_leader: "{{ bkp_cmp_cluster_id }}a"

# Per-shard topology -- letters A..I map to the FIRST/SECOND/THIRD trio of nodes
# in src_sharded_nodes / sharded_tgt_nodes.  Shard 0 holds Sx (A,B,C); shard 1
# Sy (D,E,F); shard 2 Sz (G,H,I).  Letters are fixed regardless of cluster id.
shard_topology:
  "0": ["A", "B", "C"]
  "1": ["D", "E", "F"]
  "2": ["G", "H", "I"]

# Per-shard container names on the SHARDED SOURCE (parallel to shard_topology,
# used for per-shard checkpoints).
shard_nodes_src:
  "0":
    - "{{ src_sharded_cluster_id }}a"
    - "{{ src_sharded_cluster_id }}b"
    - "{{ src_sharded_cluster_id }}c"
  "1":
    - "{{ src_sharded_cluster_id }}d"
    - "{{ src_sharded_cluster_id }}e"
    - "{{ src_sharded_cluster_id }}f"
  "2":
    - "{{ src_sharded_cluster_id }}g"
    - "{{ src_sharded_cluster_id }}h"
    - "{{ src_sharded_cluster_id }}i"

# Per-shard container names on the SHARDED IMPORT TARGET.
shard_nodes_tgt:
  "0":
    - "{{ sharded_tgt_cluster_id }}a"
    - "{{ sharded_tgt_cluster_id }}b"
    - "{{ sharded_tgt_cluster_id }}c"
  "1":
    - "{{ sharded_tgt_cluster_id }}d"
    - "{{ sharded_tgt_cluster_id }}e"
    - "{{ sharded_tgt_cluster_id }}f"
  "2":
    - "{{ sharded_tgt_cluster_id }}g"
    - "{{ sharded_tgt_cluster_id }}h"
    - "{{ sharded_tgt_cluster_id }}i"

# ---------- Phase (a) -- non-sharded -> sharded smuggler reverse ----------------------------
# Per the RV-3 spec: "20k docs x 3 revs = 60k revs mixed-form" on the non-sharded source.
# Note: "mixed-form" requires a legacy-form revision seed primitive we don't have yet --
# this scenario uses plain v_new hashed-form seed.  Update once the legacy-seed primitive
# lands (mark TODO in the comment block).
phase_a_seed_count:        20000
phase_a_seed_revs_per_doc: 3
phase_a_seed_prefix:       "users"
phase_a_seed_collection:   "Users"

# ---------- Phase (b) -- ETL + parallel backup + 3-way cross-check --------------------------
# Per the spec: re-seed sharded source with another 20k x 3, configure ETL, run W-1 for 5 min,
# stop and 3-way compare.
phase_b_seed_count:        20000
phase_b_seed_revs_per_doc: 3
phase_b_seed_prefix:       "users"
phase_b_seed_collection:   "Users"
phase_b_w1_duration_secs:  300   # 5 min per the spec

# ETL configuration.
etl_task_name:             "rv3-shd-to-etl"
etl_connection_string:     "rv3-etl-conn"

# ---------- Dump paths (controller-side; captures/ is gitignored) ---------------------------
phase_a_dump_path: "{{ playbook_dir }}/../../../captures/rv3-phase-a.ravendbdump"
phase_b_dump_path: "{{ playbook_dir }}/../../../captures/rv3-phase-b.ravendbdump"

# ---------- Probe sizes for parity checks ---------------------------------------------------
parity_probe_count: 50

# ---------- Budgets (seconds) ---------------------------------------------------------------
member_budget_secs:        300
drain_budget_secs:         180
etl_drain_budget_secs:     600   # ETL drain after workload stop; larger because async
quiesce_budget_secs:       1200
tombstone_settle_timeout:  300
