##################################################################################################
# scenarios/company-1/RV3/rv3.yml
#
# Five clusters, 21 nodes total, all already on the new build (no rolling upgrade in this
# scenario).  The two phases each set up a one-direction data flow and then check that every
# copy of the data agrees.
#
#   Cluster 1 (1a..1i) -- sharded source for phase (b), 3 shards of 3 replicas
#   Cluster 2 (2a)     -- non-sharded source for phase (a)
#   Cluster 3 (3a..3i) -- sharded target that receives the phase-(a) dump
#   Cluster 4 (4a)     -- ETL target for phase (b)
#   Cluster 5 (5a)     -- backup-restore target used for the phase-(b) 3-way cross-check
#
# What this scenario does:
#   pre.  Sanity-check inputs.
#   1.    Phase (a) seed: create the non-sharded source database on 2a, then seed it with
#         BOTH a legacy-form fixture (imported from a pre-built dump) AND fresh writes on top.
#         The result is one pool of docs carrying revisions in both the old and new on-disk
#         forms.  The fixture is required -- the playbook fails fast if it's missing.
#   2.    Phase (a) export: dump that mixed-form database to a file on the controller.
#   3.    Phase (a) import: create a sharded database on cluster 3 and import the dump.
#         This confirms the orchestrator routes every imported doc to the right shard.
#   4.    Phase (a) checkpoint: drain each shard, then confirm the non-sharded source's doc
#         count matches the sharded target's aggregate, per-doc revision counts line up on a
#         probe set, the target's revisions all land in the new build's hashed form, every
#         probe id lives on exactly one shard (orchestrator routing), and neither side has a
#         stuck replication-flavored task (I-6).
#   5.    Phase (b) seed: create the sharded database on cluster 1 and seed it the same way
#         as phase (a) -- legacy fixture + fresh writes on top.
#   6.    Phase (b) ETL setup: create the ETL target database on cluster 4 and wire up a
#         Raven-ETL task that pushes from the cluster-1 sharded source to it.
#   7.    Phase (b) workload: run W-1 against the sharded source for 5 minutes while the ETL
#         drains in the background.
#   8.    Phase (b) stop the writer and wait for the ETL target's doc count to catch up to
#         the source's aggregate.  This is the load-bearing assertion that ETL kept up.
#   9.    Phase (b) backup AT THE DRAINED MOMENT: dump the sharded source now, then create
#         the cluster-5 database and import that dump.  Doing the backup after the ETL has
#         caught up means all three copies (source, ETL target, backup-restored target)
#         reflect the same quiescent snapshot.
#   10.   Phase (b) 3-way cross-check: ETL target == backup-restored target == source
#         aggregate.  Exact equality on doc counts, plus per-doc revision-count parity on
#         a probe set across ALL three (sharded source routed via its orchestrator).
#         Step 8 also asserts I-6 (no stuck task) on both ends of the ETL pipe after the
#         doc-count drain.
#
# A note on the reordering: the original spec lists the backup as step 7 (before W-1) and
# the restore as step 9.  Taken literally, the backup would capture pre-W-1 state and the
# 3-way equality could never be exact (source and ETL would reflect post-W-1, backup would
# reflect pre-W-1).  Equality is only meaningful at a common quiescent moment, so the backup
# here is taken AFTER W-1 stops AND the ETL drains.  All three copies then reflect the same
# snapshot, exact equality holds, and any ETL race bug surfaces cleanly.
#
# Deep version (invariants, risks, validators) -> company-1_TESTING_PLAN/scenarios.md (RV-3).
##################################################################################################


# ----- pre: validate inputs --------------------------------------------------------------------

- name: RV-3 pre -- validate inputs + show plan
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - v_new_build is defined
        fail_msg: "Required: -e v_new_build=<path to v_new .deb>"

    - name: Show RV-3 plan
      ansible.builtin.debug:
        msg: >-
          RV-3  v_new={{ v_new_build }}
          shd-src=[{{ src_sharded_nodes | join(',') }}]
          non-src={{ nonshd_src_node }}
          shd-tgt=[{{ sharded_tgt_nodes | join(',') }}]
          etl-tgt={{ etl_tgt_node }}  bkp-cmp={{ bkp_cmp_node }}
          phase_a_seed={{ phase_a_seed_count }}x{{ phase_a_seed_revs_per_doc }}
          phase_b_seed={{ phase_b_seed_count }}x{{ phase_b_seed_revs_per_doc }}
          phase_b_w1_duration={{ phase_b_w1_duration_secs }}s


# ----- step 1: phase (a) -- seed the non-sharded source with legacy fixture + fresh writes -----

- ansible.builtin.import_playbook: ../../../toolbox/db/create_database.yml
  vars: { cluster_leader: "{{ nonshd_src_leader | default('2a') }}", db_name: db1, replication_factor: 1 }

- name: RV-3 step 1 -- revisions config + mixed-form seed on non-sharded source
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Phase (a) configure default revisions on non-sharded source 2a/db1"
      ravendb_revisions:
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Half 1 of the mixed-form seed: import the legacy-form fixture (revisions originally
    # written by the old build).  This is REQUIRED -- without it the seed is new-build-only
    # and the cross-form check in step 4 is never actually exercised.  See fixtures/README.md
    # for how to (re)build the dump.
    - name: Assert legacy-form fixture exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'PWD') }}/scenarios/company-1/RV3/fixtures/legacy-revs.ravendbdump"
      register: legacy_fixture
    - name: Assert legacy-revs fixture present
      ansible.builtin.assert:
        that: legacy_fixture.stat.exists
        fail_msg: >-
          Missing legacy-revs.ravendbdump fixture.  RV-3 requires a mix of legacy-form and
          new-form revisions; without the legacy half the cross-form check is untested.
          Build the fixture once per scenarios/company-1/RV3/fixtures/README.md and commit it,
          then re-run.
    - name: "Phase (a) seed half 1: smuggler-import legacy-revs fixture (raw-CV form) into 2a/db1"
      ravendb_smuggler:
        kind: import
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
        dump_path: "{{ lookup('env', 'PWD') }}/scenarios/company-1/RV3/fixtures/legacy-revs.ravendbdump"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Half 2 of the mixed-form seed: fresh writes on top, which land in the new build's form.
    - name: "Phase (a) seed half 2: write phase_a_seed_prefix/* on 2a/db1 (hashed-form, x revs)"
      ravendb_writes:
        kind: docs_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
        id_prefix: "{{ phase_a_seed_prefix }}"
        collection: "{{ phase_a_seed_collection }}"
        count: "{{ phase_a_seed_count | int }}"
        revs_per_doc: "{{ phase_a_seed_revs_per_doc | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 2: phase (a) -- dump the non-sharded source to a file on the controller ------------

- name: RV-3 step 2 -- smuggler_export non-sharded source -> phase_a_dump
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Phase (a) smuggler-export non-sharded source 2a/db1 -> phase_a_dump"
      ravendb_smuggler:
        kind: export
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
        dump_path: "{{ phase_a_dump_path }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 3: phase (a) -- create the sharded target on cluster 3 and import the dump --------

- name: RV-3 step 3 -- create sharded db1 on import target + import phase_a_dump
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Phase (a) create sharded db1 on import target cluster 3"
      ravendb_sharding:
        kind: create_sharded
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        cluster_leader: "{{ sharded_tgt_leader }}"
        db_name: db1
        shards: "{{ shard_topology }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Phase (a) configure default revisions on sharded import target"
      ravendb_revisions:
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ sharded_tgt_leader }}"
        db_name: db1
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Phase (a) smuggler-import phase_a_dump into sharded target cluster 3"
      ravendb_smuggler:
        kind: import
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ sharded_tgt_leader }}"
        db_name: db1
        dump_path: "{{ phase_a_dump_path }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 4: phase (a) checkpoint -- non-sharded source vs sharded target agree ---------------

- name: RV-3 step 4 -- phase (a) checkpoint (I-1 doc count, I-2 per-doc revs, PK form hashed)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    # Drain each shard on the import target before doing strict count parity.  Importing
    # into a sharded target scatter-gathers through the orchestrator, and intra-shard
    # replication between replicas may still be catching up when the import POST returns.
    # Same drain-then-validate pattern other scenarios use.
    - name: Drain sharded target Sx
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_tgt['0'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Drain sharded target Sy
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_tgt['1'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Drain sharded target Sz
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_tgt['2'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Doc-count parity between the non-sharded source and the sharded target.
    # /stats on the sharded leader transparently aggregates the per-shard totals.
    - name: Source (non-sharded) doc count
      ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
      register: phase_a_src_count
    - name: Show phase (a) source doc count
      ansible.builtin.debug: { msg: "{{ phase_a_src_count.msg }}" }

    - name: Target (sharded aggregate) doc count
      ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ sharded_tgt_leader }}"
        db_name: db1
      register: phase_a_tgt_count
    - name: Show phase (a) target doc count
      ansible.builtin.debug: { msg: "{{ phase_a_tgt_count.msg }}" }

    - name: Assert phase (a) doc count parity (smuggler routes every doc -- exact match)
      ansible.builtin.assert:
        that:
          - (phase_a_src_count.msg | regex_search('->  ([0-9]+) docs', '\\1') | first | int)
            == (phase_a_tgt_count.msg | regex_search('->  ([0-9]+) docs', '\\1') | first | int)
        fail_msg: "PHASE A I-1 FAIL  src={{ phase_a_src_count.msg }}  tgt={{ phase_a_tgt_count.msg }}"
        success_msg: "PHASE A I-1 PASS  src and sharded tgt agree on doc count"

    # Per-doc revision-count parity on the sharded target (sampled probe set).
    - name: Sharded target per-doc revision count parity
      ravendb_diagnostic:
        kind: revision_count_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: ["{{ sharded_tgt_leader }}"]
        id_prefix: "{{ phase_a_seed_prefix }}"
        count: "{{ parity_probe_count | int }}"
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Revision-form check: the smuggler import re-keys everything through the public API,
    # so revisions on the target should all be in the new build's hashed form.
    - name: Sharded target revision PK form is hashed
      ravendb_diagnostic:
        kind: stored_item_cv_split
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        target: "{{ sharded_tgt_leader }}"
        doc_ids: "{{ [phase_a_seed_prefix] | product(range(0, parity_probe_count | int) | list) | map('join', '/') | list }}"
        expect: split
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Sharded target per-doc placement check
      ravendb_diagnostic:
        kind: shard_placement_check
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        target: "{{ sharded_tgt_leader }}"
        id_prefix: "{{ phase_a_seed_prefix }}"
        count: "{{ parity_probe_count | int }}"
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # I-6 (no stuck task) on both sides of phase (a).  Smuggler is a one-shot
    # REST call, not a long-running task -- but we check anyway: any
    # pre-existing replication-flavored task (from a previous scenario sharing
    # the cluster) that is Faulted / in Reconnect should fail the run here, not
    # leak into phase (b).
    - name: Phase (a) I-6 on non-sharded source -- no stuck replication task
      ravendb_diagnostic:
        kind: replication_health
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ nonshd_src_leader }}"
        db_name: db1
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Phase (a) I-6 on sharded import target -- no stuck replication task
      ravendb_diagnostic:
        kind: replication_health
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ sharded_tgt_leader }}"
        db_name: db1
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 5: phase (b) -- create the sharded source on cluster 1 and seed it mixed-form ------

- name: RV-3 step 5 -- create sharded db1 on the phase (b) source + mixed-form seed
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: "Phase (b) create sharded db1 on source cluster 1"
      ravendb_sharding:
        kind: create_sharded
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        cluster_leader: "{{ src_sharded_leader }}"
        db_name: db1
        shards: "{{ shard_topology }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Phase (b) configure default revisions on sharded source cluster 1"
      ravendb_revisions:
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # Same mixed-form recipe as phase (a): legacy fixture first, then fresh writes.  The
    # fixture's existence was already asserted in step 1.
    - name: "Phase (b) seed half 1: smuggler-import legacy-revs fixture into sharded source"
      ravendb_smuggler:
        kind: import
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
        dump_path: "{{ lookup('env', 'PWD') }}/scenarios/company-1/RV3/fixtures/legacy-revs.ravendbdump"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Phase (b) seed half 2: write phase_b_seed_prefix/* on sharded source (hashed-form, x revs)"
      ravendb_writes:
        kind: docs_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
        id_prefix: "{{ phase_b_seed_prefix }}"
        collection: "{{ phase_b_seed_collection }}"
        count: "{{ phase_b_seed_count | int }}"
        revs_per_doc: "{{ phase_b_seed_revs_per_doc | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 6: phase (b) -- create the ETL target db and wire up Raven-ETL from source to it ---

- name: RV-3 step 6 -- create ETL target db1 + configure Raven ETL on sharded source
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Create ETL target db1
      ansible.builtin.command:
        cmd: >-
          ansible-playbook toolbox/db/create_database.yml
          -e cluster_leader={{ etl_tgt_leader }} -e db_name=db1 -e replication_factor=1
        chdir: "{{ playbook_dir }}/../../.."
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"

    - name: "Phase (b) configure default revisions on ETL target cluster 4"
      ravendb_revisions:
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ etl_tgt_leader }}"
        db_name: db1
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: "Phase (b) configure Raven-ETL task on sharded source -> ETL target cluster 4"
      ravendb_tasks:
        kind: setup_etl
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
        task_name: "{{ etl_task_name }}"
        target_db_name: db1
        target_topology_urls:
          - "https://{{ etl_tgt_leader }}.{{ ravendb_domain }}:443"
        connection_string_name: "{{ etl_connection_string }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 7: phase (b) -- run W-1 against the sharded source while ETL drains in the back ----

- name: RV-3 step 7 -- launch W-1 on sharded source; ETL drains live
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Launch W-1 (background, async)
      ansible.builtin.command:
        cmd: "bash {{ playbook_dir }}/../workloads/w1/workload_w1.sh"
      environment:
        TARGET:        "{{ src_sharded_leader }}"
        DB_NAME:       db1
        ID_PREFIX:     "{{ phase_b_seed_prefix }}"
        POOL_SIZE:     "{{ phase_b_seed_count | int }}"
        DURATION_SECS: "{{ phase_b_w1_duration_secs | int }}"
        RAVEN_DOMAIN:  "{{ ravendb_domain }}"
        CERT_PEM:      "{{ cert_dir }}/client.pem"
        CA_CRT:        "{{ cert_ca_crt }}"
      async: "{{ phase_b_w1_duration_secs | int + 120 }}"
      poll: 0

- ansible.builtin.import_playbook: ../../../toolbox/workloads/wait_for_workload_started.yml
  vars: { pidfile: "/tmp/w1-{{ src_sharded_leader | default('1a') }}-db1.pid", timeout_secs: 30 }

# Catch the "launched but immediately crashed" case.  Without this check, the wait-for-finish
# in step 8 would see an empty pidfile (from the crashed process cleaning up) and report
# FINISHED, so the scenario would silently proceed without W-1 ever having actually run.
- ansible.builtin.import_playbook: ../../../toolbox/workloads/assert_workload_alive.yml
  vars: { pidfile: "/tmp/w1-{{ src_sharded_leader | default('1a') }}-db1.pid" }


# ----- step 8: phase (b) -- wait for W-1 to finish, then wait for the ETL target to catch up ---

- name: RV-3 step 8 -- wait for W-1 to finish; drain ETL until tgt == src
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Wait for W-1 to finish (internal loop, no retry spam)
      ansible.builtin.shell: |
        set -u
        pidfile=/tmp/w1-{{ src_sharded_leader | default('1a') }}-db1.pid
        deadline=$(( $(date +%s) + {{ phase_b_w1_duration_secs | int + 300 }} ))
        while [ $(date +%s) -lt $deadline ]; do
          if [ ! -f "$pidfile" ]; then echo "FINISHED"; exit 0; fi
          PID=$(cat "$pidfile" 2>/dev/null || true)
          if [ -z "$PID" ]; then echo "FINISHED (empty pidfile)"; exit 0; fi
          if ! kill -0 "$PID" 2>/dev/null; then echo "CRASHED pid=$PID"; exit 99; fi
          sleep 5
        done
        echo "TIMEOUT after {{ phase_b_w1_duration_secs | int + 300 }}s"; exit 124
      register: w1_poll
      changed_when: false
    - name: Show W-1 status
      ansible.builtin.debug: { msg: "W-1 status: {{ w1_poll.stdout }}" }

    # Wait until the ETL target's doc count catches up to the sharded source's aggregate.
    # The wait module's doc_count_match kind uses the same sharded-aware aggregator as the
    # diagnostic module, so per-shard totals are summed correctly on the source side.  This
    # is one Python-level call -- no Ansible retry spam, no shell loops.
    - name: "Phase (b) wait for ETL doc-count match: sharded source aggregate == ETL target"
      ravendb_wait:
        kind: doc_count_match
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        source: "{{ src_sharded_leader }}"
        db_name: db1
        target: "{{ etl_tgt_leader }}"
        target_db_name: db1
        timeout: "{{ etl_drain_budget_secs | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # I-6 on both sides of the ETL pipe.  Plan step (b)-10 calls for a 3-way
    # cross-check at a drained moment; if the ETL task itself is stuck
    # (Faulted / Error / Reconnect) the drained state is a lie and the
    # cross-check passes for the wrong reason.  Check after the doc-count
    # match so a still-catching-up Reconnect doesn't fail us prematurely.
    - name: Phase (b) I-6 on sharded source -- no stuck replication task
      ravendb_diagnostic:
        kind: replication_health
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Phase (b) I-6 on ETL target -- no stuck replication task
      ravendb_diagnostic:
        kind: replication_health
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ etl_tgt_leader }}"
        db_name: db1
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 9: phase (b) -- dump the source at the drained moment + restore into cluster 5 -----

- name: RV-3 step 9 -- per-shard source drain + tombstone settle + smuggler_export + restore
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    # Drain each shard on the source.  W-1 has stopped, but intra-shard replication between
    # replicas might still be settling.  Without this drain the export could capture
    # mid-flight state where the replicas of a shard disagree.
    - name: Drain source shard Sx
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_src['0'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Drain source shard Sy
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_src['1'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Drain source shard Sz
      ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes: "{{ shard_nodes_src['2'] }}"
        timeout: "{{ drain_budget_secs | default(180) | int }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    # No tombstone-cleanup trigger here on purpose.  Triggering cleanup while ETL is live
    # creates per-replica drift: the ETL mentor advances its consumer checkpoint while its
    # peers lag via cluster gossip, so the mentor cleans tombstones that its peers can't,
    # leaving a permanent 0/2/2 split that never converges.  Export doesn't include
    # tombstones by default anyway, so per-replica tombstone state doesn't affect the
    # snapshot we're about to take -- the etag drain above is all the quiescence we need.

    # Take the dump now -- W-1 has stopped, the ETL has caught up, every shard is drained.
    # The source, the ETL target, and the cluster-5 copy loaded from this dump will all
    # reflect the same snapshot, so the 3-way equality in step 10 can be exact.
    - name: "Phase (b) smuggler-export sharded source (drained snapshot) -> phase_b_dump"
      ravendb_smuggler:
        kind: export
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
        dump_path: "{{ phase_b_dump_path }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }

    - name: Create backup-comparison target db1
      ansible.builtin.command:
        cmd: >-
          ansible-playbook toolbox/db/create_database.yml
          -e cluster_leader={{ bkp_cmp_leader }} -e db_name=db1 -e replication_factor=1
        chdir: "{{ playbook_dir }}/../../.."
      environment:
        ANSIBLE_BECOME_PASS: "{{ ansible_become_pass | default('') }}"

    - name: "Phase (b) smuggler-import phase_b_dump into backup-comparison target cluster 5"
      ravendb_smuggler:
        kind: import
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ bkp_cmp_leader }}"
        db_name: db1
        dump_path: "{{ phase_b_dump_path }}"
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


# ----- step 10: phase (b) 3-way cross-check -- source aggregate, ETL target, restored copy -----

- name: RV-3 step 10 -- 3-way EXACT equality (ETL tgt == bkp-cmp tgt == sharded src aggregate)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Sharded source aggregate doc count
      ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ src_sharded_leader }}"
        db_name: db1
      register: shd_src_count
    - name: Show sharded source aggregate doc count
      ansible.builtin.debug: { msg: "{{ shd_src_count.msg }}" }

    - name: ETL target doc count
      ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ etl_tgt_leader }}"
        db_name: db1
      register: etl_count
    - name: Show ETL target doc count
      ansible.builtin.debug: { msg: "{{ etl_count.msg }}" }

    - name: Backup-restored comparison target doc count
      ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ bkp_cmp_leader }}"
        db_name: db1
      register: bkp_count
    - name: Show backup-restored target doc count
      ansible.builtin.debug: { msg: "{{ bkp_count.msg }}" }

    - name: Extract integer counts from the three msgs
      ansible.builtin.set_fact:
        src_n: "{{ (shd_src_count.msg | regex_search('->  ([0-9]+) docs', '\\1') | first) | int }}"
        etl_n: "{{ (etl_count.msg     | regex_search('->  ([0-9]+) docs', '\\1') | first) | int }}"
        bkp_n: "{{ (bkp_count.msg     | regex_search('->  ([0-9]+) docs', '\\1') | first) | int }}"

    - name: 3-way EXACT equality
      ansible.builtin.assert:
        that:
          - src_n == etl_n
          - src_n == bkp_n
        fail_msg: >-
          3-WAY CROSS-CHECK FAILED  src={{ src_n }}  etl={{ etl_n }}  bkp={{ bkp_n }}
          (etl-drain may have stalled, or smuggler export captured an inconsistent moment)
        success_msg: >-
          3-WAY CROSS-CHECK PASS  src=etl=bkp={{ src_n }}

    # Per-doc revision-count parity ACROSS all three copies (plan: "I-2 union
    # equality across ETL target, backup-restored target, and sharded source").
    # The kind auto-detects the sharded source via /admin/databases and routes
    # per-id /revisions reads through its orchestrator; non-sharded targets are
    # hit directly.  Doc counts already matched above; this checks revisions.
    # Note: Raven ETL by default doesn't carry revisions -- if this fails with
    # ETL showing [0] while src and bkp-cmp show the actual rev counts, the
    # ETL task config needs revisions enabled, OR the spec needs to acknowledge
    # ETL-revisions are intentionally not part of the 3-way equality.
    - name: Per-doc revision-count parity sharded src vs ETL tgt vs bkp-cmp tgt (must match)
      ravendb_diagnostic:
        kind: revision_count_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: db1
        nodes:
          - "{{ src_sharded_leader }}"
          - "{{ etl_tgt_leader }}"
          - "{{ bkp_cmp_leader }}"
        id_prefix: "{{ phase_b_seed_prefix }}"
        count: "{{ parity_probe_count | int }}"
        assert_mode: true
      register: r
    - name: Show result
      ansible.builtin.debug: { msg: "{{ r.msg }}" }


- name: RV-3 -- DONE
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [vars.yml]
  tasks:
    - name: Show RV-3 PASS banner
      ansible.builtin.debug:
        msg: >-
          RV-3 PASS  shd-src=[{{ src_sharded_nodes | join(',') }}]  non-src={{ nonshd_src_node }}
          shd-tgt=[{{ sharded_tgt_nodes | join(',') }}]
          etl-tgt={{ etl_tgt_node }}  bkp-cmp={{ bkp_cmp_node }}  db=db1
          phase (a) non-sharded -> sharded smuggler reverse (mixed-form + PK form hashed)
          + phase (b) ETL drain + parallel backup 3-way EXACT cross-check all held.
