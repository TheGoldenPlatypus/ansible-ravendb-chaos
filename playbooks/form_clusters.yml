##################################################################################################
# playbooks/form_clusters.yml
#
# Joins every container into a RavenDB cluster based on its name.  Container `1a` becomes the
# leader of cluster 1; `1b` and `1c` join it as Members.  Container `2a` becomes the leader of
# cluster 2; `2b` and `2c` join it.  And so on.  Run AFTER install_ravendb.yml.
#
# Works in both target_modes:
#   * docker -- discovers containers from docker_network_name, derives node IPs from the bridge,
#               rewrites /etc/hosts every run (container IPs may shift across restarts).
#   * ssh    -- reads ravendb_nodes from inventory, uses each host's ansible_host as its IP.
#               /etc/hosts is written from stable inventory IPs.
#
# What it does, in order:
#   1. Installs the python `ravendb` client on the controller (the `ravendb.ravendb.node`module that does the actual cluster-join needs it).
#   2. Builds the (name -> ip, cluster_id, node_letter) maps:
#         docker -> from docker_network_info + name parsing.
#         ssh    -> from inventory's ansible_host + per-host cluster_id/node_letter.
#   3. Writes the /etc/hosts block on the controller AND inside every container/Pi.
#   5. Waits until each cluster's leader (the `a` node) is responding on HTTPS.
#   6. Calls the ravendb.ravendb.node module once per non-leader container to add it
#      to its cluster's leader as a Member.
#   7. Reads the final topology from each leader and prints a summary
#      table (tag / container / url per cluster).
#
# INPUTS (all overridable via `-e key=value`; defaults live in inventory/group_vars/all.yml):
#   docker_network_name  shared docker network to discover containers from   (default: hubsinknet)
#   ravendb_domain       domain stamped into each node's URL                 (default: hubsink.test)
#   cert_dir             folder containing client.pem and ca.crt             (default: /mnt/c/dev/hub-sink/selfsignedmaterials)
#                        cert_ca_crt and friends are derived from this in group_vars;
#                        override cert_dir and they all follow.
#
# RUN EXAMPLES:
#   # use all defaults
#   ansible-playbook playbooks/form_clusters.yml -K
#
#   # point at a different cert folder
#   ansible-playbook playbooks/form_clusters.yml -K -e cert_dir=/path/to/certs
#
# NOTES:
#   * Requires sudo on the controller (-K) -- it edits /etc/hosts.
#   * The leader for each cluster is hard-coded to be the `a` node (e.g. 1a, 2a, ...).
#     This convention is also relied on by scenarios when they look up cluster leaders.
#   * Idempotent.  Re-running on an already-formed cluster is a safe no-op.
#   * /etc/hosts inside containers gets rewritten if container IPs changed between runs --
#     re-run this if you ever restart containers and IPs shift on the bridge.
##################################################################################################

- name: Ensure ravendb python client is available on the controller
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    ravendb_venv_path: "{{ ansible_env.HOME }}/.ravendb_ansible"

  tasks:
    - name: Probe existing venv for ravendb module
      ansible.builtin.command:
        cmd: "{{ ravendb_venv_path }}/bin/python -c 'import ravendb'"
      register: venv_probe
      failed_when: false
      changed_when: false

    - name: Reuse existing venv -- skip the prereqs role
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ ravendb_venv_path }}/bin/python"
      when:
        - venv_probe.rc == 0
        - not (force_prereqs | default(false) | bool)

    - name: Install ravendb python client prerequisites (one-time / forced)
      ansible.builtin.include_role:
        name: ravendb.ravendb.ravendb_python_client_prerequisites
      when: (venv_probe.rc != 0) or (force_prereqs | default(false) | bool)


- name: Discover targets and group them by cluster_id
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    # ---------- docker mode: discover containers from the shared network ------------------------
    - name: (docker mode) Inspect the shared docker network
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: network_info
      when: target_mode | default('docker') == 'docker'

    - name: (docker mode) Build a {name -> ip} map from container IPs
      ansible.builtin.set_fact:
        node_ip_map: "{{ node_ip_map | default({}) | combine({item.Name: item.IPv4Address.split('/')[0]}) }}"
      loop: "{{ network_info.network.Containers.values() | list }}"
      when: target_mode | default('docker') == 'docker'

    - name: (docker mode) Register each container in ravendb_nodes with cluster_id + node_letter
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: ravendb_nodes
        ansible_connection: community.docker.docker
        ansible_python_interpreter: /usr/bin/python3
        cluster_id: "{{ item | regex_replace('[^0-9].*', '') }}"
        node_letter: "{{ item | regex_replace('^[0-9]+', '') }}"
      loop: "{{ node_ip_map.keys() | list | sort if node_ip_map is defined else [] }}"
      changed_when: false
      when: target_mode | default('docker') == 'docker'

    # ---------- ssh mode: read everything from inventory ----------------------------------------
    - name: (ssh mode) Build {name -> ip} map from inventory's ansible_host
      ansible.builtin.set_fact:
        node_ip_map: "{{ dict(groups['ravendb_nodes'] | zip(groups['ravendb_nodes'] | map('extract', hostvars, 'ansible_host'))) }}"
      when: target_mode | default('docker') == 'ssh'

    # ---------- both modes: sorted names + hosts_block (for the docker-mode rewrite below) ------
    - name: Sort names for stable iteration
      ansible.builtin.set_fact:
        container_names: "{{ node_ip_map.keys() | list | sort }}"

    - name: Build the /etc/hosts block that maps every <name>.<domain> to its IP
      ansible.builtin.set_fact:
        hosts_block: |-
          {% for name in container_names %}
          {{ node_ip_map[name] }} {{ name }}.{{ ravendb_domain }}
          {% endfor %}


# ============== /etc/hosts rewrite (both modes) =================================================

- name: Write the hubsink /etc/hosts block on the controller
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  tasks:
    - name: Upsert the ANSIBLE MANAGED CHAOS LAB block in /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        # Scope the marker per docker network so parallel scenarios (RV-1 on rv1net,
        # RP-1 on rp1net, RPV-1 on rpv1net) maintain DISJOINT /etc/hosts blocks instead
        # of stomping on each other -- otherwise the second scenario's form_clusters
        # erases the first scenario's host entries and curl rc=6 follows.
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB ({{ docker_network_name | default('default') }})"
        block: "{{ hostvars['localhost'].hosts_block }}"


- name: Write the hubsink /etc/hosts block on every node
  hosts: ravendb_nodes
  gather_facts: false
  become: true

  tasks:
    - name: Disable cloud-init's manage_etc_hosts (so our block survives reboot)
      ansible.builtin.replace:
        path: /etc/cloud/cloud.cfg
        regexp: '^(\s*manage_etc_hosts:\s*).*$'
        replace: '\1false'
      failed_when: false
      changed_when: false

    - name: Upsert the ANSIBLE MANAGED CHAOS LAB block in /etc/hosts (on target)
      ansible.builtin.blockinfile:
        path: /etc/hosts
        # Scope the marker per docker network so parallel scenarios (RV-1 on rv1net,
        # RP-1 on rp1net, RPV-1 on rpv1net) maintain DISJOINT /etc/hosts blocks instead
        # of stomping on each other -- otherwise the second scenario's form_clusters
        # erases the first scenario's host entries and curl rc=6 follows.
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB ({{ docker_network_name | default('default') }})"
        block: "{{ hostvars['localhost'].hosts_block }}"
        unsafe_writes: true


- name: Form one RavenDB cluster per cluster_id
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    leader_letter: "a"

  tasks:
    - name: Collect every node's host vars into a flat list of dicts
      ansible.builtin.set_fact:
        node_records: "{{ groups['ravendb_nodes'] | map('extract', hostvars) | list }}"

    - name: Get the unique sorted set of cluster ids
      ansible.builtin.set_fact:
        cluster_ids: "{{ node_records | map(attribute='cluster_id') | unique | list | sort }}"

    - name: Pick out only the non-leader nodes (these are the ones we will join)
      ansible.builtin.set_fact:
        join_plan: "{{ node_records | selectattr('node_letter', 'ne', leader_letter) | list }}"

    - name: Wait until each cluster leader's HTTPS endpoint responds 200
      ansible.builtin.uri:
        url: "https://{{ item }}{{ leader_letter }}.{{ ravendb_domain }}:443/cluster/topology"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200]
      loop: "{{ cluster_ids }}"
      register: leader_ready
      retries: 30
      delay: 2
      until: leader_ready is succeeded

    - name: Add each non-leader node to its cluster leader as a Member
      ravendb.ravendb.node:
        tag: "{{ item.node_letter | upper }}"
        type: Member
        url: "https://{{ item.inventory_hostname }}.{{ ravendb_domain }}:443"
        leader_url: "https://{{ item.cluster_id }}{{ leader_letter }}.{{ ravendb_domain }}:443"
        certificate_path: "{{ cert_dir }}/client.pem"
        ca_cert_path: "{{ cert_ca_crt }}"
      loop: "{{ join_plan }}"
      loop_control:
        label: "cluster {{ item.cluster_id }} <- {{ item.inventory_hostname }}"

    - name: Read back the final topology of each cluster leader
      ansible.builtin.uri:
        url: "https://{{ item }}{{ leader_letter }}.{{ ravendb_domain }}:443/cluster/topology"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        return_content: true
      loop: "{{ cluster_ids }}"
      register: topology_results

    - name: Print the final cluster layout (tag / container / url per cluster)
      ansible.builtin.debug:
        msg: "{{ summary.split('\n') }}"
      vars:
        summary: |-
          ================================================================
            Formed {{ cluster_ids | length }} cluster(s) with {{ node_records | length }} node(s) ({{ ('on ' ~ docker_network_name) if target_mode | default('docker') == 'docker' else 'via ssh' }})
          ================================================================
          {% for cid in cluster_ids %}

            Cluster {{ cid }}
              tag   container   url
          {% for n in node_records | selectattr('cluster_id', 'eq', cid) | sort(attribute='node_letter') %}
              {{ (n.node_letter | upper).ljust(5) }} {{ n.inventory_hostname.ljust(11) }} https://{{ n.inventory_hostname }}.{{ ravendb_domain }}:443
          {% endfor %}
          {% endfor %}

          ================================================================
