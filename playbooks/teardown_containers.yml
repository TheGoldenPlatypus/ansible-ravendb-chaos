- name: Tear down all containers on hubsinknet
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Inspect the shared docker network
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: network_info

    - name: Collect the names of every container attached to the network
      ansible.builtin.set_fact:
        container_names: "{{ (network_info.network.Containers | default({})).values() | list | map(attribute='Name') | list }}"
      when: network_info.network is not none

    - name: Remove each container
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
        force_kill: true
      loop: "{{ container_names | default([]) }}"

    - name: Remove the shared docker network
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: absent

    - name: Remove the shared backups volume (lab_backups)
      community.docker.docker_volume:
        name: "{{ backups_volume_name | default('lab_backups') }}"
        state: absent

    - name: Wipe captures/ at repo root
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../captures"
        state: absent

    - name: Kill any leftover W-1 background workloads + their pidfiles
      # Background workloads are launched via nohup and survive a Ctrl-C of the scenario.
      # Teardown is the "reset everything" command, so we sweep them here too.
      # The [w]orkload regex trick prevents pkill from matching its own command line
      # (which literally contains the pattern string) and SIGTERM'ing the shell running it.
      ansible.builtin.shell: |
        pkill -f '[w]orkload_w1.sh' 2>/dev/null || true
        rm -f /tmp/w1-*.pid 2>/dev/null || true
        echo done
      changed_when: false


- name: Strip the hubsink hosts block from the controller's /etc/hosts
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  tasks:
    - name: Remove the ANSIBLE MANAGED CHAOS LAB block from /etc/hosts
      # Match the per-network marker scoped by form_clusters.yml so a parallel
      # teardown only strips ITS scenario's host block, not the other scenarios'.
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB ({{ docker_network_name | default('default') }})"
        state: absent
