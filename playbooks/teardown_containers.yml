- name: Tear down all containers on hubsinknet
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Inspect the shared docker network
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: network_info

    - name: Collect the names of every container attached to the network
      ansible.builtin.set_fact:
        container_names: "{{ (network_info.network.Containers | default({})).values() | list | map(attribute='Name') | list }}"
      when: network_info.network is not none

    - name: Remove each container
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
        force_kill: true
      loop: "{{ container_names | default([]) }}"

    - name: Remove the shared docker network
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: absent

    - name: Remove the shared backups volume (lab_backups)
      community.docker.docker_volume:
        name: "{{ backups_volume_name | default('lab_backups') }}"
        state: absent

    - name: Wipe captures/ at repo root
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../captures"
        state: absent

    - name: Kill leftover background workloads for THIS cluster range + their pidfiles
      # Background workloads are launched via nohup and survive a Ctrl-C of the scenario.
      # Teardown is the "reset everything" command, so we sweep them here too.
      #
      # IMPORTANT: scoped to this teardown's cluster_id_start range so parallel
      # scenarios on disjoint cluster id ranges don't kill each other's workers.
      # Previously a blanket `pkill -f workload_w1.sh` + `rm -f /tmp/w1-*.pid`
      # would TERM workers from sibling scenarios on different cluster ids
      # whenever a teardown ran for any one of them.
      #
      # We compute the cluster_id_start..cluster_id_start+clusters_count-1 set
      # and kill+remove only pidfiles whose target hostname matches one of
      # those single-digit (or two-digit) cluster ids followed by [abc...].
      # The [w]orkload regex trick prevents pkill from matching its own command
      # line and SIGTERM'ing the shell running it.
      ansible.builtin.shell: |
        cid_start={{ cluster_id_start | default(1) | int }}
        cid_count={{ clusters_count | default(1) | int }}
        cid_end=$((cid_start + cid_count - 1))
        # POSIX-compatible loop: ansible's `shell:` runs /bin/sh (dash on Ubuntu)
        # which doesn't support bash's `for ((...))` C-style loops.  `seq` works
        # in both dash and bash.
        for cid in $(seq "$cid_start" "$cid_end"); do
          # match pidfiles like /tmp/w*-<cid>[a-z]-db1*.pid (with or without -w<N> suffix)
          for pf in /tmp/w*-${cid}[a-z]-db1*.pid; do
            [ -e "$pf" ] || continue
            pid=$(cat "$pf" 2>/dev/null || true)
            if [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then
              # use kill (not pkill) so we only TERM the specific PID that matches
              kill "$pid" 2>/dev/null || true
            fi
            rm -f "$pf" 2>/dev/null || true
          done
        done
        echo done
      changed_when: false


- name: Strip the hubsink hosts block from the controller's /etc/hosts
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  tasks:
    - name: Remove the ANSIBLE MANAGED CHAOS LAB block from /etc/hosts
      # Match the per-network marker scoped by form_clusters.yml so a parallel
      # teardown only strips ITS scenario's host block, not the other scenarios'.
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB ({{ docker_network_name | default('default') }})"
        state: absent
