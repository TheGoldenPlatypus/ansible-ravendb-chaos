##################################################################################################
# playbooks/provision_nodes.yml
#
# Creates one docker container per (cluster_id, node_letter) on a shared docker network.
# RavenDB is NOT installed here -- this just lays out the empty containers.  Names follow
# the convention <cluster_id><node_letter>, e.g. 1a, 1b, 1c, 2a, ...
#
# INPUTS (all overridable via `-e key=value`; defaults live in inventory/group_vars/all.yml):
#   clusters_count       how many cluster ids to generate names for          (default: 1)
#   nodes_per_cluster    how many letters per cluster id (max 26)            (default: 3)
#   docker_network_name    shared docker network the containers attach to    (default: hubsinknet)
#   docker_network_subnet  optional CIDR (e.g. 172.30.10.0/24).  When set,    (default: unset -> Docker
#                          the network is created with this subnet and every  auto-assign)
#                          container is pinned to a deterministic ipv4 inside
#                          it so `docker stop` + `docker start` returns each
#                          container to its ORIGINAL IP (so the host's stale
#                          /etc/hosts entries stay valid for morning post-
#                          mortem on overnight runs).  IP formula:
#                          ipv4 = <subnet_base>.<(cluster_id mod 8)*16 + letter_pos + 1>
#                          (letter_pos: a=1..z=26).  Each cluster gets a
#                          16-IP bucket within the /24; cluster_ids used by
#                          the company-1 scenarios are collision-free under
#                          mod-8.
#   docker_image           image to launch                                   (default: ubuntu2204-ansible)
#   container_memory       per-container cgroup memory cap                   (default: 2500m)
#
# RUN EXAMPLES:
#   # use all defaults (1 cluster x 3 nodes = 3 containers)
#   ansible-playbook playbooks/provision_nodes.yml
#
#   # 2 clusters x 3 nodes = 6 containers ([1a,1b,1c], [2a,2b,2c])
#   ansible-playbook playbooks/provision_nodes.yml -e clusters_count=2
#
#   # 3 clusters x 5 nodes = 15 containers ([1a,1b,1c,1d,1e]... [3a,3b,3c,3d,3e]), tighter memory cap 
#   ansible-playbook playbooks/provision_nodes.yml -e clusters_count=3 -e nodes_per_cluster=5 -e container_memory=1500m
##################################################################################################

- name: Provision docker containers for RavenDB chaos lab
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    # cluster_id_start defaults to 1 -- single-lab runs name containers 1a/1b/.../2a/...
    # For parallel runs on the same docker host, override -e cluster_id_start=4 (or any
    # offset) so each parallel run's containers occupy a disjoint cluster_id range and
    # don't collide globally on the docker daemon.
    - name: Build the list of container names (<cluster_id_start>a, b, c, ...)
      ansible.builtin.set_fact:
        container_names: "{{ raw_names.split() }}"
      vars:
        cluster_id_start_eff: "{{ cluster_id_start | default(1) | int }}"
        raw_names: |-
          {% for cluster in range(cluster_id_start_eff | int, (cluster_id_start_eff | int) + (clusters_count | int)) %}
          {% for letter in 'abcdefghijklmnopqrstuvwxyz'[: nodes_per_cluster | int] %}
          {{ cluster }}{{ letter }}
          {% endfor %}
          {% endfor %}

    # When docker_network_subnet is set, derive subnet_base (first three octets, e.g.
    # "172.30.10" from "172.30.10.0/24") for use in the docker_container task below.
    # The ipv4 per container is computed inline there from cluster_id + letter:
    #   offset = (cluster_id mod 8) * 16 + letter_pos + 1     (letter_pos: a=1..z=26)
    # The +1 keeps every container off .1 (the gateway).  Per-cluster 16-IP buckets
    # don't collide under mod-8 for any cluster_id range used by the company-1 scenarios.
    - name: Compute pinned subnet_base (when docker_network_subnet is set)
      ansible.builtin.set_fact:
        subnet_base: "{{ docker_network_subnet | regex_replace('\\.0/\\d+$', '') }}"
      when: (docker_network_subnet | default('') | length) > 0

    - name: Create the shared docker network (auto-assigned subnet)
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: present
      when: (docker_network_subnet | default('') | length) == 0

    - name: Create the shared docker network (pinned subnet for restart-stable IPs)
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: present
        ipam_config:
          - subnet: "{{ docker_network_subnet }}"
      when: (docker_network_subnet | default('') | length) > 0

    - name: Create the shared backups volume (mounted at /backups in every container)
      community.docker.docker_volume:
        name: "{{ backups_volume_name | default('lab_backups') }}"
        state: present

    - name: Launch a privileged systemd-ready container per node
      community.docker.docker_container:
        name: "{{ item }}"
        hostname: "{{ item }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        privileged: true
        command: /usr/sbin/init
        cgroupns_mode: host

        memory: "{{ container_memory | default('2500m') }}"
        memory_swap: "{{ container_memory | default('2500m') }}"
        networks:
          - name: "{{ docker_network_name }}"
            # ipv4_address only set when docker_network_subnet is provided -- omit
            # otherwise so Docker auto-assigns (back-compat with manual single-runs).
            # Formula: <subnet_base>.<(cid mod 8)*16 + letter_pos + 1>  (letter_pos: a=1..z=26)
            ipv4_address: >-
              {{ (subnet_base ~ '.' ~
                  (((item | regex_replace('[^0-9]+', '') | int) % 8) * 16
                   + ('abcdefghijklmnopqrstuvwxyz'.index(item | regex_replace('^[0-9]+', '')) + 1)
                   + 1))
                 if (docker_network_subnet | default('') | length) > 0
                 else omit }}
        networks_cli_compatible: true
        # community.docker >=4.0 dropped purge_networks; the equivalent is
        # comparisons.networks=strict (drop any extra networks not listed above).
        comparisons:
          networks: strict
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
          - "{{ backups_volume_name | default('lab_backups') }}:/backups:rw"
        tmpfs:
          - /run
          - /tmp
      loop: "{{ container_names }}"

    # docker_container with state=started returns as soon as PID 1 (systemd) has been
    # forked, NOT once systemd-boot has finished.  install_ravendb.yml's first apt task
    # then races systemd-boot and can SIGKILL the container mid-apt (rc=137,
    # "container is not running").  Block until systemd reports the system has reached
    # a stable target before declaring provisioning complete.
    - name: Wait for systemd to finish booting inside each container
      ansible.builtin.command:
        cmd: docker exec {{ item }} systemctl is-system-running --wait
      loop: "{{ container_names }}"
      register: systemd_ready
      retries: 30
      delay: 2
      # Acceptable end-states: running, degraded.  "starting" means still booting -> retry.
      until: systemd_ready.stdout | trim in ['running', 'degraded']
      changed_when: false
      # systemctl returns rc!=0 for 'degraded' which is fine for our use; ignore so the
      # `until` clause decides.
      failed_when: false

    # Hard verification: every container we asked for must actually be Running.
    # The systemd-wait task above swallows docker-exec failures via failed_when:false,
    # so a container that never spawned (image pull error, name collision on a different
    # network, docker daemon transient) would slip through.  Catch that here.
    - name: Verify every container is in state=running
      ansible.builtin.shell: |
        docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' {{ item }} 2>/dev/null || echo "MISSING"
      loop: "{{ container_names }}"
      register: ps_check
      changed_when: false

    - name: Fail loud if any container is missing or not running
      ansible.builtin.assert:
        that:
          - ps_check.results | rejectattr('stdout', 'equalto', 'true') | list | length == 0
        fail_msg: >-
          PROVISION FAILED  expected {{ container_names | length }} containers
          ({{ container_names | join(', ') }}); not running:
          {{ ps_check.results | rejectattr('stdout', 'equalto', 'true') | map(attribute='item') | list }}
        success_msg: "All {{ container_names | length }} containers running"

    - name: Show what we provisioned
      ansible.builtin.debug:
        msg: "Provisioned {{ container_names | length }} container(s) on '{{ docker_network_name }}': {{ container_names | join(', ') }}"
