- name: Discover every container on hubsinknet and add it to ravendb_nodes
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Inspect the shared docker network
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: network_info

    - name: Register each container as a host in the ravendb_nodes group
      ansible.builtin.add_host:
        name: "{{ item.Name }}"
        groups: ravendb_nodes
        ansible_connection: community.docker.docker
        ansible_python_interpreter: /usr/bin/python3
      loop: "{{ network_info.network.Containers.values() | list }}"
      changed_when: false


- name: Trust the self-signed CA on the controller
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  tasks:
    - name: Drop the CA cert into the system trust store
      ansible.builtin.copy:
        src: "{{ cert_ca_crt }}"
        dest: /usr/local/share/ca-certificates/hubsink-ca.crt
        owner: root
        group: root
        mode: "0644"
      register: ca_copy

    - name: Refresh the system trust store
      ansible.builtin.command: update-ca-certificates
      when: ca_copy.changed


- name: Install RavenDB (self-signed, secured) on every node
  hosts: ravendb_nodes
  gather_facts: true

  tasks:
    - name: Include ravendb_node role
      ansible.builtin.include_role:
        name: ravendb.ravendb.ravendb_node
      vars:
        ravendb_state: present
        ravendb_version: "{{ rdb_version }}"
        ravendb_release_channel: stable
        ravendb_arch: linux-x64
        ravendb_settings_preset: default
        ravendb_secured_self_signed_enabled: true
        ravendb_license_file: "{{ cert_license }}"
        ravendb_certificate_file: "{{ cert_server_pfx }}"
        ravendb_certificate_password: ""
        ravendb_ca_certificate_file: "{{ cert_ca_crt }}"
        ravendb_ca_key_file: "{{ cert_ca_key }}"
        ravendb_node_tag: "{{ inventory_hostname[-1] | upper }}"
        ravendb_self_signed_public_server_url: "https://{{ inventory_hostname }}.{{ ravendb_domain }}:443"
        ravendb_self_signed_public_server_url_tcp: "tcp://{{ inventory_hostname }}.{{ ravendb_domain }}:38888"


- name: Register the admin client certificate on each cluster leader (<id>a only)
  hosts: ravendb_nodes
  gather_facts: false
  become: true

  tasks:
    - name: Skip followers (anything that does not end with 'a')
      ansible.builtin.meta: end_host
      when: not inventory_hostname.endswith('a')

    - name: Extract server certificate as PEM (used as auth to call /admin/certificates)
      ansible.builtin.command: >-
        openssl pkcs12
        -in /etc/ravendb/security/server.pfx
        -clcerts -nokeys
        -out /etc/ravendb/security/server.pem
        -legacy -passin pass:

    - name: Extract server private key
      ansible.builtin.command: >-
        openssl pkcs12
        -in /etc/ravendb/security/server.pfx
        -nocerts -nodes
        -out /etc/ravendb/security/server.key
        -legacy -passin pass:

    - name: Lock down extracted server material (root:root 0600)
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0600"
        owner: root
        group: root
      loop:
        - /etc/ravendb/security/server.pem
        - /etc/ravendb/security/server.key

    - name: Copy the pre-built admin client PFX onto the leader
      ansible.builtin.copy:
        src: "{{ cert_client_pfx }}"
        dest: /etc/ravendb/security/client.pfx
        owner: root
        group: root
        mode: "0600"

    - name: Register the admin client certificate against RavenDB as ClusterAdmin
      ansible.builtin.shell: >-
        curl -sS -X PUT "https://localhost:443/admin/certificates"
        -H "Content-Type: application/json"
        --cert /etc/ravendb/security/server.pem
        --key /etc/ravendb/security/server.key
        -k
        -d '{
          "Name": "AdminClientCert",
          "Certificate": "'"$(base64 -w 0 /etc/ravendb/security/client.pfx)"'",
          "SecurityClearance": "ClusterAdmin"
        }'
      register: cert_register
      changed_when: '"error" not in cert_register.stdout'
      failed_when: '"InvalidAuth" in cert_register.stdout'
