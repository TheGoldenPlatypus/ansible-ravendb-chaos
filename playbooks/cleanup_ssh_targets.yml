##################################################################################################
# playbooks/cleanup_ssh_targets.yml
#
# Cleans up SSH-mode targets (VMs / bare metal / other computers) -- removes everything the
# chaos harness installed on them.  The hosts themselves stay reachable; we just undo our work.
#
# This is NOT a "teardown" in the docker sense -- we don't destroy the machines (we didn't create
# them, you did).  We just clean what the harness left behind.
#
# What it does, in order:
#   1. Runs the ravendb_node role with state=absent on each host.  The role handles:
#        * stop + disable systemd service
#        * remove /etc/systemd/system/ravendb.service
#        * dpkg --purge ravendb
#        * remove /usr/lib/ravendb, /var/lib/ravendb, /etc/ravendb, /var/log/ravendb
#        * remove ravendb user + group
#        * cleanup python prereqs + ldconfig
#   2. Flushes chaos-specific iptables REJECT/DROP rules that the role wouldn't know about.
#   3. Strips the ANSIBLE MANAGED CHAOS LAB block from /etc/hosts on each host AND the controller.
#
# Does NOT:
#   * Flip cloud-init's manage_etc_hosts back on (form_clusters.yml flipped it off; we
#     leave it that way).
#   * Touch sshd, the OS, apt cache outside RavenDB, or anything else.
#
# RUN EXAMPLE:
#   ansible-playbook -i inventory/ssh_hosts.yml playbooks/cleanup_ssh_targets.yml
##################################################################################################

- name: Sanity check
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Fail if ravendb_nodes group is empty
      ansible.builtin.assert:
        that:
          - (groups['ravendb_nodes'] | default([])) | length > 0
        fail_msg: "Inventory has no hosts in 'ravendb_nodes'.  Pass -i inventory/ssh_hosts.yml."

    - name: Show what we're about to clean up
      ansible.builtin.debug:
        msg: "Cleaning up: {{ groups['ravendb_nodes'] }}"


- name: Uninstall RavenDB via the role's state=absent path
  hosts: ravendb_nodes
  gather_facts: true

  tasks:
    - name: Include ravendb_node with state=absent
      ansible.builtin.include_role:
        name: ravendb.ravendb.ravendb_node
      vars:
        ravendb_state: absent


- name: Chaos-specific cleanup (iptables + /etc/hosts) on each host
  hosts: ravendb_nodes
  gather_facts: false
  become: true

  tasks:
    - name: Flush chaos-leftover REJECT/DROP rules (INPUT chain)
      ansible.builtin.shell: |
        iptables -S INPUT | grep -E '(REJECT|-j DROP)' | sed 's/^-A /-D /' | while read rule; do
          iptables $rule || true
        done
      failed_when: false
      changed_when: false

    - name: Flush chaos-leftover REJECT/DROP rules (OUTPUT chain)
      ansible.builtin.shell: |
        iptables -S OUTPUT | grep -E '(REJECT|-j DROP)' | sed 's/^-A /-D /' | while read rule; do
          iptables $rule || true
        done
      failed_when: false
      changed_when: false

    - name: Strip ANSIBLE MANAGED CHAOS LAB block from /etc/hosts on the host
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB"
        state: absent


- name: Strip the same block from the controller's /etc/hosts
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  tasks:
    - name: Remove ANSIBLE MANAGED CHAOS LAB block on the controller
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED CHAOS LAB"
        state: absent


- name: Done
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Summary
      ansible.builtin.debug:
        msg: >-
          SSH CLEANUP DONE  {{ groups['ravendb_nodes'] | length }} host(s) returned to clean state
          (RavenDB uninstalled via role, chaos iptables flushed, /etc/hosts stripped).  Hosts
          themselves are still reachable -- only what the chaos harness installed was removed.
