##################################################################################################
# toolbox/smuggler/import_dump.yml
#
# Smuggler-imports a `.ravendbdump` file INTO an existing database via
# `POST /databases/<db>/smuggler/import` (multipart upload).  Goes through the public REST
# API, so revisions get re-keyed in the target's PK form (different from restore_backup,
# which restores a snapshot into a NEW database from a container-local path).
#
# Primary use cases:
#   * seed legacy-format data (e.g. legacy counters) into an all-v_new cluster -- dump on a
#     v_old lab once, commit the .ravendbdump file, scenarios import it during setup.  The
#     dump's on-disk legacy format is preserved exactly the test surface for "legacy-form-
#     on-v_new" cases that can't be created any other way.
#   * import a cross-topology dump produced by smuggler/export_dump.yml (RV-2 sharded ->
#     non-sharded).
#
# INPUTS:
#   target            REQUIRED.  Container/host to import into (typically the cluster leader).
#   db_name           REQUIRED.  Existing database name -- create it BEFORE calling this.
#   dump_path         REQUIRED.  Absolute path on the controller to the .ravendbdump file.
#   skip_if_missing   OPTIONAL.  Default false.  When true, a missing dump_path becomes a
#                                no-op (prints SKIP and exits ok).  Useful for scenarios
#                                that reference an optional fixture file that may not yet
#                                exist in every checkout.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/smuggler/import_dump.yml \
#       -e target=1a -e db_name=db1 \
#       -e dump_path=$PWD/scenarios/company-1/RP1/fixtures/legacy-counter.ravendbdump
#
#   ansible-playbook toolbox/smuggler/import_dump.yml \
#       -e target=1a -e db_name=db1 \
#       -e dump_path=$PWD/scenarios/company-1/RP1/fixtures/legacy-counter.ravendbdump \
#       -e skip_if_missing=true
##################################################################################################

- name: Smuggler-import a .ravendbdump file into an existing database
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_smuggler:
        kind: import
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        dump_path: "{{ dump_path }}"
        skip_if_missing: "{{ skip_if_missing | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
