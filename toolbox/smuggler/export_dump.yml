##################################################################################################
# toolbox/smuggler/export_dump.yml
#
# Smuggler-exports a database to a `.ravendbdump` file on the controller via
# `POST /databases/<db>/smuggler/export`.  Goes through the public REST API, so revisions
# get re-keyed in the target's PK form on import (different from a snapshot backup, which
# preserves on-disk binary form).
#
# Primary use case: produce a cross-topology dump that can be re-imported into a different
# topology (sharded source -> non-sharded target in RV-2, etc).
#
# INPUTS:
#   target      REQUIRED.  Container/host to export from (typically the cluster leader).
#   db_name     REQUIRED.  Database name.
#   dump_path   REQUIRED.  Absolute path on the controller for the output .ravendbdump file.
#                          The parent directory is created if it doesn't exist.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/smuggler/export_dump.yml \
#       -e target=1a -e db_name=db1 \
#       -e dump_path=$PWD/captures/my-dump.ravendbdump
##################################################################################################

- name: Smuggler-export a database to a .ravendbdump file on the controller
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_smuggler:
        kind: export
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        dump_path: "{{ dump_path }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
