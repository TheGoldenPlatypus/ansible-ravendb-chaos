# Single conflicts-resolved poll iteration.  Included from wait_for_conflicts_resolved.yml.
# State carried in:  conflict_set, eff_poll, db_name, ravendb_domain, cert_dir, cert_ca_crt.
# Flow: probe -> compute "every node reports 0 conflicts?" -> if so: end_play.  Otherwise sleep.

- name: Probe conflict_set
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/replication/conflicts?pageSize=0"
    client_cert: "{{ cert_dir }}/client.pem"
    ca_path: "{{ cert_ca_crt }}"
    status_code: [200, 404, 500, 503]
  register: probe
  loop: "{{ conflict_set }}"
  loop_control:
    label: "{{ item }}"
  no_log: "{{ quiet | default(true) | bool }}"

- name: Compute per-node conflict counts (node -> count)
  no_log: "{{ quiet | default(true) | bool }}"
  ansible.builtin.set_fact:
    last_counts: >-
      {{
        dict(probe.results
              | selectattr('status', '==', 200)
              | map(attribute='item')
              | zip(probe.results
                      | selectattr('status', '==', 200)
                      | map(attribute='json.TotalResults')
                      | map('default', 0)))
      }}

- name: Compute "every node reports 0 conflicts?"
  no_log: "{{ quiet | default(true) | bool }}"
  ansible.builtin.set_fact:
    resolved: >-
      {{
        (last_counts | length) == (conflict_set | length)
        and (last_counts.values() | map('int') | unique | list) == [0]
      }}

- name: Announce resolution
  ansible.builtin.debug:
    msg: >-
      CONFLICTS RESOLVED  db={{ db_name }}  nodes={{ conflict_set }}
      attempt={{ attempt_idx + 1 }}/{{ max_attempts }}
  when: resolved | bool

- name: End the play on resolution
  ansible.builtin.meta: end_play
  when: resolved | bool

- name: Sleep before next attempt
  no_log: "{{ quiet | default(true) | bool }}"
  ansible.builtin.pause:
    seconds: "{{ eff_poll }}"
