##################################################################################################
# toolbox/wait/wait_for_member.yml
#
# Waits until a target node is a full Member of its cluster's database topology
# (present in Members, absent from Promotables and Rehabs) on /admin/databases?name=<db>.
# Use after a chaos action has been undone to confirm the rehab phase actually finished
# before measuring post-recovery state.
#
# Pairs with toolbox/wait/wait_for_rehab.yml.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Container name of any node in the cluster to query (e.g. 1a).
#   db_name         REQUIRED.  Database name whose topology we inspect.
#   target          REQUIRED.  Node we expect to become Member (e.g. 1b).  Its cluster tag is
#                              derived as upper(target[-1]) by convention.
#   target_tag      OPTIONAL.  Override the auto-derived tag (e.g. target=myextra needs E).
#   timeout_secs    OPTIONAL.  Default 300.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_member.yml -e cluster_leader=1a -e db_name=Tenants -e target=1b
##################################################################################################

- name: Wait until target rejoins as full Member
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: member
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        cluster_leader: "{{ cluster_leader }}"
        db_name: "{{ db_name }}"
        target: "{{ target }}"
        target_tag: "{{ target_tag | default(omit) }}"
        timeout: "{{ timeout_secs | default(300) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
