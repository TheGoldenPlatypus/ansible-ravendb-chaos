##################################################################################################
# toolbox/wait/wait_for_marker_propagation.yml
#
# PUT a uniquely-IDed marker doc on `source`, then poll every node in `targets` until the
# marker appears (or fail after the budget).  End-to-end "replication is flowing" check;
# complements wait_for_quiescence (steady state) by proving the wire actually moves.
#
# INPUTS:
#   db_name             REQUIRED.
#   source              REQUIRED.  Node to PUT the marker on (e.g. 1a).
#   targets             REQUIRED.  JSON list of nodes to poll (e.g. ["1b","1c"]).
#   timeout_secs        OPTIONAL.  Default 60.
#   marker_id_prefix    OPTIONAL.  Default "markers/".  Override when the source->target leg
#                                  has a filter that wouldn't admit the default prefix
#                                  (e.g. marker_id_prefix=users/sink1/marker- for a sink
#                                  filtered to users/sink1/*).
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_marker_propagation.yml \
#       -e db_name=db1 -e source=1a -e '{"targets":["1b","1c"]}'
##################################################################################################

- name: Marker propagation
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: marker_propagation
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        source: "{{ source }}"
        targets: "{{ targets }}"
        marker_id_prefix: "{{ marker_id_prefix | default(omit) }}"
        timeout: "{{ timeout_secs | default(60) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
