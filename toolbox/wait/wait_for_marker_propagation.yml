##################################################################################################
# toolbox/wait/wait_for_marker_propagation.yml
#
# Write a uniquely-IDed marker doc on `source`, then poll every `targets` node until that
# marker appears (or fail after the budget).  End-to-end "replication is flowing" check;
# complements wait_for_quiescence (steady state) by proving the wire actually moves.
#
# INPUTS:
#   db_name        REQUIRED.  Database name.
#   source         REQUIRED.  Node to PUT the marker on (e.g. 1a).
#   targets        REQUIRED.  JSON list of nodes to poll for the marker (e.g. ["1b","1c"]).
#   timeout_secs   OPTIONAL.  Default 60.  Per-target wait budget.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_marker_propagation.yml \
#       -e db_name=db1 -e source=1a -e '{"targets":["1b","1c"]}'
##################################################################################################

- name: Marker propagation
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - db_name is defined
          - source is defined
          - targets is defined
          - targets is iterable
          - (targets | length) > 0
        fail_msg: "Required: -e db_name=<db> -e source=<node> -e '{\"targets\":[...]}'"

    - name: Pick a unique marker id
      ansible.builtin.set_fact:
        marker_id: "markers/{{ lookup('pipe', 'date +%s%N') }}-{{ 99999 | random }}"

    - name: PUT the marker on {{ source }}
      ansible.builtin.uri:
        url: "https://{{ source }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/docs?id={{ marker_id | urlencode }}"
        method: PUT
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        body_format: json
        body:
          "@metadata":
            "@collection": "Markers"
        status_code: [200, 201]

    - name: Poll each target until the marker appears
      ansible.builtin.uri:
        url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/docs?id={{ marker_id | urlencode }}"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 404]
      register: poll
      retries: "{{ ((timeout_secs | default(60)) | int / 2) | int }}"
      delay: 2
      until: poll.status == 200
      loop: "{{ targets }}"
      loop_control:
        label: "{{ item }}"

    - name: Done
      ansible.builtin.debug:
        msg: "PASS  marker {{ marker_id }} propagated from {{ source }} -> {{ targets }}"
