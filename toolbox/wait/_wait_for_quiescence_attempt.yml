# Single quiescence-poll iteration.  Included from wait_for_quiescence.yml.
# State carried in:  convergence_set, eff_poll, db_name, ravendb_domain, cert_dir, cert_ca_crt.
# Flow: probe -> compute quiescent -> if quiescent: print + end_play.  Otherwise sleep.

- name: Probe convergence_set
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/stats"
    client_cert: "{{ cert_dir }}/client.pem"
    ca_path: "{{ cert_ca_crt }}"
    status_code: [200, 404, 500, 503]
  register: probe
  loop: "{{ convergence_set }}"
  loop_control:
    label: "{{ item }}"

- name: Compute "all CVs equal?" for this attempt
  ansible.builtin.set_fact:
    last_cvs: "{{ probe.results | selectattr('status', '==', 200) | map(attribute='json.DatabaseChangeVector') | list }}"
    quiescent: >-
      {{
        ((probe.results | selectattr('status', '==', 200) | list | length) == (convergence_set | length))
        and
        ((probe.results
            | selectattr('status', '==', 200)
            | map(attribute='json.DatabaseChangeVector')
            | map('default', '')
            | map('regex_findall', '[A-Za-z0-9]+:\d+-[A-Za-z0-9+/=_\-]+')
            | map('sort')
            | map('list')
            | unique
            | length) == 1)
      }}

- name: Announce convergence
  ansible.builtin.debug:
    msg: >-
      QUIESCENT  db={{ db_name }}  nodes={{ convergence_set }}
      attempt={{ attempt_idx + 1 }}/{{ max_attempts }}
      CV={{ last_cvs | first }}
  when: quiescent | bool

- name: End the play on convergence
  ansible.builtin.meta: end_play
  when: quiescent | bool

- name: Sleep before next attempt
  ansible.builtin.pause:
    seconds: "{{ eff_poll }}"
