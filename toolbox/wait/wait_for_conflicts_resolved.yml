##################################################################################################
# toolbox/wait/wait_for_conflicts_resolved.yml
#
# Waits until /databases/<db>/replication/conflicts reports zero conflicts on every probed
# node.  Use after a heal-from-partition step where concurrent writes on both sides created
# conflicts -- asserts the cluster's conflict resolver converges within a bounded budget.
#
# Note: this is NOT "no conflicts ever existed" -- conflict count is expected to be nonzero
# before this tool runs.  It asserts the resolution path converges to zero.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.  JSON list of node names to watch.
#   timeout_secs   OPTIONAL.  Default 60.  (NOT `timeout` -- reserved Ansible variable name.)
#   poll_interval  OPTIONAL.  Default 2.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_conflicts_resolved.yml \
#       -e db_name=Tenants -e timeout_secs=90 -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Wait until /replication/conflicts is empty on every node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: conflicts_resolved
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        timeout: "{{ timeout_secs | default(60) | int }}"
        poll_interval: "{{ poll_interval | default(2) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
