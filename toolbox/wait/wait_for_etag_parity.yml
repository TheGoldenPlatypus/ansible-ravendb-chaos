##################################################################################################
# toolbox/wait/wait_for_etag_parity.yml
#
# Per-node LastDatabaseEtag stability check.  Snapshots /stats.LastDatabaseEtag on every node,
# waits poll_interval seconds, snapshots again -- passes when EVERY node's etag is identical
# across the two reads ("no node has issued a new write in the last window").
#
# This is per-node stability, NOT cross-node parity -- LastDatabaseEtag is each node's local
# write counter; comparing values across nodes is meaningless.  For cross-node parity of the
# database change-vector, use wait_for_quiescence.yml.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.  JSON list of node names.
#   timeout_secs   OPTIONAL.  Default 180.  (NOT `timeout` -- reserved Ansible variable name.)
#   poll_interval  OPTIONAL.  Default 3.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_etag_parity.yml -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Wait until LastDatabaseEtag is stable on every node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: etag_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        timeout: "{{ timeout_secs | default(180) | int }}"
        poll_interval: "{{ poll_interval | default(3) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
