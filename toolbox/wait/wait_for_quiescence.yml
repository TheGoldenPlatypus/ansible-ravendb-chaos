##################################################################################################
# toolbox/wait/wait_for_quiescence.yml
#
# Waits until replication is fully caught up across a set of nodes -- defined as "every
# node's DatabaseChangeVector (from /stats) is identical".  Nodes returning non-200 are
# dropped from the convergence set on first probe.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.  JSON list of node names.  Pass exactly the cluster you want
#                             to converge -- a multi-cluster lab would otherwise try to
#                             match CVs across independent clusters and never settle.
#   timeout_secs   OPTIONAL.  Default 180.  (NOT `timeout` -- reserved Ansible variable name.)
#   poll_interval  OPTIONAL.  Default 2.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_quiescence.yml -e db_name=Tenants -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Wait until every node's DatabaseChangeVector matches
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: quiescence
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        timeout: "{{ timeout_secs | default(180) | int }}"
        poll_interval: "{{ poll_interval | default(2) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
