##################################################################################################
# toolbox/wait/wait_for_docs_drain.yml
#
# Waits until writes have stopped flowing through the cluster -- defined as "every node's
# DatabaseChangeVector has been unchanged across two consecutive polls separated by
# `poll_interval` seconds".  Distinct from wait_for_quiescence (which checks cross-node CV
# EQUALITY); drain is the per-node "outbound queue has settled" signal.
#
# Use this when you need to be sure the previous workload has flushed before starting a
# new measurement.
#
# How it works:
#   1. Classify nodes (drop 404/500/503).
#   2. Bounded outer loop includes a single-attempt tasks file.  Each iteration polls every
#      node's CV, compares to the previous snapshot, and if every node's CV stayed equal,
#      flips `drained=true` and ends the play.  Otherwise updates the snapshot and sleeps.
#
# INPUTS:
#   db_name        REQUIRED.  Database name.
#   nodes          REQUIRED.  JSON list of node names to watch.
#   timeout        OPTIONAL.  Max wall-clock seconds.  Default 180.
#   poll_interval  OPTIONAL.  Seconds between polls (= stable_for window).  Default 3.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_docs_drain.yml \
#       -e db_name=Tenants -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Wait until DatabaseChangeVector stops changing on every node
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - db_name is defined
          - nodes is defined
          - nodes is iterable
          - (nodes | length) > 0
        fail_msg: "Required: -e db_name=<db> -e '{\"nodes\":[\"1a\",\"1b\",\"1c\"]}'"

    - name: Resolve params + initial state
      ansible.builtin.set_fact:
        eff_timeout: "{{ (timeout | default(180)) | int }}"
        eff_poll: "{{ (poll_interval | default(3)) | int }}"
        prev_cvs: {}
        drained: false

    - name: Compute max attempts
      ansible.builtin.set_fact:
        max_attempts: "{{ ((eff_timeout | int) / (eff_poll | int)) | int }}"

    - name: Classify nodes -- which ones actually have the DB
      ansible.builtin.uri:
        url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/stats"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 404, 500, 503]
      register: classify
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item }}"

    - name: Compute drain_set + skipped
      ansible.builtin.set_fact:
        drain_set: "{{ classify.results | selectattr('status', '==', 200) | map(attribute='item') | list }}"
        skipped_nodes: "{{ classify.results | rejectattr('status', '==', 200) | map(attribute='item') | list }}"

    - name: Note any skipped nodes
      ansible.builtin.debug:
        msg: "SKIPPED (DB not present / unreachable): {{ skipped_nodes }}"
      when: skipped_nodes | length > 0

    - name: Fail if no node has the DB
      ansible.builtin.assert:
        that:
          - drain_set | length > 0
        fail_msg: "No probed node has database '{{ db_name }}' -- nothing to wait on"

    - name: Poll loop -- include a single-attempt tasks file up to max_attempts times
      ansible.builtin.include_tasks: _wait_for_docs_drain_attempt.yml
      loop: "{{ range(max_attempts | int) | list }}"
      loop_control:
        loop_var: attempt_idx
        label: "attempt {{ attempt_idx + 1 }}/{{ max_attempts }}"
      no_log: "{{ quiet | default(true) | bool }}"

    - name: Timeout verdict (only reached if drain never fired meta:end_play)
      ansible.builtin.fail:
        msg: "TIMEOUT after {{ max_attempts }} attempts ({{ eff_timeout }}s) -- CVs were still moving"
