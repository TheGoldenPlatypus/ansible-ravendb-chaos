##################################################################################################
# toolbox/wait/wait_for_docs_drain.yml
#
# Waits until each node's DatabaseChangeVector is unchanged across two consecutive polls --
# per-node "outbound queue settled" signal.  Distinct from wait_for_quiescence (cross-node CV
# EQUALITY) -- this asserts each node has gone quiet, not that they agree.
#
# Use when you need to be sure the previous workload has flushed before starting a new
# measurement.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.  JSON list of node names.
#   timeout_secs   OPTIONAL.  Default 180.  (NOT `timeout` -- reserved Ansible variable name.)
#   poll_interval  OPTIONAL.  Default 3 (= stable_for window).
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_docs_drain.yml -e db_name=Tenants -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Wait until DatabaseChangeVector stops changing on every node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: docs_drain
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        timeout: "{{ timeout_secs | default(180) | int }}"
        poll_interval: "{{ poll_interval | default(3) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
