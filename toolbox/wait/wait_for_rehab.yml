##################################################################################################
# toolbox/wait/wait_for_rehab.yml
#
# Waits until a target node enters database-level rehab (appears in Rehabs or Promotables
# of /databases/{db}/topology).  Use this immediately after a chaos action that should
# kick a node out of "Member" state -- e.g. cutting all its peer links, restarting it
# under load, or restoring it after a long isolation.
#
# Fails (intentionally) if the target never leaves Member state within the timeout --
# that means the chaos action didn't actually destabilise the node and the test isn't
# exercising the rehab code path.  Pair with toolbox/wait/wait_for_member.yml to wait for
# the rehab to complete.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Container name of any node in the cluster to query (e.g. 1a).
#   db_name         REQUIRED.  Database name whose topology we inspect.
#   target          REQUIRED.  Container name of the node we expect to enter rehab (e.g. 1b).
#                              Its cluster tag is derived as upper(target[-1]) by convention.
#   target_tag      OPTIONAL.  Single-letter cluster tag override.  Pass this when the
#                              container name doesn't follow the <id><letter> convention
#                              (e.g. target=myextra needs an explicit target_tag=E).
#   timeout_secs    OPTIONAL.  Default 120.  Total wait budget for rehab to start.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_rehab.yml -K \
#       -e cluster_leader=1a -e db_name=Tenants -e target=1b
##################################################################################################

- name: Wait until target enters rehab
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - cluster_leader is defined
          - db_name is defined
          - target is defined
        fail_msg: "Required: -e cluster_leader=<node> -e db_name=<db> -e target=<node>"

    - name: Resolve target_tag (explicit override wins, else last char of target uppercased)
      ansible.builtin.set_fact:
        target_tag: "{{ target_tag | default(target[-1] | upper, true) }}"

    - name: Poll {{ cluster_leader }}'s DatabaseRecord for {{ db_name }} until {{ target_tag }} is in Rehabs or Promotables
      ansible.builtin.uri:
        url: "https://{{ cluster_leader }}.{{ ravendb_domain }}:443/admin/databases?name={{ db_name }}"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        return_content: true
      register: topo
      retries: "{{ (timeout_secs | default(120) | int // 2) }}"
      delay: 2
      until: >-
        target_tag in (topo.json.Topology.Promotables | default([]) | list)
        or target_tag in (topo.json.Topology.Rehabs | default([]) | list)

    - name: Done
      ansible.builtin.debug:
        msg: "REHAB STARTED  {{ target }} (tag {{ target_tag }}) entered Promotables/Rehabs on {{ db_name }}"
