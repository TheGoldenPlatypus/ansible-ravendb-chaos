##################################################################################################
# toolbox/wait/wait_for_rehab.yml
#
# Waits until a target node enters database-level rehab (appears in Rehabs or Promotables of
# /admin/databases?name=<db>).  Use immediately after a chaos action that should kick a node
# out of Member state.
#
# Fails (intentionally) if the target never leaves Member state within the timeout -- that
# means the chaos action didn't destabilise the node and the test isn't exercising the rehab
# code path.  Pair with toolbox/wait/wait_for_member.yml to wait for rehab to complete.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Container name of any node in the cluster (e.g. 1a).
#   db_name         REQUIRED.
#   target          REQUIRED.  Node we expect to enter rehab (e.g. 1b).  Cluster tag derived
#                              as upper(target[-1]) by convention.
#   target_tag      OPTIONAL.  Override the auto-derived tag.
#   timeout_secs    OPTIONAL.  Default 120.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/wait/wait_for_rehab.yml -e cluster_leader=1a -e db_name=Tenants -e target=1b
##################################################################################################

- name: Wait until target enters rehab
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: rehab
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        cluster_leader: "{{ cluster_leader }}"
        db_name: "{{ db_name }}"
        target: "{{ target }}"
        target_tag: "{{ target_tag | default(omit) }}"
        timeout: "{{ timeout_secs | default(120) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
