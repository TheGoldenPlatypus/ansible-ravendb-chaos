##################################################################################################
# toolbox/wait/wait_for_hub_sink_doc_set.yml
#
# At a deliberately quiet point in a hub-sink scenario, verify by exhaustive enumeration that
# every doc the replication config says should be on each side actually is.  Polls until
# convergence or timeout.
#
# What it does (no probes, no sampling, no /stats counts):
#   1. Stream every live doc id from hub leader (/databases/<db>/docs, paginated).
#   2. Stream every live doc id from sink leader.
#   3. expected_on_sink = { hub_id : hub_id matches any allowed_prefixes }
#      expected_on_hub  = { sink_id : sink_id does NOT match any sink_local_prefixes }
#   4. ASSERT expected_on_sink subset-of sink_ids  AND  expected_on_hub subset-of hub_ids.
#   5. On timeout, raises with the actual missing-id lists (capped sample shown).
#
# INPUTS:
#   db_name              REQUIRED.
#   hub_cluster_leader   REQUIRED.  Hub leader to enumerate.
#   sink_cluster_leader  REQUIRED.  Sink leader to enumerate.
#   allowed_prefixes     REQUIRED.  JSON list -- the hub->sink filter (e.g. ["users/sink1/*"]).
#   sink_local_prefixes  OPTIONAL.  JSON list -- ids allowed to exist on sink with no hub twin.
#                                   Default [] (every sink doc must also be on hub).
#   timeout_secs         OPTIONAL.  Default 180.
#   poll_interval        OPTIONAL.  Default 3.
#   sample_cap           OPTIONAL.  Max ids shown per side in the failure report.  Default 25.
#
# RUN EXAMPLE (RP-1):
#   ansible-playbook toolbox/wait/wait_for_hub_sink_doc_set.yml \
#       -e db_name=db1 -e hub_cluster_leader=1a -e sink_cluster_leader=2a \
#       -e '{"allowed_prefixes":["users/sink1/*"],"sink_local_prefixes":["sink1-local/"]}'
##################################################################################################

- name: Wait until hub-sink doc-set is complete on both sides
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: hub_sink_doc_set_converged
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        hub_cluster_leader:  "{{ hub_cluster_leader }}"
        sink_cluster_leader: "{{ sink_cluster_leader }}"
        allowed_prefixes:    "{{ allowed_prefixes }}"
        sink_local_prefixes: "{{ sink_local_prefixes | default(omit) }}"
        sample_cap:          "{{ sample_cap | default(omit) }}"
        timeout:             "{{ timeout_secs | default(180) | int }}"
        poll_interval:       "{{ poll_interval | default(3) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
