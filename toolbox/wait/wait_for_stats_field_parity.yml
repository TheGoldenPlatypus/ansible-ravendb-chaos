##################################################################################################
# toolbox/wait/wait_for_stats_field_parity.yml
#
# Polls /stats on each node until the specified count-field(s) match across the convergence
# set, or a timeout is reached.  Different from wait_for_etag_parity (per-node stability) --
# this one asserts cross-node equality of named field values right now.
#
# Use case: after a workload stops and etags are stable, RavenDB's background tombstone
# cleanup (and similar background jobs) still needs idle time to bring per-node counts into
# agreement.  Replaces a fragile fixed sleep with an actual signal.
#
# Default field is CountOfTombstones.  Pass `fields` to wait on additional fields (only if
# you have evidence they converge -- some /stats counts are per-node intrinsic).
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.  JSON list of node names.
#   fields         OPTIONAL.  JSON list of /stats field names.  Default ["CountOfTombstones"].
#   timeout_secs   OPTIONAL.  Default 180.  (NOT `timeout` -- reserved Ansible variable name.)
#   poll_interval  OPTIONAL.  Default 3.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/wait/wait_for_stats_field_parity.yml -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
#   ansible-playbook toolbox/wait/wait_for_stats_field_parity.yml -e db_name=db1 \
#       -e '{"nodes":["1a","1b","1c"],"fields":["CountOfTombstones","CountOfDocuments"]}'
##################################################################################################

- name: Wait until specified /stats fields match across every node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_wait:
        kind: stats_field_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        fields: "{{ fields | default(omit) }}"
        timeout: "{{ timeout_secs | default(180) | int }}"
        poll_interval: "{{ poll_interval | default(3) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
