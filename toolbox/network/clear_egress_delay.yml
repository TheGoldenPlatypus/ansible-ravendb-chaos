##################################################################################################
# toolbox/network/clear_egress_delay.yml
#
# Remove the root netem qdisc previously installed by inject_egress_delay.yml.  Idempotent --
# `tc qdisc del` on a missing qdisc returns 2; we tolerate that so cleanup is safe to run blind.
#
# INPUTS:
#   target      REQUIRED.  Container name (e.g. 1a).
#   interface   OPTIONAL.  Default "eth0".
#
# RUN:
#   ansible-playbook toolbox/network/clear_egress_delay.yml -K -e target=1a
##################################################################################################

- name: Clear egress delay
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
        fail_msg: "Required: -e target=<container>"

    - name: docker exec -- tc qdisc del root (idempotent)
      ansible.builtin.command:
        cmd: docker exec {{ target }} tc qdisc del dev {{ interface | default('eth0') }} root
      register: out
      changed_when: out.rc == 0
      failed_when: out.rc not in [0, 2]   # rc=2 = nothing to delete

    - name: Done
      ansible.builtin.debug:
        msg: "EGRESS-DELAY-CLEAR  {{ target }}:{{ interface | default('eth0') }} (rc={{ out.rc }})"
