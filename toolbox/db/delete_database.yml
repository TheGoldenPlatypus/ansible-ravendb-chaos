##################################################################################################
# toolbox/db/delete_database.yml
#
# Deletes a database AND wipes its data files from every node in the cluster.
#
# Why the disk wipe?  RavenDB's python-client default for DeleteDatabaseOperation is
# hard_delete=False, which removes the database from the cluster topology but leaves
# the data files on disk at /var/lib/ravendb/data/Databases/<name>/.  When you later
# recreate the database with the same name, RavenDB re-mounts those files and "old"
# docs reappear -- including change-vector etag state from the previous incarnation.
# This tool prevents that by stopping RavenDB on each node, deleting the on-disk
# directory, and starting it back up.
#
# Works in both target_modes (docker / ssh).
#
# What it does, in order:
#   1. Calls the raw DELETE /admin/databases REST API on cluster_leader (removes topology entry).
#   2. Polls /databases on the leader until the db is no longer listed.
#   3. Discovers every node in the same cluster as cluster_leader (same leading id,
#      e.g. cluster_leader=1a -> peers 1a, 1b, 1c, ...).
#   4. On EACH peer: systemctl stop ravendb -> rm -rf the db's on-disk dir -> systemctl start ravendb.
#   5. Waits for each peer's HTTPS endpoint to come back.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Node name of any node in the cluster (e.g. 1a).
#   db_name         REQUIRED.  Database name to delete.
#   timeout_secs    OPTIONAL.  Default 60.  Wait budget for the topology delete to propagate.
#   data_dir        OPTIONAL.  Default /var/lib/ravendb/data.  Base RavenDB data dir on
#                              each node.  Actual path: <data_dir>/Databases/<db_name>/.
#
# RUN EXAMPLES:
#   # docker
#   ansible-playbook toolbox/db/delete_database.yml -K -e cluster_leader=1a -e db_name=Tenants
#
#   # ssh
#   ansible-playbook -i inventory/ssh_hosts.yml toolbox/db/delete_database.yml -e cluster_leader=1a -e db_name=Tenants
##################################################################################################

# ===== PLAY 1 -- REST DELETE + compute cluster_peers (runs on localhost) ========================

- name: Delete from cluster topology + compute peers
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _is_ssh: "{{ target_mode | default('docker') == 'ssh' }}"

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - cluster_leader is defined
          - db_name is defined
        fail_msg: "Required: -e cluster_leader=<node> -e db_name=<db>"

    - name: Delete database via REST API (removes topology entry; files wiped manually below)
      ansible.builtin.uri:
        url: "https://{{ cluster_leader }}.{{ ravendb_domain }}:443/admin/databases"
        method: DELETE
        body_format: json
        body:
          DatabaseNames: ["{{ db_name }}"]
          HardDelete: false
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 204]

    - name: Poll /databases until {{ db_name }} is no longer listed
      ansible.builtin.uri:
        url: "https://{{ cluster_leader }}.{{ ravendb_domain }}:443/databases"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
      register: dbs
      retries: "{{ (timeout_secs | default(60) | int // 2) }}"
      delay: 2
      until: (dbs.json.Databases | default([]) | map(attribute='Name') | list) is not contains(db_name)

    - name: Compute cluster id from cluster_leader (e.g. 1a -> 1)
      ansible.builtin.set_fact:
        cluster_id: "{{ cluster_leader[:-1] }}"

    - name: (docker) Inspect docker network
      community.docker.docker_network_info:
        name: "{{ docker_network_name }}"
      register: net
      when: not _is_ssh

    - name: (docker) Pick every container belonging to this cluster
      ansible.builtin.set_fact:
        cluster_peers: "{{ (net.network.Containers | default({})).values() | list | map(attribute='Name') | select('match', '^' ~ cluster_id ~ '[a-z]$') | list }}"
      when: not _is_ssh

    - name: (ssh) Pick every inventory host belonging to this cluster
      ansible.builtin.set_fact:
        cluster_peers: "{{ groups['ravendb_nodes'] | select('match', '^' ~ cluster_id ~ '[a-z]$') | list }}"
      when: _is_ssh

    - name: Show the peers we're about to wipe
      ansible.builtin.debug:
        msg: "Will stop RavenDB + rm -rf {{ data_dir | default('/var/lib/ravendb/data') }}/Databases/{{ db_name }} on: {{ cluster_peers }}"

# ===== PLAY 2 -- docker mode: stop / wipe / start via docker_container_exec =====================
# Runs on localhost (since docker hosts aren't in inventory) and uses docker_container_exec.

- name: (docker) Stop / wipe / start ravendb on each peer
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: (docker) Stop ravendb inside each peer
      community.docker.docker_container_exec:
        container: "{{ item }}"
        command: systemctl stop ravendb
      loop: "{{ hostvars['localhost'].cluster_peers }}"
      when: target_mode | default('docker') == 'docker'

    - name: (docker) rm -rf the database's on-disk dir inside each peer
      community.docker.docker_container_exec:
        container: "{{ item }}"
        command: rm -rf {{ data_dir | default('/var/lib/ravendb/data') }}/Databases/{{ db_name }}
      loop: "{{ hostvars['localhost'].cluster_peers }}"
      when: target_mode | default('docker') == 'docker'

    - name: (docker) Start ravendb inside each peer
      community.docker.docker_container_exec:
        container: "{{ item }}"
        command: systemctl start ravendb
      loop: "{{ hostvars['localhost'].cluster_peers }}"
      when: target_mode | default('docker') == 'docker'

# ===== PLAY 3 -- ssh mode: stop / wipe / start as a normal play on ravendb_nodes ================
# Runs ON each cluster peer directly (no delegate_to weirdness), filtered by cluster_peers.

- name: (ssh) Stop / wipe / start ravendb on each peer
  hosts: ravendb_nodes
  gather_facts: false
  become: true

  tasks:
    - name: Skip hosts not in cluster_peers
      ansible.builtin.meta: end_host
      when:
        - target_mode | default('docker') == 'docker'
          or inventory_hostname not in (hostvars['localhost'].cluster_peers | default([]))

    - name: Stop ravendb
      ansible.builtin.shell: systemctl stop ravendb
      changed_when: false

    - name: rm -rf the database's on-disk dir
      ansible.builtin.file:
        path: "{{ data_dir | default('/var/lib/ravendb/data') }}/Databases/{{ db_name }}"
        state: absent

    - name: Start ravendb
      ansible.builtin.shell: systemctl start ravendb
      changed_when: false

# ===== PLAY 4 -- wait for HTTPS to come back on each peer (localhost) ===========================

- name: Wait for HTTPS to come back on each peer
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Wait for HTTPS to come back on each peer
      ansible.builtin.uri:
        url: "https://{{ item }}.{{ ravendb_domain }}:443/build/version"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 401, 403]
      register: post_start
      retries: 30
      delay: 2
      until: post_start.status in [200, 401, 403]
      loop: "{{ hostvars['localhost'].cluster_peers }}"

    - name: Done
      ansible.builtin.debug:
        msg: "DELETED  {{ db_name }} from cluster {{ hostvars['localhost'].cluster_id }} (topology entry gone + on-disk dir wiped on {{ hostvars['localhost'].cluster_peers | length }} node(s))"
