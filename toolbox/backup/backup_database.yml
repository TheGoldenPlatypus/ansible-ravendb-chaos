##################################################################################################
# toolbox/backup/backup_database.yml
#
# Triggers an on-demand Logical or Snapshot backup and waits for completion.  RavenDB has no
# true ad-hoc backup REST -- this creates a periodic-backup task scheduled far in the future
# (won't auto-fire), triggers it manually, waits, deletes the task at the end.
#
# Long-running: a real backup can take minutes.  Ansible buffers module output, so the task
# looks "hung" while waiting.  Open a second terminal and `tail -F` the printed progress log
# to watch per-poll status live.
#
# INPUTS:
#   target           REQUIRED.
#   db_name          REQUIRED.
#   backup_type      OPTIONAL.  "Backup" (default) or "Snapshot".
#   backup_path      OPTIONAL.  Default /backups/<db>-<timestamp>/.
#   timeout_secs     OPTIONAL.  Default 300.
#   poll_interval    OPTIONAL.  Default 3.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/backup/backup_database.yml -e target=1a -e db_name=Tenants
#   ansible-playbook toolbox/backup/backup_database.yml -e target=1a -e db_name=Tenants -e backup_type=Snapshot
##################################################################################################

- name: Trigger an on-demand backup and wait for completion
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve progress log path
      ansible.builtin.set_fact:
        progress_log: "/tmp/ravendb-backup-{{ db_name }}-{{ lookup('pipe','date +%Y%m%d-%H%M%S') }}.log"

    - name: Progress hint
      ansible.builtin.debug:
        msg:
          - "Long-running operation -- this task will block until the backup completes (or times out)."
          - "Watch progress live from another shell:   tail -F {{ progress_log }}"

    - ravendb_backup:
        kind: backup
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        backup_type: "{{ backup_type | default(omit) }}"
        backup_path: "{{ backup_path | default(omit) }}"
        timeout: "{{ timeout_secs | default(300) | int }}"
        poll_interval: "{{ poll_interval | default(3) | int }}"
        progress_log: "{{ progress_log }}"
      register: r

    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
