##################################################################################################
# toolbox/backup/restore_backup.yml
#
# Restores a backup folder as a new database.  The backup folder must be present on the target
# node's filesystem (use `docker cp` to move files between containers if needed).  Waits for the
# restore operation to complete.
#
# Long-running: large restores can take minutes.  Open a second terminal and `tail -F` the
# printed progress log to watch per-poll status live.
#
# INPUTS:
#   target           REQUIRED.
#   backup_path      REQUIRED.  Absolute path to the backup folder on target.
#   new_db_name      REQUIRED.
#   timeout_secs     OPTIONAL.  Default 600.
#   poll_interval    OPTIONAL.  Default 3.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/backup/restore_backup.yml -e target=1a \
#       -e backup_path=/backups/Tenants-20260528-180000 -e new_db_name=Tenants_restored
##################################################################################################

- name: Restore a backup as a new database and wait for completion
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve progress log path
      ansible.builtin.set_fact:
        progress_log: "/tmp/ravendb-restore-{{ new_db_name }}-{{ lookup('pipe','date +%Y%m%d-%H%M%S') }}.log"

    - name: Progress hint
      ansible.builtin.debug:
        msg:
          - "Long-running operation -- this task will block until the restore completes (or times out)."
          - "Watch progress live from another shell:   tail -F {{ progress_log }}"

    - ravendb_backup:
        kind: restore
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        backup_path: "{{ backup_path }}"
        new_db_name: "{{ new_db_name }}"
        timeout: "{{ timeout_secs | default(600) | int }}"
        poll_interval: "{{ poll_interval | default(3) | int }}"
        progress_log: "{{ progress_log }}"
      register: r

    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
