##################################################################################################
# toolbox/backup/restore_backup.yml
#
# Restores a backup folder as a new database.  The backup folder must be present on the target
# node's filesystem (use `docker cp` to move files between containers if needed).  Waits for the
# restore operation to complete.
#
# INPUTS:
#   target        REQUIRED.  Container/host that has the backup folder accessible.
#   backup_path   REQUIRED.  Absolute path to the backup folder on target.
#   new_db_name   REQUIRED.  Name for the restored database.
#   timeout       OPTIONAL.  Max wait, seconds.  Default 600.
#   poll_interval OPTIONAL.  Default 3.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/backup/restore_backup.yml -K -e target=1a \
#       -e backup_path=/backups/Tenants-20260528-180000 -e new_db_name=Tenants_restored
##################################################################################################

- name: Restore a backup as a new database and wait for completion
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
          - backup_path is defined
          - new_db_name is defined
        fail_msg: "Required: -e target=<node> -e backup_path=<dir> -e new_db_name=<name>"

    - name: Resolve defaults
      ansible.builtin.set_fact:
        eff_timeout: "{{ (timeout | default(600)) | int }}"
        eff_poll: "{{ (poll_interval | default(3)) | int }}"

    - name: Trigger the restore
      ansible.builtin.uri:
        url: "https://{{ target }}.{{ ravendb_domain }}:443/admin/restore/database"
        method: POST
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        body_format: json
        body:
          Type: "Local"
          BackupLocation: "{{ backup_path }}"
          DatabaseName: "{{ new_db_name }}"
          DisableOngoingTasks: true
          EncryptionKey: null
        status_code: [200, 201]
        return_content: true
      register: trigger

    - name: Extract OperationId
      ansible.builtin.set_fact:
        op_id: "{{ trigger.json.OperationId | int }}"

    - name: Print plan
      ansible.builtin.debug:
        msg: "Triggered restore of {{ backup_path }} as {{ new_db_name }} on {{ target }}  (OperationId={{ op_id }})"

    - name: Wait for the restore to finish (cluster-level operation)
      ansible.builtin.uri:
        url: "https://{{ target }}.{{ ravendb_domain }}:443/operations/state?id={{ op_id }}"
        method: GET
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200]
      register: op_state
      retries: "{{ ((eff_timeout | int) / (eff_poll | int)) | int }}"
      delay: "{{ eff_poll }}"
      until: (op_state.json.Status | default(none)) in ['Completed', 'Faulted', 'Canceled']

    - name: Dump op_state if Status missing (debug aid)
      ansible.builtin.debug:
        var: op_state.json
      when: (op_state.json.Status | default(none)) is none

    - name: Fail if restore did not complete cleanly
      ansible.builtin.assert:
        that:
          - op_state.json.Status == 'Completed'
        fail_msg: "Restore ended with Status={{ op_state.json.Status }}: {{ op_state.json | to_nice_json }}"

    - name: Done
      ansible.builtin.debug:
        msg: "RESTORED  {{ backup_path }} -> new DB '{{ new_db_name }}' on {{ target }} (OperationId={{ op_id }})"
