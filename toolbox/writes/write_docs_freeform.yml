##################################################################################################
# toolbox/writes/write_docs_freeform.yml
#
# Writes N "freeform" docs to a target node: random uuid id, "@collection": null in metadata.
# Use this for chaos scenarios that need writes with no predictable shape -- some replication
# race bugs only trigger when ids don't follow a known prefix.
#
# NOT idempotent -- each call writes new docs with fresh uuids.
#
# INPUTS:
#   target   REQUIRED.
#   db_name  REQUIRED.
#   count    REQUIRED.  Typically small (1-3).
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/writes/write_docs_freeform.yml -e target=2a -e db_name=Tenants -e count=1
##################################################################################################

- name: Write N freeform docs (random uuid ids, null collection)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: docs_freeform
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        count: "{{ count | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
