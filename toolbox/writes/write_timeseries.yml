##################################################################################################
# toolbox/writes/write_timeseries.yml
#
# Appends N timeseries entries to a doc, OR deletes a range from an existing timeseries.
# Append mode (default): values are constant 72.0, one entry per `interval_seconds`
# starting at `start_timestamp` (default: 1 hour ago, UTC).
# Delete-range mode: pass delete_from and delete_to to switch off appending.
#
# INPUTS (append mode):
#   target              REQUIRED.
#   db_name             REQUIRED.
#   doc_id              REQUIRED.
#   ts_name             OPTIONAL.  Default "Heartrate".
#   count               OPTIONAL.  Default 100.
#   start_timestamp     OPTIONAL.  Default now - 1h, ISO-8601 UTC.
#   interval_seconds    OPTIONAL.  Default 6.
#
# INPUTS (delete-range mode -- both required to switch modes):
#   delete_from         REQUIRED for delete mode.  ISO-8601 UTC.
#   delete_to           REQUIRED for delete mode.  ISO-8601 UTC.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/writes/write_timeseries.yml -e target=1a -e db_name=Tenants -e doc_id=users/1 -e count=100
#   ansible-playbook toolbox/writes/write_timeseries.yml -e target=2a -e db_name=Tenants -e doc_id=users/1 -e ts_name=Heartrate \
#       -e delete_from=2026-05-28T12:55:00.000Z -e delete_to=2026-05-28T13:00:00.000Z
##################################################################################################

- name: Append timeseries entries or delete a range
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: timeseries
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        doc_id: "{{ doc_id }}"
        ts_name: "{{ ts_name | default(omit) }}"
        count: "{{ count | default(100) | int }}"
        start_timestamp: "{{ start_timestamp | default(omit) }}"
        interval_seconds: "{{ interval_seconds | default(6) | int }}"
        delete_from: "{{ delete_from | default(omit) }}"
        delete_to: "{{ delete_to | default(omit) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
