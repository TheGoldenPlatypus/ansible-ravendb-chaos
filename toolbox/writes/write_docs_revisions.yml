##################################################################################################
# toolbox/writes/write_docs_revisions.yml
#
# PUTs `count` docs `revs_per_doc` times each, with a DISTINCT body on every PUT so RavenDB
# actually records each one as a new revision.
#
# INPUTS:
#   target         REQUIRED.
#   db_name        REQUIRED.  (revisions config must already be enabled)
#   count          REQUIRED.  Number of distinct doc ids.
#   revs_per_doc   REQUIRED.  Number of distinct revisions to PUT per doc.
#   id_prefix      OPTIONAL.  Default "seed".
#   collection     OPTIONAL.  Default "MicroDocs".
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/writes/write_docs_revisions.yml -e target=1a -e db_name=db1 -e count=10000 -e revs_per_doc=5
#   ansible-playbook toolbox/writes/write_docs_revisions.yml -e target=1a -e db_name=db1 -e count=100 -e revs_per_doc=3 -e id_prefix=probe/r1
##################################################################################################

- name: Write N docs x M distinct revisions each
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: docs_revisions
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        count: "{{ count | int }}"
        revs_per_doc: "{{ revs_per_doc | int }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        collection: "{{ collection | default(omit) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
