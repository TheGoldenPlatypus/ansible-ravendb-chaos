##################################################################################################
# toolbox/writes/delete_docs.yml
#
# Deletes docs on a target node either by an explicit list of ids or by an id prefix + count.
# Use this when a scenario needs to exercise delete-propagation paths.
#
# INPUTS (provide EITHER ids OR id_prefix+count):
#   target       REQUIRED.
#   db_name      REQUIRED.
#   ids          OPTIONAL.  Explicit list of doc ids to delete (JSON list on the CLI).
#   id_prefix    OPTIONAL.  Builds ids <id_prefix>/0..count-1.
#   count        OPTIONAL.  Required iff id_prefix is set.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/writes/delete_docs.yml -e target=1a -e db_name=Tenants -e id_prefix=micro/doc -e count=50
#   ansible-playbook toolbox/writes/delete_docs.yml -e target=1a -e db_name=Tenants -e '{"ids":["users/1","users/42"]}'
##################################################################################################

- name: Delete docs on a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: delete
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        ids: "{{ ids | default(omit) }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        count: "{{ count | default(0) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
