##################################################################################################
# toolbox/writes/write_counters.yml
#
# Increments a named counter on a doc N times (each call applies `delta`).
# NOT idempotent -- re-running adds delta*repeat to the counter again.  Use this when a
# scenario needs to exercise counter increment replication.
#
# INPUTS:
#   target         REQUIRED.
#   db_name        REQUIRED.
#   doc_id         REQUIRED.  Doc must already exist.
#   counter_name   OPTIONAL.  Default "Likes".
#   delta          OPTIONAL.  Default 1.
#   repeat         OPTIONAL.  Default 1.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/writes/write_counters.yml -e target=1a -e db_name=Tenants -e doc_id=users/1
#   ansible-playbook toolbox/writes/write_counters.yml -e target=2a -e db_name=Tenants -e doc_id=users/1 -e counter_name=Likes -e delta=7 -e repeat=3
##################################################################################################

- name: Increment a named counter on a doc
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: counters
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        doc_id: "{{ doc_id }}"
        counter_name: "{{ counter_name | default(omit) }}"
        delta: "{{ delta | default(1) | int }}"
        repeat: "{{ repeat | default(1) | int }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
