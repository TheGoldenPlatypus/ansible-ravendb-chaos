##################################################################################################
# toolbox/writes/write_docs.yml
#
# Writes N small docs to a target node's database.  Each doc id is `<id_prefix>/<n>`,
# zero-indexed.  Useful for seeding traffic before a chaos action, or for re-running
# convergence checks.
#
# INPUTS:
#   target     REQUIRED.  Container name to write to (e.g. 1a).
#   db_name    REQUIRED.  Database name.
#   count      REQUIRED.  Integer.  How many docs to write.
#   id_prefix  OPTIONAL.  Default "micro/doc".  Doc ids become <id_prefix>/0..N-1.
#   body_tag   OPTIONAL.  When set, body includes a "tag" field.  Useful for the conflict-
#                         generation pattern -- two writers on the same id pool with distinct
#                         body_tag values produce content RavenDB resolves as conflicts.
#                         RavenDB dedupes identical-content PUTs into one revision; body_tag
#                         is the cheapest way to keep each side's writes distinct.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/writes/write_docs.yml -e target=1a -e db_name=Tenants -e count=50
#   ansible-playbook toolbox/writes/write_docs.yml -e target=1a -e db_name=db1 -e count=20 -e id_prefix=probe/burst1
#   ansible-playbook toolbox/writes/write_docs.yml -e target=1a -e db_name=db1 -e count=100 -e id_prefix=users/conflict -e body_tag=hub
##################################################################################################

- name: Write N docs to a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: docs
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        count: "{{ count | int }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        body_tag: "{{ body_tag | default(omit) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
