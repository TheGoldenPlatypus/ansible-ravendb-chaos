##################################################################################################
# toolbox/writes/write_attachments.yml
#
# PUTs N attachments onto existing docs.  Doc id pattern: <doc_id_prefix>/<n>.  Attachment name
# pattern: <attachment_name>/<n>.  Each attachment body is a short text payload (configurable).
# The parent doc must already exist -- run write_docs.yml first if needed.
#
# INPUTS:
#   target            REQUIRED.
#   db_name           REQUIRED.
#   count             REQUIRED.
#   doc_id_prefix     OPTIONAL.  Default "micro/doc".
#   attachment_name   OPTIONAL.  Default "data".
#   payload           OPTIONAL.  Default "blob-<n>".
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/writes/write_attachments.yml -e target=1a -e db_name=Tenants -e count=10
##################################################################################################

- name: PUT N attachments on existing docs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: attachments
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        count: "{{ count | int }}"
        doc_id_prefix: "{{ doc_id_prefix | default(omit) }}"
        attachment_name: "{{ attachment_name | default(omit) }}"
        payload: "{{ payload | default(omit) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
