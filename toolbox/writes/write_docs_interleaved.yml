##################################################################################################
# toolbox/writes/write_docs_interleaved.yml
#
# Writes N docs to a target node, round-robin through a list of id prefixes.
# Useful when a scenario wants two (or more) categories of docs arriving as a single
# interleaved stream -- e.g. chaos tests that need filter-matching and non-matching docs
# mixed in the same write burst.
#
# DOC IDS:
#   For n in 0..count-1:  <prefixes[ n % len(prefixes) ]>-<n // len(prefixes)>
#   With prefixes=["A","B"] and count=4 you get:  A-0, B-0, A-1, B-1
#
# INPUTS:
#   target    REQUIRED.
#   db_name   REQUIRED.
#   count     REQUIRED.
#   prefixes  REQUIRED.  List of id prefixes; rotates in order.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/writes/write_docs_interleaved.yml \
#       -e target=1a -e db_name=Tenants -e count=20 \
#       -e '{"prefixes":["tenants/cluster2/x","other/x"]}'
##################################################################################################

- name: Write N docs round-robin across prefixes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_writes:
        kind: docs_interleaved
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        count: "{{ count | int }}"
        prefixes: "{{ prefixes }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
