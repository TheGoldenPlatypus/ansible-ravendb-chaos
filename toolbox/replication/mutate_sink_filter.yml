##################################################################################################
# toolbox/replication/mutate_sink_filter.yml
#
# Update the AllowedHubToSinkPaths filter on an existing PullReplicationAsSink task.  Used by
# RP-2 phase (b) "filter mutation under chaos" -- widen / narrow / overlap mid-flight.
#
# Pattern: GET ongoing tasks, find the named sink-pull task, POST the full task body back with
# the new AllowedHubToSinkPaths.  Re-reads the per-sink PFX from disk because Raven only
# exposes CertificatePublicKey on read-back and the POST body requires CertificateWithPrivateKey.
#
# NOTE (RP-2 finding, 2026-06): the mutate updates the stored task definition but the LIVE
# pull subscription may keep using the OLD filter until the task is bounced.  Symptom: paths
# that match only the new filter never flow.  Workaround if needed: disable+enable the task.
#
# INPUTS:
#   target              REQUIRED.  Sink leader (e.g. 2a).
#   db_name             REQUIRED.
#   task_name           REQUIRED.  Name of the PullReplicationAsSink task to mutate
#                                  (the cluster<N>-to-hub name created by attach_sinks).
#   allowed_paths       REQUIRED.  JSON list of new HubToSink prefixes.
#   sink_cluster_id     REQUIRED.  Cluster id used to locate the PFX on disk.
#   replication_certs_dir  OPTIONAL.  Default <repo_root>/replication-certs/.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/replication/mutate_sink_filter.yml \
#       -e target=2a -e db_name=db1 -e task_name=cluster2-to-hub -e sink_cluster_id=2 \
#       -e '{"allowed_paths":["users/*","orders/*"]}'
##################################################################################################

- name: Mutate PullReplicationAsSink filter
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_tasks:
        kind: mutate_sink_filter
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        task_name: "{{ task_name }}"
        sink_cluster_id: "{{ sink_cluster_id }}"
        allowed_paths: "{{ allowed_paths }}"
        replication_certs_dir: "{{ replication_certs_dir | default(playbook_dir.split('/toolbox')[0] ~ '/replication-certs') }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
