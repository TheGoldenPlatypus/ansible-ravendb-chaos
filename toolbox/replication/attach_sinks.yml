##################################################################################################
# toolbox/replication/attach_sinks.yml
#
# Sink-side setup for filtered pull-replication.  For each sink cluster: creates a Raven
# connection string pointing at the hub topology, then creates a sink-pull-replication task
# that pulls from the hub using the per-sink PFX previously minted by
# toolbox/replication/define_hub.yml.
#
# INPUTS:
#   hub_topology_urls       REQUIRED.  JSON list of hub node URLs.
#   db_name                 REQUIRED.
#   hub_task_name           REQUIRED.  Must match the name passed to define_hub.yml.
#   sink_cluster_ids        REQUIRED.  JSON list of sink cluster ids.
#   sink_allowed_paths      REQUIRED.  Dict: sink_cluster_id -> list of allowed HubToSink paths.
#                                      Must match define_hub.yml's spec.
#   replication_mode        OPTIONAL.  Default "HubToSink, SinkToHub".
#   sink_to_hub_paths       OPTIONAL.  Dict per sink id -> list of allowed SinkToHub prefixes.
#                                      Default ["*"] per sink.
#   connection_string_name  OPTIONAL.  Default "hub-connection".
#   replication_certs_dir   OPTIONAL.  Where define_hub.yml wrote per-sink PFX files.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/replication/attach_sinks.yml \
#       -e db_name=Tenants -e hub_task_name=hub-sink1 \
#       -e '{"hub_topology_urls":["https://1a.hubsink.test:443","https://1b.hubsink.test:443","https://1c.hubsink.test:443"],
#            "sink_cluster_ids":[2],
#            "sink_allowed_paths":{"2":["users/sink1/*"]}}'
##################################################################################################

- name: Attach every sink to the hub
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_tasks:
        kind: attach_sinks
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        hub_task_name: "{{ hub_task_name }}"
        hub_topology_urls: "{{ hub_topology_urls }}"
        sink_cluster_ids: "{{ sink_cluster_ids }}"
        sink_allowed_paths: "{{ sink_allowed_paths }}"
        sink_to_hub_paths: "{{ sink_to_hub_paths | default(omit) }}"
        replication_mode: "{{ replication_mode | default(omit) }}"
        connection_string_name: "{{ connection_string_name | default(omit) }}"
        replication_certs_dir: "{{ replication_certs_dir | default(playbook_dir.split('/toolbox')[0] ~ '/replication-certs') }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
