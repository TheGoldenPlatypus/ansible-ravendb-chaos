##################################################################################################
# toolbox/replication/define_hub.yml
#
# Hub-side setup for filtered pull-replication.  Defines the PullReplicationAsHub task on the
# cluster leader, then for each sink cluster: mints a fresh per-sink replication PFX
# (server-side -- Raven generates it), saves it under `replication_certs_dir`, and registers a
# Hub Access entry with that sink's allowed paths.
#
# Pair with toolbox/replication/attach_sinks.yml to wire the sinks.
#
# INPUTS:
#   hub_leader              REQUIRED.  Container/host name of the hub cluster's leader (e.g. 1a).
#   db_name                 REQUIRED.
#   hub_task_name           REQUIRED.  Name to give the PullReplicationAsHub task.
#   sink_cluster_ids        REQUIRED.  JSON list of sink cluster ids (e.g. [2, 3]).
#   sink_allowed_paths      REQUIRED.  Dict: sink_cluster_id -> list of allowed HubToSink paths.
#   replication_mode        OPTIONAL.  Default "HubToSink, SinkToHub".
#   sink_to_hub_paths       OPTIONAL.  Dict per sink id -> list of allowed SinkToHub prefixes.
#                                      Default ["*"] per sink.
#   replication_certs_dir   OPTIONAL.  Where to write per-sink PFX files.  Default
#                                      <repo_root>/replication-certs/.
#
# SIDE EFFECTS:
#   * Hub task created (if absent) at hub_leader.
#   * One PFX per sink saved to <replication_certs_dir>/cluster<id>.replication.pfx (binary)
#     and .pfx.b64 (base64 for attach_sinks.yml to read).
#   * One Hub Access entry per sink registered with the sink's allowed paths.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/replication/define_hub.yml \
#       -e hub_leader=1a -e db_name=Tenants -e hub_task_name=hub-sink1 \
#       -e '{"sink_cluster_ids":[2], "sink_allowed_paths":{"2":["users/sink1/*"]}}'
#
#   ansible-playbook toolbox/replication/define_hub.yml \
#       -e hub_leader=1a -e db_name=Tenants -e hub_task_name=hub-T4 \
#       -e '{"sink_cluster_ids":[2,3],
#            "sink_allowed_paths":{"2":["users/sink1/*","orders/sink1/*"],
#                                  "3":["users/sink2/*","orders/sink2/*"]}}'
##################################################################################################

- name: Define hub-side pull replication
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_tasks:
        kind: define_hub
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        hub_leader: "{{ hub_leader }}"
        db_name: "{{ db_name }}"
        hub_task_name: "{{ hub_task_name }}"
        sink_cluster_ids: "{{ sink_cluster_ids }}"
        sink_allowed_paths: "{{ sink_allowed_paths }}"
        sink_to_hub_paths: "{{ sink_to_hub_paths | default(omit) }}"
        replication_mode: "{{ replication_mode | default(omit) }}"
        replication_certs_dir: "{{ replication_certs_dir | default(playbook_dir.split('/toolbox')[0] ~ '/replication-certs') }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
