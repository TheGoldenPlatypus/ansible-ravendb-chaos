##################################################################################################
# toolbox/consistency_check/stop.yml
#
# Stop the background ConsistencyCheck.  Called after the rolling upgrade + enable_features
# step in scenarios that started the tool.  SIGTERMs the PID so the tool gets to flush its
# Run Summary, extracts that summary block from the log, prints it into the scenario log,
# then docker-stops the state-store container.
#
# REQUIRED:
#   net                docker_network_name of the iter.
#
# OPTIONAL:
#   stop_grace_secs    Default 10.  How long to wait for TERM before SIGKILL.
##################################################################################################

- name: ConsistencyCheck -- stop + dump summary + drop state store
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    stop_grace_secs: "{{ stop_grace_secs | default(10) | int }}"
    _state_store_name: "ccstate-{{ net }}"
    _pidfile: "/tmp/ccheck-{{ net }}.pid"
    _logfile: "/tmp/ccheck-{{ net }}.log"

  tasks:
    - name: SIGTERM the ConsistencyCheck pid, wait for graceful exit, SIGKILL if still alive
      ansible.builtin.shell: |
        set -u
        pid=$(cat {{ _pidfile }} 2>/dev/null || true)
        if [ -z "$pid" ]; then echo "NO_PIDFILE"; exit 0; fi
        if ! kill -0 "$pid" 2>/dev/null; then echo "ALREADY_DEAD pid=$pid"; rm -f {{ _pidfile }}; exit 0; fi
        kill -TERM "$pid" 2>/dev/null || true
        for i in $(seq 1 {{ stop_grace_secs }}); do
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "STOPPED pid=$pid via TERM"; rm -f {{ _pidfile }}; exit 0
          fi
          sleep 1
        done
        kill -KILL "$pid" 2>/dev/null || true
        echo "KILLED pid=$pid (TERM grace exhausted)"
        rm -f {{ _pidfile }}
      register: stop_result
      changed_when: true

    - name: Show stop outcome
      ansible.builtin.debug:
        msg: "ConsistencyCheck stop: {{ stop_result.stdout }}"

    # Pull the Run Summary box out of the log -- everything from the box-top to the
    # box-bottom.  Falls back to "log missing" if the file isn't there.
    - name: Extract Run Summary from ConsistencyCheck log
      ansible.builtin.shell: |
        if [ ! -f {{ _logfile }} ]; then echo "(log file missing: {{ _logfile }})"; exit 0; fi
        # Each run prints one or more "Run Summary" boxes.  Print the LAST one.
        awk '
          /^╭─Run Summary/ { buf=$0 "\n"; in_box=1; next }
          in_box {
            buf=buf $0 "\n"
            if (/^╰/) { last_box=buf; buf=""; in_box=0 }
          }
          END { if (last_box != "") printf "%s", last_box; else print "(no Run Summary box found in log)" }
        ' {{ _logfile }}
      register: summary
      changed_when: false

    - name: Print Run Summary into the scenario log
      ansible.builtin.debug:
        msg: |-
          === ConsistencyCheck Run Summary (net={{ net }}) ===
          {{ summary.stdout }}

    - name: Stop state-store container
      community.docker.docker_container:
        name: "{{ _state_store_name }}"
        state: stopped
      failed_when: false
      changed_when: false
