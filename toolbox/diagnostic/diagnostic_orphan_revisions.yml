##################################################################################################
# toolbox/diagnostic/diagnostic_orphan_revisions.yml
#
# Triggers RavenDB's "adopt orphaned revisions" operation on every node and reports the
# AdoptedCount per node.  AdoptedCount > 0 means there were orphans -- a real defect.
# Info by default; pass assert_mode=true to fail when any node reports a non-zero count.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.
#   budget_secs    OPTIONAL.  Default 60.  Per-node budget for the adopt operation.
#   assert_mode    OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_orphan_revisions.yml \
#       -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Adopt orphan revisions on every node and report counts
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: orphan_revisions
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        budget_secs: "{{ budget_secs | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
