##################################################################################################
# toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
#
# For a sampled probe set of doc ids, asserts that each id is either present on every node
# or absent on every node -- no "id exists on A and C but not on B" splits.
#
# Sampling check by design.  Full-set enumeration doesn't scale at large entity counts, so
# the caller picks the probe set deliberately (e.g. ids written during a partition window,
# or ids that originated on one node before a topology change).
#
# INPUTS (provide EITHER ids OR id_prefix+count):
#   db_name    REQUIRED.  Database name.
#   nodes      REQUIRED.  JSON list of node names to compare.
#   ids        OPTIONAL.  JSON list of doc ids to probe.
#   id_prefix  OPTIONAL.  Prefix for the probe set; ids built as <prefix>/0..count-1.
#   count      OPTIONAL.  Required if id_prefix is set.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_doc_id_set_parity.yml \
#       -e db_name=Tenants -e id_prefix=users/sink1 -e count=50 \
#       -e '{"nodes":["1a","1b","1c"]}'
#
#   ansible-playbook toolbox/diagnostic/diagnostic_doc_id_set_parity.yml \
#       -e db_name=Tenants -e '{"ids":["users/1","users/42"],"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Assert per-id existence parity across nodes
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - db_name is defined
          - nodes is defined
          - nodes is iterable
          - (nodes | length) > 0
          - (ids is defined) or (id_prefix is defined and count is defined)
        fail_msg: >-
          Required: -e db_name=<db> -e '{"nodes":[...]}' AND
          either -e '{"ids":[...]}' or both -e id_prefix=<p> -e count=<N>

    - name: Resolve probe set
      ansible.builtin.set_fact:
        probe_ids: "{{ ids if (ids is defined) else (range(count | int) | map('regex_replace', '^(.*)$', id_prefix ~ '/\\1') | list) }}"

    - name: GET each (node, id) pair
      ansible.builtin.uri:
        url: "https://{{ item.0 }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/docs?id={{ item.1 | urlencode }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 404, 500, 503]
      register: probe
      loop: "{{ nodes | product(probe_ids) | list }}"
      loop_control:
        label: "{{ item.0 }} <- {{ item.1 }}"
      no_log: "{{ quiet | default(true) | bool }}"

    - name: Build per-id status list (one entry per probed node, accumulator pattern)
      ansible.builtin.set_fact:
        id_status_map: >-
          {{
            (id_status_map | default({})) | combine({
              item: (probe.results
                      | selectattr('item.1', '==', item)
                      | map(attribute='status')
                      | list)
            })
          }}
      loop: "{{ probe_ids }}"
      loop_control:
        label: "{{ item }}"
      no_log: "{{ quiet | default(true) | bool }}"

    - name: Find ids with mixed presence (some 200, some not)
      ansible.builtin.set_fact:
        mismatched_ids: >-
          {{
            id_status_map | dict2items
              | selectattr('value', 'contains', 200)
              | rejectattr('value', 'equalto', ([200] * (nodes | length)))
              | map(attribute='key')
              | list
          }}

    - name: Show summary
      ansible.builtin.debug:
        msg:
          - "probed {{ probe_ids | length }} id(s) across {{ nodes | length }} node(s)"
          - "mismatched ids: {{ mismatched_ids }}"

    - name: Assert parity
      ansible.builtin.assert:
        that:
          - mismatched_ids | length == 0
        fail_msg: "FAIL  doc-id-set split: {{ mismatched_ids }} (see id_status_map for per-node status)"
        success_msg: "PASS  doc-id-set parity across {{ nodes }} for {{ probe_ids | length }} probe id(s)"
