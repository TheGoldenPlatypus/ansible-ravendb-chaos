##################################################################################################
# toolbox/diagnostic/diagnostic_doc_id_set_parity.yml
#
# For a probe set of doc ids, reports per-id presence across nodes.  Info by default; pass
# assert_mode=true to fail when any id is present on some nodes and absent on others.
#
# INPUTS (provide EITHER ids OR id_prefix+count):
#   db_name      REQUIRED.
#   nodes        REQUIRED.
#   ids          OPTIONAL.  JSON list of doc ids to probe.
#   id_prefix    OPTIONAL.  Builds ids <id_prefix>/0..count-1.
#   count        OPTIONAL.  Required if id_prefix is set.
#   assert_mode  OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_doc_id_set_parity.yml \
#       -e db_name=Tenants -e id_prefix=users/sink1 -e count=50 \
#       -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Per-id existence parity across nodes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: doc_id_set_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        ids: "{{ ids | default(omit) }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        count: "{{ count | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
