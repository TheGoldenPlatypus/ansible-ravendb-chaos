##################################################################################################
# toolbox/diagnostic/diagnostic_stats_parity.yml
#
# Consolidated /stats parity check -- one GET per node, prints a single table covering 11
# Count* fields + SizeOnDisk (informational).
#
# By default (assert_mode=false) the table is printed but no failure is raised.  Pass
# assert_mode=true to fail when an asserted field differs across nodes.  Default asserted set
# excludes CountOfCounterEntries + CountOfTimeSeriesSegments (per-node intrinsic per upstream
# guidance) -- those show as "drift (info)" instead of MISMATCH.
#
# INPUTS:
#   db_name        REQUIRED.
#   nodes          REQUIRED.
#   assert_fields  OPTIONAL.  Subset of fields to assert on.
#   assert_mode    OPTIONAL.  Default false.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_stats_parity.yml \
#       -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
#
#   ansible-playbook toolbox/diagnostic/diagnostic_stats_parity.yml -e assert_mode=true \
#       -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: /stats consolidated parity across nodes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: stats_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        assert_fields: "{{ assert_fields | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
