##################################################################################################
# toolbox/diagnostic/diagnostic_schema_version.yml
#
# Reads /build/version from every node and prints FullVersion per node.  Pure info by default.
# Optional asserts (only fire when assert_mode=true):
#   require_parity      -- every node must report the same FullVersion.
#   expected_version    -- every node's FullVersion must contain this substring (e.g. "6.2").
#
# For the DatabaseRecord.SupportedFeatures dump (used after rolling upgrades to confirm the
# new build's features actually flipped on for a database), see diagnostic_supported_features.yml.
#
# INPUTS:
#   nodes               REQUIRED.  JSON list of node names.
#   require_parity      OPTIONAL.  Default false.
#   expected_version    OPTIONAL.  Substring (e.g. "6.2").
#   assert_mode         OPTIONAL.  Default false.  Required to make require_parity / expected_version fail.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_schema_version.yml -e '{"nodes":["1a","1b","1c"]}'
#   ansible-playbook toolbox/diagnostic/diagnostic_schema_version.yml \
#       -e require_parity=true -e expected_version=6.2 -e assert_mode=true \
#       -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Read /build/version per node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: schema_version
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        nodes: "{{ nodes }}"
        require_parity: "{{ require_parity | default(false) | bool }}"
        expected_version: "{{ expected_version | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
