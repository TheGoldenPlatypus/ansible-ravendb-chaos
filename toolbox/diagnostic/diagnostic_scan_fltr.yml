##################################################################################################
# toolbox/diagnostic/diagnostic_scan_fltr.yml
#
# Scans a capture directory recursively for the literal substring "FLTR:" in any .cv file.
# Pure info by default.  Pass assert_mode=true to fail on any leak.
#
# INPUTS:
#   capture_dir  REQUIRED.  Directory to scan.
#   assert_mode  OPTIONAL.  Default false.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_scan_fltr.yml -e capture_dir=captures/cv-db1-20260606-104500
#   ansible-playbook toolbox/diagnostic/diagnostic_scan_fltr.yml -e capture_dir=captures -e assert_mode=true
##################################################################################################

- name: Scan captured CVs for FLTR leakage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: scan_fltr
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        capture_dir: "{{ capture_dir if capture_dir.startswith('/') else (playbook_dir.split('/toolbox')[0] ~ '/' ~ capture_dir) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
