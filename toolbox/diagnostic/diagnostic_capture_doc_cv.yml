##################################################################################################
# toolbox/diagnostic/diagnostic_capture_doc_cv.yml
#
# Read-only.  For each (node, id) pair, fetches the doc's @change-vector and writes one file
# per pair to output_dir.  Files named <node>__<id-encoded>.cv.  Missing docs -> "<NOT_FOUND>".
#
# INPUTS:
#   db_name      REQUIRED.
#   ids          REQUIRED.  JSON list of doc ids.
#   nodes        REQUIRED.
#   output_dir   OPTIONAL.  Default = <repo>/captures/doccv-<db>-<timestamp>/.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_capture_doc_cv.yml \
#       -e db_name=Tenants -e '{"ids":["users/1","users/42"],"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Capture per-node @change-vector for a list of doc ids
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: capture_doc_cv
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        ids: "{{ ids }}"
        output_dir: "{{ output_dir | default(playbook_dir.split('/toolbox')[0] ~ '/captures/doccv-' ~ db_name ~ '-' ~ lookup('pipe','date +%Y%m%d-%H%M%S')) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
