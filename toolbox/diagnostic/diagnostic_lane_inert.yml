##################################################################################################
# toolbox/diagnostic/diagnostic_lane_inert.yml
#
# Asserts the v_new "storage lane" stayed DORMANT on an upgraded database -- no revision row
# was written in the new shape ("|" in the @change-vector).  Info by default; pass
# assert_mode=true to fail on any leak.
#
# Forensic dump: also prints DatabaseRecord.SupportedFeatures so operators can see
# HashedRevisionPk (informational, never asserted).
#
# INPUTS:
#   db_name             REQUIRED.
#   nodes               REQUIRED.  Post-upgrade v_new peers.
#   id_prefixes         REQUIRED.  JSON list of doc id prefixes to sample.
#   sample_per_prefix   OPTIONAL.  Default 25.
#   assert_mode         OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_lane_inert.yml \
#       -e db_name=db1 \
#       -e '{"nodes":["2a","2b","2c"]}' \
#       -e '{"id_prefixes":["users/sink1","orders/sink1"]}'
##################################################################################################

- name: Assert v_new lane stays inert on an upgraded database
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: lane_inert
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        id_prefixes: "{{ id_prefixes }}"
        sample_per_prefix: "{{ sample_per_prefix | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
