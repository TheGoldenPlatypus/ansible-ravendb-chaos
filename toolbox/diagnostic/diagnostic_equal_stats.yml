##################################################################################################
# toolbox/diagnostic/diagnostic_equal_stats.yml  (PC-4)
#
# Asserts non-document /stats aggregates are equal across nodes -- attachments, counters,
# time-series segments.  Pairs with diagnostic_doc_count_parity (which covers CountOfDocuments)
# to give full I-1 coverage when a scenario writes via W-2 (extension churn).
#
# Aspects checked (subset can be selected via `aspects`):
#   attachments  -> CountOfUniqueAttachments + CountOfAttachments
#   counters     -> CountOfCounterEntries
#   timeseries   -> CountOfTimeSeriesSegments
#
# Nodes returning 404/500/503 (DB not present) are dropped from the comparison.
#
# INPUTS:
#   db_name   REQUIRED.
#   nodes     REQUIRED.  JSON list.
#   aspects   OPTIONAL.  CSV subset of [attachments,counters,timeseries].  Default: all three.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_equal_stats.yml \
#       -e db_name=db1 -e '{"nodes":["1a","1b","1c"]}'
#
#   ansible-playbook toolbox/diagnostic/diagnostic_equal_stats.yml \
#       -e db_name=db1 -e aspects=attachments,counters \
#       -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Assert non-document stat aggregate parity across nodes
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - db_name is defined
          - nodes is defined
          - nodes is iterable
          - (nodes | length) > 0
        fail_msg: "Required: -e db_name=<db> -e '{\"nodes\":[\"1a\",\"1b\",\"1c\"]}'"

    - name: Resolve aspects
      ansible.builtin.set_fact:
        eff_aspects: "{{ (aspects | default('attachments,counters,timeseries')).split(',') | map('trim') | list }}"

    - name: GET /stats on each node
      ansible.builtin.uri:
        url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/stats"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 404, 500, 503]
      register: stats
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item }}"

    - name: Compute convergence_set + skipped
      ansible.builtin.set_fact:
        convergence_set: "{{ stats.results | selectattr('status', '==', 200) | map(attribute='item') | list }}"
        skipped_nodes: "{{ stats.results | rejectattr('status', '==', 200) | map(attribute='item') | list }}"

    - name: Note any skipped nodes
      ansible.builtin.debug:
        msg: "SKIPPED (DB not present): {{ skipped_nodes }}"
      when: skipped_nodes | length > 0

    - name: Fail if no node has the DB
      ansible.builtin.assert:
        that:
          - convergence_set | length > 0
        fail_msg: "No probed node has database '{{ db_name }}'"

    - name: Build per-aspect maps
      ansible.builtin.set_fact:
        ok_results: "{{ stats.results | selectattr('status', '==', 200) | list }}"

    - name: Attachments parity
      ansible.builtin.assert:
        that:
          - (ok_results | map(attribute='json.CountOfUniqueAttachments') | unique | list | length) == 1
          - (ok_results | map(attribute='json.CountOfAttachments') | unique | list | length) == 1
        fail_msg: >-
          FAIL  attachments mismatch.  unique={{ ok_results | map(attribute='json.CountOfUniqueAttachments') | list }}
          total={{ ok_results | map(attribute='json.CountOfAttachments') | list }}  nodes={{ convergence_set }}
        success_msg: >-
          PASS  attachments parity.  unique={{ ok_results | map(attribute='json.CountOfUniqueAttachments') | first }}
          total={{ ok_results | map(attribute='json.CountOfAttachments') | first }}  nodes={{ convergence_set }}
      when: "'attachments' in eff_aspects"

    - name: Counters parity
      ansible.builtin.assert:
        that:
          - (ok_results | map(attribute='json.CountOfCounterEntries') | unique | list | length) == 1
        fail_msg: >-
          FAIL  counter entries mismatch.  {{ ok_results | map(attribute='json.CountOfCounterEntries') | list }}  nodes={{ convergence_set }}
        success_msg: >-
          PASS  counter entries parity.  count={{ ok_results | map(attribute='json.CountOfCounterEntries') | first }}  nodes={{ convergence_set }}
      when: "'counters' in eff_aspects"

    - name: Time-series parity
      ansible.builtin.assert:
        that:
          - (ok_results | map(attribute='json.CountOfTimeSeriesSegments') | unique | list | length) == 1
        fail_msg: >-
          FAIL  time-series segments mismatch.  {{ ok_results | map(attribute='json.CountOfTimeSeriesSegments') | list }}  nodes={{ convergence_set }}
        success_msg: >-
          PASS  time-series segments parity.  count={{ ok_results | map(attribute='json.CountOfTimeSeriesSegments') | first }}  nodes={{ convergence_set }}
      when: "'timeseries' in eff_aspects"
