##################################################################################################
# toolbox/diagnostic/diagnostic_cv_boundary_by_dbid.yml
#
# Directional CV-boundary check.  Given a source group and a receiver group, asserts that no
# source-cluster DatabaseId appears on the ORDER side of any receiver's DatabaseChangeVector.
#
# v_new-lane only:  the order-side check applies only when the receiver CV has '|' (new lane
# canonical form).  Legacy raw CVs (no '|') are N/A and reported as such.  Pass
# strict_v_new=true with assert_mode=true to also require every receiver be on the new lane.
#
# Info by default; pass assert_mode=true to fail on any source-dbid leak.
#
# INPUTS:
#   db_name          REQUIRED.
#   source_nodes     REQUIRED.  Sender-cluster nodes.
#   receiver_nodes   REQUIRED.  Receiver-cluster nodes.
#   strict_v_new     OPTIONAL.  Default false.
#   assert_mode      OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_cv_boundary_by_dbid.yml \
#       -e db_name=db1 \
#       -e '{"source_nodes":["1a","1b","1c"],"receiver_nodes":["2a","2b","2c"]}'
##################################################################################################

- name: CV-boundary by dbid (no source dbid on receiver order side)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: cv_boundary_by_dbid
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        source_nodes: "{{ source_nodes }}"
        receiver_nodes: "{{ receiver_nodes }}"
        strict_v_new: "{{ strict_v_new | default(false) | bool }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
