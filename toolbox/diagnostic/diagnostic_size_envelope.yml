##################################################################################################
# toolbox/diagnostic/diagnostic_size_envelope.yml
#
# Storage envelope check.  Two modes (auto-detected by whether baseline_file exists):
#   1. CAPTURE -- baseline_file missing.  Records current SizeOnDisk per node, writes the file.
#   2. CHECK   -- baseline_file exists.  Compares current sizes; prints per-node growth %.
#
# By default (assert_mode=false) this is info-only -- growth is just printed.  Pass
# assert_mode=true to fail when any node's growth > max_growth_pct.
#
# INPUTS:
#   db_name           REQUIRED.
#   nodes             REQUIRED.
#   baseline_file     REQUIRED.  Absolute path.
#   max_growth_pct    OPTIONAL.  Default 300.  Per-node growth ceiling (only matters when asserting).
#   assert_mode       OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_size_envelope.yml \
#       -e db_name=db1 -e baseline_file=$PWD/captures/size-baseline-rv1.json \
#       -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Storage envelope -- capture-or-check
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: size_envelope
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        baseline_file: "{{ baseline_file }}"
        max_growth_pct: "{{ max_growth_pct | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
