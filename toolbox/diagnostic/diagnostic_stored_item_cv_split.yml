##################################################################################################
# toolbox/diagnostic/diagnostic_stored_item_cv_split.yml
#
# Spot-checks the @change-vector shape on a node's stored documents.  RavenDB has two shapes:
#   * raw    -- no delimiter (pre-fix / legacy).
#   * split  -- contains a delimiter (new lane).
#
# You pass a few doc ids and tell the tool which shape you expect.  Info by default; pass
# assert_mode=true to fail on any doc that doesn't match.
#
# INPUTS:
#   db_name      REQUIRED.
#   target       REQUIRED.  Node to inspect (e.g. 2a).
#   doc_ids      REQUIRED.  JSON list (3-10 is plenty).
#   expect       OPTIONAL.  "split" (default) or "raw".
#   delimiter    OPTIONAL.  Default "|".
#   assert_mode  OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_stored_item_cv_split.yml \
#       -e db_name=db1 -e target=2a \
#       -e '{"doc_ids":["users/sink1/0","users/sink1/1","users/sink1/2"]}'
##################################################################################################

- name: Inspect stored CV shape on a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: stored_item_cv_split
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        target: "{{ target }}"
        doc_ids: "{{ doc_ids }}"
        expect: "{{ expect | default(omit) }}"
        delimiter: "{{ delimiter | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
