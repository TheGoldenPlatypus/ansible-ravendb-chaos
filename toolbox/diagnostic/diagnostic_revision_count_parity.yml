##################################################################################################
# toolbox/diagnostic/diagnostic_revision_count_parity.yml
#
# For a probe set of doc ids, GETs revision lists on every node and reports per-id counts.
# Info by default; pass assert_mode=true to fail on count drift.  When expected_count is set,
# also checks every node reports exactly that count.
#
# INPUTS (provide EITHER ids OR id_prefix+count):
#   db_name         REQUIRED.
#   nodes           REQUIRED.
#   ids             OPTIONAL.
#   id_prefix       OPTIONAL.
#   count           OPTIONAL.  Required if id_prefix is set.
#   expected_count  OPTIONAL.  When set, also asserts the count matches exactly.
#   page_size       OPTIONAL.  Default 1024.
#   assert_mode     OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_revision_count_parity.yml \
#       -e db_name=Tenants -e id_prefix=users/sink1 -e count=20 \
#       -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Per-id revision count parity across nodes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: revision_count_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        ids: "{{ ids | default(omit) }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        count: "{{ count | default(omit) }}"
        expected_count: "{{ expected_count | default(omit) }}"
        page_size: "{{ page_size | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
