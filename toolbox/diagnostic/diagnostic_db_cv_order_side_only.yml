##################################################################################################
# toolbox/diagnostic/diagnostic_db_cv_order_side_only.yml
#
# Reads cluster-level DatabaseChangeVector on the receiver group and asserts every CV entry's
# tag is one of the receiver group's own tags (e.g. 2a/2b/2c -> tags A/B/C).  Any other tag =
# source-side leak.  Info by default; pass assert_mode=true to fail on any leak.
#
# INPUTS:
#   db_name                 REQUIRED.
#   receiver_group_nodes    REQUIRED.  e.g. ["2a","2b","2c"].
#   receiver_group_tags     OPTIONAL.  Defaults to upper(last-char-of-each-receiver-node).
#   assert_mode             OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_db_cv_order_side_only.yml \
#       -e db_name=db1 -e '{"receiver_group_nodes":["2a","2b","2c"]}'
##################################################################################################

- name: Assert receiver DB CV references only receiver-group tags
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: db_cv_order_side_only
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        receiver_group_nodes: "{{ receiver_group_nodes }}"
        receiver_group_tags: "{{ receiver_group_tags | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
