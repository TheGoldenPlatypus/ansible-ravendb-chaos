##################################################################################################
# toolbox/diagnostic/diagnostic_doc_count.yml
#
# Reads CountOfDocuments from /stats on a target node and prints it.  Pure info, no assert.
#
# INPUTS:
#   target   REQUIRED.
#   db_name  REQUIRED.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_doc_count.yml -e target=1b -e db_name=Tenants
##################################################################################################

- name: Read doc count on a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: doc_count
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
