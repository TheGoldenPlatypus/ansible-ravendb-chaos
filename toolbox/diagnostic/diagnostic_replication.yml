##################################################################################################
# toolbox/diagnostic/diagnostic_replication.yml
#
# Dumps incoming + outgoing replication connections for a database on a target node.
# Pure info, no assert.  Useful for diagnosing "who's talking to whom right now".
#
# INPUTS:
#   target   REQUIRED.
#   db_name  REQUIRED.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_replication.yml -e target=2a -e db_name=Tenants
##################################################################################################

- name: Show active replication connections on a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: replication
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
