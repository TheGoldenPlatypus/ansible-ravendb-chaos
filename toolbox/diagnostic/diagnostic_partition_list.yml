##################################################################################################
# toolbox/diagnostic/diagnostic_partition_list.yml
#
# Read-only.  Enumerates active chaos iptables rules (REJECT or DROP, INPUT + OUTPUT) across
# every node and prints a per-node summary.  Use this as the sanity check before starting a
# scenario ("partition.list() should be empty") and after heal_all ("re-confirm empty").
#
# Output: one line per node.  When rules exist, every rule is printed with the peer IP mapped
# back to its node name so you can read at a glance who's cut off from whom.  When a node has
# zero chaos rules, you get a single "CLEAN" line.
#
# IMPLEMENTATION:
#   target_mode=docker (default) -> all containers on docker_network_name
#   target_mode=ssh              -> all hosts in groups['ravendb_nodes']
#   Optional `targets` JSON list overrides the auto-discovered list.
#
# INPUTS:
#   targets  OPTIONAL.  JSON list overriding auto-discovery (e.g. '["1a","2b"]').
#
# RUN EXAMPLES:
#   # docker -- list across the lab
#   ansible-playbook toolbox/diagnostic/diagnostic_partition_list.yml
#
#   # ssh -- list across every inventory host
#   ansible-playbook -i inventory/ssh_hosts.yml toolbox/diagnostic/diagnostic_partition_list.yml -K
#
#   # surgical override -- check only these two
#   ansible-playbook toolbox/diagnostic/diagnostic_partition_list.yml -e '{"targets":["1a","1b"]}'
##################################################################################################

- name: List active chaos iptables rules across every node
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Resolve target_mode (default docker)
      ansible.builtin.set_fact:
        effective_mode: "{{ target_mode | default('docker') }}"

    - name: Auto-discover docker containers and build name<->ip map
      block:
        - name: Inspect docker network
          community.docker.docker_network_info:
            name: "{{ docker_network_name }}"
          register: net

        - name: Set discovered_targets and node_ip_map from docker network
          ansible.builtin.set_fact:
            discovered_targets: "{{ net.network.Containers.values() | map(attribute='Name') | list }}"
            node_ip_map: >-
              {{ dict(net.network.Containers.values()
                      | map(attribute='Name') | list
                      | zip(net.network.Containers.values()
                            | map(attribute='IPv4Address') | map('regex_replace', '/.*$', '') | list)) }}
      when: effective_mode == 'docker'

    - name: Auto-discover ssh hosts and build name<->ip map from inventory
      ansible.builtin.set_fact:
        discovered_targets: "{{ groups['ravendb_nodes'] | default([]) | list }}"
        node_ip_map: "{{ dict(groups['ravendb_nodes'] | default([]) | zip(groups['ravendb_nodes'] | default([]) | map('extract', hostvars, 'ansible_host'))) }}"
      when: effective_mode == 'ssh'

    - name: Use override targets if provided, else auto-discovered
      ansible.builtin.set_fact:
        effective_targets: "{{ targets | default(discovered_targets) }}"

    - name: Build reverse map ip -> name (for human-readable output)
      ansible.builtin.set_fact:
        ip_name_map: "{{ dict(node_ip_map.values() | list | zip(node_ip_map.keys() | list)) }}"

    - name: Sanity check at least one target
      ansible.builtin.assert:
        that:
          - effective_targets | length > 0
        fail_msg: "No targets to inspect (auto-discovery empty and no -e targets=... override)"

    - name: Collect chaos rules (docker mode)
      community.docker.docker_container_exec:
        container: "{{ item }}"
        command: >-
          bash -lc "( iptables -S INPUT; iptables -S OUTPUT ) | grep -E -- '-j (REJECT|DROP)' || true"
      register: rules_docker
      changed_when: false
      loop: "{{ effective_targets }}"
      loop_control:
        label: "{{ item }}"
      when: effective_mode == 'docker'

    - name: Collect chaos rules (ssh mode)
      ansible.builtin.shell: "( iptables -S INPUT; iptables -S OUTPUT ) | grep -E -- '-j (REJECT|DROP)' || true"
      delegate_to: "{{ item }}"
      become: true
      register: rules_ssh
      changed_when: false
      loop: "{{ effective_targets }}"
      loop_control:
        label: "{{ item }}"
      when: effective_mode == 'ssh'

    - name: Unify both mode results into one structure
      ansible.builtin.set_fact:
        all_results: "{{ (rules_docker.results | default([])) + (rules_ssh.results | default([])) }}"

    - name: Render per-node summary
      ansible.builtin.debug:
        msg: >-
          {{ r.item }}: {{ ((r.stdout | default('')).splitlines() | reject('equalto', '') | list | length) }} chaos rule(s)
          {% if (r.stdout | default('')).strip() == '' %}
          [CLEAN]
          {% else %}
          {{ (r.stdout | default('')).splitlines() | reject('equalto', '') | list }}
          {% endif %}
      loop: "{{ all_results }}"
      loop_control:
        loop_var: r
        label: "{{ r.item }}"

    - name: Render IP -> node-name legend (for translating rules above)
      ansible.builtin.debug:
        msg: "IP legend: {{ ip_name_map }}"

    - name: Compute total chaos rule count across all nodes
      ansible.builtin.set_fact:
        total_rules: >-
          {{ all_results
             | map(attribute='stdout')
             | map('default', '')
             | map('regex_findall', '(?m)^-A ')
             | map('length')
             | sum }}

    - name: Done
      ansible.builtin.debug:
        msg: >-
          {{ effective_targets | length }} node(s) inspected (mode={{ effective_mode }}).
          Total chaos rules found: {{ total_rules }}.
          {{ 'LAB IS CLEAN.' if (total_rules | int) == 0 else 'Run heal_all.yml to clear.' }}
