##################################################################################################
# toolbox/diagnostic/diagnostic_filter_compliance.yml
#
# Lists every doc on the sink leader and checks each matches at least one allowed prefix.
# Info by default; pass assert_mode=true to fail on any leak.
#
# When allowed_prefixes isn't passed, auto-fetches them from the sink's DatabaseRecord
# SinkPullReplications entries.
#
# INPUTS:
#   sink_cluster_leader  REQUIRED.  Sink leader (e.g. 2a).
#   db_name              REQUIRED.
#   allowed_prefixes     OPTIONAL.  JSON list -- explicit allowed id prefixes.
#   assert_mode          OPTIONAL.  Default false.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_filter_compliance.yml \
#       -e sink_cluster_leader=2a -e db_name=db1 \
#       -e '{"allowed_prefixes":["users/sink1/"]}'
#
#   ansible-playbook toolbox/diagnostic/diagnostic_filter_compliance.yml \
#       -e sink_cluster_leader=2a -e db_name=db1
##################################################################################################

- name: Assert every sink doc matches the configured filter
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: filter_compliance
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        sink_cluster_leader: "{{ sink_cluster_leader }}"
        db_name: "{{ db_name }}"
        allowed_prefixes: "{{ allowed_prefixes | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
