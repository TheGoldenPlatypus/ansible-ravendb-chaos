##################################################################################################
# toolbox/diagnostic/diagnostic_filter_compliance.yml
#
# Lists every document on the SINK cluster and checks each one matches at least one of the
# filter's allowed prefixes.  Catches "doc leaked through the filter and showed up on the sink
# even though it shouldn't have."
#
# When you set up filtered pull replication (e.g. "only docs starting with users/sink1/ go to
# the sink"), a doc like Internal/0 showing up on the sink means the filter is broken.  Run this
# after the sink has settled (post-quiescence) to confirm no leaks made it across.
#
# How it works:
#   * Either you pass the allowed prefixes explicitly, or the tool reads them from the sink's
#     DatabaseRecord.SinkPullReplications[].AllowedHubToSinkPaths.
#   * Lists every doc on the sink leader (paged).
#   * Any doc whose id doesn't start with one of the allowed prefixes = leak = FAIL.
#
# INPUTS:
#   sink_cluster_leader  REQUIRED.  Sink cluster's leader (e.g. 2a).
#   db_name              REQUIRED.  Database name.
#   allowed_prefixes     OPTIONAL.  JSON list of allowed id prefixes.  Auto-fetched from the
#                                   sink's DatabaseRecord when omitted.
#
# RUN EXAMPLES:
#   # explicit allowed prefixes (recommended for tests -- avoids DatabaseRecord parse risk)
#   ansible-playbook toolbox/diagnostic/diagnostic_filter_compliance.yml \
#       -e sink_cluster_leader=2a -e db_name=db1 \
#       -e '{"allowed_prefixes":["users/sink1/"]}'
#
#   # auto-fetch from the sink's pull-replication config
#   ansible-playbook toolbox/diagnostic/diagnostic_filter_compliance.yml \
#       -e sink_cluster_leader=2a -e db_name=db1
##################################################################################################

- name: Assert every sink doc matches the configured filter
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - sink_cluster_leader is defined
          - db_name is defined
        fail_msg: "Required: -e sink_cluster_leader=<node> -e db_name=<db>"

    - name: Resolve allowed_prefixes (fetch from DatabaseRecord if not supplied)
      block:
        - name: GET DatabaseRecord
          ansible.builtin.uri:
            url: "https://{{ sink_cluster_leader }}.{{ ravendb_domain }}:443/admin/databases?name={{ db_name }}"
            client_cert: "{{ cert_dir }}/client.pem"
            ca_path: "{{ cert_ca_crt }}"
            status_code: [200]
          register: db_record

        - name: Extract allowed_prefixes from SinkPullReplications
          ansible.builtin.set_fact:
            allowed_prefixes: >-
              {{ db_record.json.SinkPullReplications | default([])
                 | map(attribute='AllowedHubToSinkPaths')
                 | map('default', [])
                 | flatten
                 | map('regex_replace', '\*$', '')
                 | unique
                 | list }}
      when: allowed_prefixes is not defined

    - name: Fail if allowed_prefixes is empty (no filter spec found)
      ansible.builtin.assert:
        that:
          - (allowed_prefixes | length) > 0
        fail_msg: "No allowed_prefixes resolved -- either pass them explicitly or ensure a SinkPullReplication is configured on {{ db_name }}"

    - name: Show resolved filter spec
      ansible.builtin.debug:
        msg: "Sink filter: docs MUST start with one of {{ allowed_prefixes }}"

    - name: Stream every doc id from the sink
      ansible.builtin.uri:
        url: "https://{{ sink_cluster_leader }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/docs?start=0&pageSize=100000&metadataOnly=true"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200]
        return_content: true
      register: docs_page

    - name: Extract doc ids
      ansible.builtin.set_fact:
        all_sink_ids: "{{ docs_page.json.Results | map(attribute='@metadata') | map(attribute='@id') | list }}"

    - name: Find leak ids (id does not start with any allowed prefix)
      ansible.builtin.set_fact:
        leak_ids: >-
          {{
            all_sink_ids | reject('match', '^(' ~ (allowed_prefixes | map('regex_escape') | join('|')) ~ ')') | list
          }}

    - name: Show summary
      ansible.builtin.debug:
        msg:
          - "total sink docs: {{ all_sink_ids | length }}"
          - "leak ids (don't match any allowed prefix): {{ leak_ids | length }}"
          - "leak sample (first 10): {{ leak_ids[:10] }}"

    - name: Assert filter compliance (I-13 leak side)
      ansible.builtin.assert:
        that:
          - (leak_ids | length) == 0
        fail_msg: "FAIL  filter leak: {{ leak_ids | length }} docs on sink don't match {{ allowed_prefixes }}.  Sample: {{ leak_ids[:10] }}"
        success_msg: "PASS  filter compliance.  {{ all_sink_ids | length }} docs on sink, all matching {{ allowed_prefixes }}"
