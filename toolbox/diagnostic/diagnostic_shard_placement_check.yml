##################################################################################################
# toolbox/diagnostic/diagnostic_shard_placement_check.yml
#
# Asserts each probe doc id lives on EXACTLY ONE shard of a sharded database.  For each id,
# the kind per-shard-probes /databases/<db>/docs?id=...&shardNumber=N and counts owners.
#   * 0 owners (missing on every shard) -> FAIL
#   * >1 owners (mis-routed onto multiple shards) -> FAIL
#   * exactly 1 owner -> PASS
#
# Use after a smuggler-import / ETL / restore into a sharded target to confirm the
# orchestrator routed every doc to the correct shard given the docId hash.  Raises loud
# (not info) when called against a non-sharded database.
#
# INPUTS:
#   target       REQUIRED.  Any node in the sharded cluster (typically the leader).
#   db_name      REQUIRED.
#   ids          ONE-OF.    Explicit JSON list of doc ids to check.
#   id_prefix    ONE-OF.    Used with `count` to auto-expand to "<prefix>/0", "<prefix>/1", ...
#   count        Required with id_prefix.
#   assert_mode  OPTIONAL.  Default false (info-only).  Set true to fail on any bad placement.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_shard_placement_check.yml \
#       -e target=3a -e db_name=db1 -e id_prefix=users/seed -e count=50 -e assert_mode=true
##################################################################################################

- name: Assert per-id shard placement on a sharded database
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: shard_placement_check
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        ids: "{{ ids | default(omit) }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        count: "{{ count | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
