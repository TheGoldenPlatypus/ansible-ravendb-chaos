##################################################################################################
# toolbox/diagnostic/diagnostic_doc_count_parity.yml
#
# Reports CountOfDocuments per node.  Info by default; pass assert_mode=true to fail on drift.
# Nodes returning non-200 are dropped from the comparison.
#
# INPUTS:
#   db_name      REQUIRED.
#   nodes        REQUIRED.
#   assert_mode  OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_doc_count_parity.yml \
#       -e db_name=Tenants -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Doc count parity across nodes (info; assert with assert_mode=true)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: doc_count_parity
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
