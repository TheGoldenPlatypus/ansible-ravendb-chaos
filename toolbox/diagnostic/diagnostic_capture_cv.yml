##################################################################################################
# toolbox/diagnostic/diagnostic_capture_cv.yml
#
# Read-only.  Fetches DatabaseChangeVector from every node and writes one file per node to
# output_dir.  Files named <node>.cv -- easy to diff or feed to scan_fltr.
#
# INPUTS:
#   db_name      REQUIRED.
#   nodes        REQUIRED.
#   output_dir   OPTIONAL.  Default = <repo>/captures/cv-<db>-<timestamp>/.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_capture_cv.yml \
#       -e db_name=Tenants -e '{"nodes":["1a","1b","1c"]}'
##################################################################################################

- name: Capture per-node DatabaseChangeVector
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: capture_cv
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        nodes: "{{ nodes }}"
        output_dir: "{{ output_dir | default(playbook_dir.split('/toolbox')[0] ~ '/captures/cv-' ~ db_name ~ '-' ~ lookup('pipe','date +%Y%m%d-%H%M%S')) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
