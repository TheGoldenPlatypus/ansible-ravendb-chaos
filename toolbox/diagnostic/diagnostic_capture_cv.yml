##################################################################################################
# toolbox/diagnostic/diagnostic_capture_cv.yml
#
# Read-only.  Fetches the DatabaseChangeVector from every node of a DB and writes one file per
# node to output_dir.  Files are named <node>.cv with the CV string as their only content,
# easy to diff or feed to diagnostic_scan_fltr.yml.
#
# INPUTS:
#   db_name      REQUIRED.  Database name.
#   nodes        OPTIONAL.  JSON list of node names to probe.  Default = auto-discovered lab nodes.
#   output_dir   OPTIONAL.  Where to write files.  Default = captures/cv-<db>-<timestamp>/.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/diagnostic/diagnostic_capture_cv.yml -e db_name=Tenants
#   ansible-playbook toolbox/diagnostic/diagnostic_capture_cv.yml -e db_name=Hub_DB -e '{"nodes":["1a","1b","1c"]}'
#   ansible-playbook -i inventory/ssh_hosts.yml toolbox/diagnostic/diagnostic_capture_cv.yml -e db_name=Tenants
##################################################################################################

- name: Capture per-node DatabaseChangeVector
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - db_name is defined
        fail_msg: "Required: -e db_name=<db>"

    - name: Resolve target_mode
      ansible.builtin.set_fact:
        effective_mode: "{{ target_mode | default('docker') }}"

    - name: Auto-discover docker nodes
      block:
        - community.docker.docker_network_info:
            name: "{{ docker_network_name }}"
          register: net
        - ansible.builtin.set_fact:
            discovered_nodes: "{{ net.network.Containers.values() | map(attribute='Name') | list }}"
      when: effective_mode == 'docker'

    - name: Auto-discover ssh nodes
      ansible.builtin.set_fact:
        discovered_nodes: "{{ groups['ravendb_nodes'] | default([]) | list }}"
      when: effective_mode == 'ssh'

    - name: Resolve effective node list
      ansible.builtin.set_fact:
        effective_nodes: "{{ nodes | default(discovered_nodes) }}"

    - name: Resolve output_dir
      ansible.builtin.set_fact:
        effective_output_dir: "{{ output_dir | default(playbook_dir.split('/toolbox')[0] ~ '/captures/cv-' ~ db_name ~ '-' ~ lookup('pipe', 'date +%Y%m%d-%H%M%S')) }}"

    - name: Ensure output_dir exists
      ansible.builtin.file:
        path: "{{ effective_output_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch /stats per node
      ansible.builtin.uri:
        url: "https://{{ item }}.{{ ravendb_domain }}:443/databases/{{ db_name }}/stats"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 404, 500, 503]
      register: stats
      loop: "{{ effective_nodes }}"
      loop_control:
        label: "{{ item }}"

    - name: Write per-node CV file
      ansible.builtin.copy:
        dest: "{{ effective_output_dir }}/{{ r.item }}.cv"
        content: "{{ (r.json.DatabaseChangeVector | default('<UNAVAILABLE status=' ~ r.status ~ '>')) }}\n"
        mode: '0644'
      loop: "{{ stats.results }}"
      loop_control:
        loop_var: r
        label: "{{ r.item }}"

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          Wrote {{ effective_nodes | length }} CV file(s) to {{ effective_output_dir }}/
          ({{ effective_nodes | length }} nodes inspected, db={{ db_name }})
