##################################################################################################
# toolbox/diagnostic/diagnostic_cross_sink_isolation.yml
#
# Probes a sink for documents with the sibling sinks' forbidden prefixes -- sharper failure
# message than filter_compliance when the leak is specifically from a sibling sink's pool.
# Info by default; pass assert_mode=true to fail on any leak.
#
# INPUTS:
#   db_name              REQUIRED.
#   sink_cluster_leader  REQUIRED.
#   forbidden_prefixes   REQUIRED.  JSON list of prefixes that must NOT appear on this sink.
#   sample_per_prefix    OPTIONAL.  Default 100.
#   assert_mode          OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_cross_sink_isolation.yml \
#       -e db_name=db1 -e sink_cluster_leader=2a \
#       -e '{"forbidden_prefixes":["users/sink2/","orders/sink2/"]}'
##################################################################################################

- name: Probe sink for forbidden sibling-sink prefixes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: cross_sink_isolation
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        sink_cluster_leader: "{{ sink_cluster_leader }}"
        forbidden_prefixes: "{{ forbidden_prefixes }}"
        sample_per_prefix: "{{ sample_per_prefix | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
