##################################################################################################
# toolbox/diagnostic/diagnostic_revision_form_sampling.yml
#
# For each probe doc id, GET /databases/<db>/revisions?id=<id>&pageSize=N on `target`,
# then classify every returned revision's @change-vector by whether it contains the
# delimiter (default '|'):
#   raw    -- no delimiter      (legacy on-disk form)
#   split  -- has the delimiter (new lane / hashed)
# Aggregate per-id raw/split counts + overall totals, then assert per `expect`:
#   any-raw    -- >=1 revision (across all ids) must be raw.  Use after a SNAPSHOT
#                 restore of a mixed-form source to prove raw revisions were preserved
#                 at the voron page level.
#   all-split  -- every revision must be split.  Use after a SMUGGLER restore --
#                 the public-API import re-keys every revision into hashed form.
#   any-split  -- symmetric: at least one revision must be split.
#   all-raw    -- symmetric: every revision must be raw (v_old baseline).
# A probe id with zero returned revisions is reported as `missing` and FAILS under
# assert_mode -- so a smuggler restore that dropped revisions on a doc can't slip
# through a sampling check that only looked at the rest of the probe set.
#
# Distinct from `diagnostic_stored_item_cv_split.yml` -- that wrapper checks the
# LIVE doc's CV shape; this one walks every REVISION returned by /revisions?id=...
#
# INPUTS:
#   db_name      REQUIRED.
#   target       REQUIRED.  Node to inspect.
#   ids          ONE-OF.    Explicit JSON list of doc ids.
#   id_prefix    ONE-OF.    Used with `count` to auto-expand to "<prefix>/0", ...
#   count        Required with id_prefix.
#   expect       REQUIRED.  any-raw / all-split / any-split / all-raw.
#   page_size    OPTIONAL.  Default 1024.  Max revisions fetched per id.
#   delimiter    OPTIONAL.  Default "|".
#   assert_mode  OPTIONAL.  Default false.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/diagnostic/diagnostic_revision_form_sampling.yml \
#       -e db_name=db1 -e target=3a -e id_prefix=users/sink1 -e count=50 \
#       -e expect=any-raw -e assert_mode=true
##################################################################################################

- name: Sample per-revision CV form on a target node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_diagnostic:
        kind: revision_form_sampling
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        db_name: "{{ db_name }}"
        target: "{{ target }}"
        ids: "{{ ids | default(omit) }}"
        id_prefix: "{{ id_prefix | default(omit) }}"
        count: "{{ count | default(omit) }}"
        expect: "{{ expect }}"
        page_size: "{{ page_size | default(omit) }}"
        delimiter: "{{ delimiter | default(omit) }}"
        assert_mode: "{{ assert_mode | default(false) | bool }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
