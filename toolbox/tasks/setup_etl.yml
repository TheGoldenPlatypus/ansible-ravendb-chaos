##################################################################################################
# toolbox/tasks/setup_etl.yml
#
# Configures a Raven-to-Raven ETL task on a source database that pushes documents to a
# different target database (potentially on a different cluster).  Two REST calls in one
# task: create the connection string pointing at the target's topology URLs, then create
# the ETL task referencing that connection string.
#
# Distinct from pull replication (which is pull-based, sink-initiated).  ETL is push-based,
# source-initiated.  Used by RV-3 phase (b) to drain a sharded source into a non-sharded
# ETL target for cross-check against a parallel smuggler backup.
#
# INPUTS:
#   target                  REQUIRED.  Source cluster's leader -- where the ETL task is created.
#   db_name                 REQUIRED.  Source database name.
#   task_name               REQUIRED.  Display name of the ETL task on the source.
#   target_db_name          REQUIRED.  Database name on the receiving side.
#   target_topology_urls    REQUIRED.  JSON list of target-side node URLs (e.g.
#                                      ["https://4a.hubsink.test:443"]).
#   connection_string_name  OPTIONAL.  Default <task_name>-conn.
#   script                  OPTIONAL.  JS transform script.  Default loadToOriginalCollection(this)
#                                      (forwards every doc to its same collection on the target).
#   collections             OPTIONAL.  JSON list of source collections to ETL.  Default empty =
#                                      ApplyToAllDocuments=true (every collection).
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/tasks/setup_etl.yml \
#       -e target=1a -e db_name=src \
#       -e task_name=src-to-tgt \
#       -e target_db_name=tgt \
#       -e '{"target_topology_urls":["https://4a.hubsink.test:443"]}'
##################################################################################################

- name: Configure a Raven-to-Raven ETL task
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_tasks:
        kind: setup_etl
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        task_name: "{{ task_name }}"
        target_db_name: "{{ target_db_name }}"
        target_topology_urls: "{{ target_topology_urls }}"
        connection_string_name: "{{ connection_string_name | default(omit) }}"
        script: "{{ script | default(omit) }}"
        collections: "{{ collections | default(omit) }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
