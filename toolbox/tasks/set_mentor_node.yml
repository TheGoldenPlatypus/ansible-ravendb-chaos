##################################################################################################
# toolbox/tasks/set_mentor_node.yml
#
# Flips MentorNode on an ongoing task.  Reads the existing config, swaps MentorNode, writes
# back.  Wired: hub, sink, external.
#
# Sink note: the sink-pull-replication body requires CertificateWithPrivateKey, which Raven
# does NOT expose on read-back.  For task_type=sink we re-read the per-sink PFX from disk.
#
# INPUTS:
#   target            REQUIRED.  Container/host (DB cluster leader works best).
#   db_name           REQUIRED.
#   task_name         REQUIRED.
#   task_type         REQUIRED.  hub | sink | external
#   mentor_node       REQUIRED.  Cluster tag (A, B, C, ...).
#   sink_cluster_id   REQUIRED when task_type=sink.
#   replication_certs_dir  OPTIONAL.  Default <repo_root>/replication-certs/.
#
# RUN EXAMPLES:
#   ansible-playbook toolbox/tasks/set_mentor_node.yml -e target=1a -e db_name=Tenants \
#       -e task_name=Filtered_Hub -e task_type=hub -e mentor_node=B
#
#   ansible-playbook toolbox/tasks/set_mentor_node.yml -e target=2a -e db_name=Tenants \
#       -e task_name=cluster2-to-hub -e task_type=sink -e sink_cluster_id=2 -e mentor_node=C
#
#   ansible-playbook toolbox/tasks/set_mentor_node.yml -e target=1a -e db_name=Tenants \
#       -e task_name=MyExternalRep -e task_type=external -e mentor_node=A
##################################################################################################

- name: Set MentorNode on an ongoing task
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_tasks:
        kind: set_mentor_node
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        target: "{{ target }}"
        db_name: "{{ db_name }}"
        task_name: "{{ task_name }}"
        task_type: "{{ task_type }}"
        mentor_node: "{{ mentor_node }}"
        sink_cluster_id: "{{ sink_cluster_id | default(omit) }}"
        replication_certs_dir: "{{ replication_certs_dir | default(playbook_dir.split('/toolbox')[0] ~ '/replication-certs') }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
