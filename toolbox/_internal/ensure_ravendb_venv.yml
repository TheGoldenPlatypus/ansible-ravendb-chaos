##################################################################################################
# toolbox/_internal/ensure_ravendb_venv.yml
#
# Ensure the ravendb python client is installed in ~/.ravendb_ansible.  Imported via
# `import_playbook` from the four toolbox tools that use official ravendb.ravendb modules
# requiring this venv (db/create_database, wait/wait_for_healthy, replication/define_hub,
# replication/attach_sinks).
#
# Probes first.  Only runs the (slow) install role if the venv is missing or `-e force_prereqs=true`
# was passed.  Sets `ansible_python_interpreter` for localhost so subsequent plays in the same
# run use the venv-bundled python.
##################################################################################################

- name: Ensure ravendb python client is available on the controller
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    ravendb_venv_path: "{{ ansible_env.HOME }}/.ravendb_ansible"

  tasks:
    - name: Probe existing venv for ravendb module
      ansible.builtin.command:
        cmd: "{{ ravendb_venv_path }}/bin/python -c 'import ravendb'"
      register: venv_probe
      failed_when: false
      changed_when: false

    - name: Reuse existing venv -- skip the prereqs role
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ ravendb_venv_path }}/bin/python"
      when:
        - venv_probe.rc == 0
        - not (force_prereqs | default(false) | bool)

    - name: Install ravendb python client prerequisites (one-time / forced)
      ansible.builtin.include_role:
        name: ravendb.ravendb.ravendb_python_client_prerequisites
      when: (venv_probe.rc != 0) or (force_prereqs | default(false) | bool)
