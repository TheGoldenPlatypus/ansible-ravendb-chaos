##################################################################################################
# toolbox/control/pause_gate.yml
#
# Section banner + opt-in pause gate.  Invoked at the top of every scenario section.  Two jobs:
#
#   1. ALWAYS print a 3-line ASCII banner identifying the section.  Makes section boundaries
#      easy to spot in long log files (default ansible output buries single-line msgs).  Also
#      the wrapping PLAY name uses the section label, so the standard `PLAY [...]` header line
#      is also self-documenting.
#
#   2. When `pause_between_sections=true`, additionally pause and wait for ENTER before
#      continuing (Ctrl-C then 'A' aborts).  When the toggle is unset/false (the default),
#      no pause -- the playbook flows straight through after printing the banner.
#
# DO NOT enable pause_between_sections for unattended / CI runs: any background workload
# launched by the scenario keeps running during the pause.
#
# INPUTS:
#   section_label              REQUIRED.  Short string shown in the banner + prompt
#                                         (e.g. "SECTION 5 -- upgrade 1a").
#   pause_between_sections     OPTIONAL.  Default false.  Set true to actually pause.
#
# USAGE (from a scenario):
#   - ansible.builtin.import_playbook: ../../../toolbox/control/pause_gate.yml
#     vars: { section_label: "SECTION 5 -- upgrade 1a" }
##################################################################################################

- name: ">>> {{ section_label | default('next section') }} <<<"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: ">>> Section banner"
      ansible.builtin.debug:
        msg:
          - "================================================================================"
          - ">>>>>  {{ section_label | default('next section') }}"
          - "================================================================================"

    - name: Pause before {{ section_label | default('next section') }}
      ansible.builtin.pause:
        prompt: >-
          About to start {{ section_label | default('next section') }}.
          Press ENTER to continue, Ctrl-C then 'A' to abort.
      when: pause_between_sections | default(false) | bool
