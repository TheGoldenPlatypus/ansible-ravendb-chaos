##################################################################################################
# toolbox/service/remove_node.yml
#
# Removes a node from its cluster using RavenDB's cluster admin API.  The node stays alive
# as a process; only its cluster membership is severed.  Pairs with add_node.yml for
# exercising add/remove cycles.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Container name of any current cluster member (e.g. 1a).
#   target_tag      REQUIRED.  Single-letter cluster tag of the node to remove (e.g. C).
#                              Must be a Member or Promotable of the cluster.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/service/remove_node.yml -e cluster_leader=1a -e target_tag=D
##################################################################################################

- name: Remove a node from its cluster
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - cluster_leader is defined
          - target_tag is defined
          - target_tag | length == 1
        fail_msg: "Required: -e cluster_leader=<node> -e target_tag=<single-letter cluster tag>"

    - name: DELETE /admin/cluster/node?nodeTag={{ target_tag | upper }}
      ansible.builtin.uri:
        url: "https://{{ cluster_leader }}.{{ ravendb_domain }}:443/admin/cluster/node?nodeTag={{ target_tag | upper }}"
        method: DELETE
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
        status_code: [200, 204]

    - name: Poll /cluster/topology until {{ target_tag | upper }} is no longer present
      ansible.builtin.uri:
        url: "https://{{ cluster_leader }}.{{ ravendb_domain }}:443/cluster/topology"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_path: "{{ cert_ca_crt }}"
      register: topology
      retries: 30
      delay: 2
      until:
        - (target_tag | upper) not in (topology.json.Topology.Members.keys() | list)
        - (target_tag | upper) not in (topology.json.Topology.Promotables | default({}) | dict2items | map(attribute='key') | list)

    - name: Done
      ansible.builtin.debug:
        msg: "REMOVED  tag {{ target_tag | upper }} from cluster reachable via {{ cluster_leader }}"
