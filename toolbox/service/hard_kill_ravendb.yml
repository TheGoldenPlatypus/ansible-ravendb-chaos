##################################################################################################
# toolbox/service/hard_kill_ravendb.yml
#
# SIGKILL the Raven.Server process inside a container.  Used by RP-2 phase (c) "hard-kill
# leader" sub-phases -- the point of the test is that the in-flight replication batch is
# severed without a graceful shutdown.  No -TERM, no flush, no goodbye.
#
# Differs from restart_ravendb.yml (which is `systemctl restart ravendb`, i.e. SIGTERM with a
# clean drain) -- those are different chaos primitives.  Use this one when the test wants the
# kill to land mid-write.
#
# After kill, the container's systemd unit auto-restarts the process (the package ships a
# systemd unit with Restart=on-failure).  If your scenario needs to control the restart
# timing, pair this with toolbox/wait/wait_for_member.yml afterwards.
#
#
# INPUTS:
#   target      REQUIRED.  Container name (e.g. 1a).
#
# RUN:
#   ansible-playbook toolbox/service/hard_kill_ravendb.yml -K -e target=1a
##################################################################################################

- name: SIGKILL Raven.Server inside container
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target is defined
        fail_msg: "Required: -e target=<container>"

    - name: docker exec -- pkill -9 Raven.Server
      ansible.builtin.command:
        cmd: docker exec {{ target }} pkill -9 -f "[R]aven.Server"
      register: out
      changed_when: out.rc == 0
      failed_when: out.rc not in [0, 1]

    - name: Done
      ansible.builtin.debug:
        msg: "HARD-KILL  {{ target }} Raven.Server SIGKILLed (rc={{ out.rc }}). systemd will respawn it; pair with wait_for_member if you need to gate on rejoin."
