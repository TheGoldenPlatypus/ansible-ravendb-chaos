##################################################################################################
# toolbox/sharding/create_sharded_database.yml
#
# Creates a sharded RavenDB database on a cluster leader.  Each shard is replicated across
# an explicit list of node tags; the orchestrator topology is left to RavenDB's default
# (ReplicationFactor=1, one auto-placed orchestrator) -- matching production behavior.
#
# Distinct from `toolbox/db/create_database.yml` (which creates a non-sharded DB via the
# ravendb collection's `database` module).  Sharding requires an explicit per-shard
# topology, hence its own primitive.
#
# INPUTS:
#   cluster_leader  REQUIRED.  Cluster leader the create call hits (typically `<src>a`).
#   db_name         REQUIRED.  Database name.
#   shards          REQUIRED.  Dict: shard_id -> list of node tags (single letters).
#                              Example: {"0":["A","B","C"], "1":["D","E","F"]}.
#
# RUN EXAMPLE:
#   ansible-playbook toolbox/sharding/create_sharded_database.yml \
#       -e cluster_leader=1a -e db_name=db1 \
#       -e '{"shards":{"0":["A","B","C"],"1":["D","E","F"],"2":["G","H","I"]}}'
##################################################################################################

- name: Create a sharded RavenDB database
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ravendb_sharding:
        kind: create_sharded
        ravendb_domain: "{{ ravendb_domain }}"
        client_cert: "{{ cert_dir }}/client.pem"
        ca_cert: "{{ cert_ca_crt }}"
        cluster_leader: "{{ cluster_leader }}"
        db_name: "{{ db_name }}"
        shards: "{{ shards }}"
      register: r
    - ansible.builtin.debug: { msg: "{{ r.msg }}" }
