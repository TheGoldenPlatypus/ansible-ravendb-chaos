---
# Ansible Galaxy dependencies for this harness.
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# (Older ansible distributions used to bundle ravendb.ravendb; newer ones don't.
#  Installing explicitly avoids the "role 'ravendb.ravendb.ravendb_node' was not
#  found" error on a fresh clone.)
collections:
  - name: ravendb.ravendb
  # community.docker 5.x requires ansible-core >= 2.17.  Ubuntu 22.04/24.04 apt ships
  # ansible-core 2.16.x, so we pin to the 4.x line which still has the purge_networks
  # removal but supports ansible-core 2.14+.  Using 5.x against 2.16 fails with
  # "ValueError: unmarshallable object" on every task touching a docker host.
  - name: community.docker
    version: ">=4.0.0,<5.0.0"
  # community.general 10.x also requires ansible-core >= 2.17.  Pin to the 9.x line for
  # ansible-core 2.16 compatibility.
  - name: community.general
    version: ">=9.0.0,<10.0.0"
  - name: ansible.posix
